<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Volante App</title>

<meta
  name="description"
  content="Veja este conteúdo no Volante App."
/>

<meta
  property="og:title"
  content="Volante App"
/>

<meta
  property="og:description"
  content="Veja este conteúdo no Volante App."
/>

<meta
  property="og:type"
  content="website"
/>

<meta
  property="og:image"
  content="https://volante.app.br/assets/logo.png"
/>

<meta
  property="og:site_name"
  content="Volante App"
/>

<meta
  name="twitter:card"
  content="summary_large_image"
/>

<script>
(async function () {

  const path =
    window.location.pathname;

  const id =
    path.split("/").pop();

  if (!id) return;

  try {

    const resposta =
      await fetch(
        `https://firestore.googleapis.com/v1/projects/clube-da-caminhonete-be770/databases/(default)/documents/anuncios/${id}`
      );

    if (!resposta.ok) return;

    const json =
      await resposta.json();

    const fields =
      json.fields || {};

    function getValor(campo) {

      if (!campo) return "";

      if (
        campo.stringValue !== undefined
      ) {
        return campo.stringValue;
      }

      if (
        campo.integerValue !== undefined
      ) {
        return campo.integerValue;
      }

      if (
        campo.doubleValue !== undefined
      ) {
        return campo.doubleValue;
      }

      if (
        campo.arrayValue?.values
      ) {
        return campo.arrayValue.values.map(
          getValor
        );
      }

      return "";
    }

    const titulo =
      getValor(fields.titulo) ||
      "Volante App";

    const cidade =
      getValor(fields.cidade);

    const estado =
      getValor(fields.estado);

    const preco =
      getValor(fields.preco);

    const descricao =
      `Anúncio no Volante • ${preco || ""} • ${cidade || ""} ${estado || ""}`;

    let imagem =
      "https://volante.app.br/assets/logo.png";

    const fotos =
      getValor(fields.fotos);

    if (
      Array.isArray(fotos) &&
      fotos.length > 0
    ) {
      imagem = fotos[0];
    }

    document.title =
      titulo;

    function setMeta(
      property,
      content
    ) {

      let element =
        document.querySelector(
          `meta[property="${property}"]`
        );

      if (!element) {
        element =
          document.createElement("meta");

        element.setAttribute(
          "property",
          property
        );

        document.head.appendChild(
          element
        );
      }

      element.setAttribute(
        "content",
        content
      );
    }

    setMeta(
      "og:title",
      titulo
    );

    setMeta(
      "og:description",
      descricao
    );

    setMeta(
      "og:image",
      imagem
    );

    setMeta(
      "og:url",
      window.location.href
    );

    setTimeout(() => {

      window.location.href =
        `https://volante.app.br/detalhe.html?tipo=anuncio&id=${id}`;

    }, 1500);

  } catch (erro) {
    console.error(erro);
  }

})();
</script>

<style>
body{
  font-family:Arial,sans-serif;
  padding:40px;
  background:#ffffff;
  color:#111827;
}
</style>

</head>

<body>

<h1>
  Abrindo anúncio...
</h1>

<p>
  Volante App
</p>

</body>
</html>
