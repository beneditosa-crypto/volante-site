<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar - Volante</title>

<link rel="icon" href="./favicon.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #ffffff;
  color: #111827;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 22px;
}

.login-card {
  width: 100%;
  max-width: 390px;
}

.logo {
  width: 72px;
  height: 72px;
  object-fit: contain;
  display: block;
  margin: 0 auto 14px;
}

h1 {
  text-align: center;
  margin: 0;
  font-size: 26px;
}

.frase {
  text-align: center;
  color: #6b7280;
  margin: 8px 0 28px;
  font-size: 15px;
}

.campo {
  margin-bottom: 12px;
}

label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
}

input {
  width: 100%;
  height: 48px;
  border: 1px solid #e5e7eb;
  border-radius: 14px;
  padding: 0 14px;
  font-size: 15px;
  outline: none;
  background: #f9fafb;
}

input:focus {
  border-color: #111827;
  background: #ffffff;
}

.btn {
  width: 100%;
  height: 48px;
  border: none;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 10px;
}

.btn-primary {
  background: #111827;
  color: #ffffff;
}

.btn-google {
  background: #ffffff;
  color: #111827;
  border: 1px solid #e5e7eb;
}

.links {
  display: flex;
  justify-content: space-between;
  margin-top: 14px;
  font-size: 13px;
}

.links button,
.links a {
  background: none;
  border: none;
  padding: 0;
  color: #4b5563;
  text-decoration: none;
  cursor: pointer;
  font-size: 13px;
}

.erro {
  display: none;
  margin-top: 14px;
  color: #b91c1c;
  font-size: 13px;
  text-align: center;
}

.divisor {
  display: flex;
  align-items: center;
  gap: 10px;
  color: #9ca3af;
  font-size: 12px;
  margin: 18px 0 8px;
}

.divisor::before,
.divisor::after {
  content: "";
  flex: 1;
  height: 1px;
  background: #e5e7eb;
}
</style>
</head>

<body>

<div class="login-card">
  <img src="./logo.png" class="logo" alt="Volante">

  <h1>Entrar no Volante</h1>
  <p class="frase">Mais que carros, paixão</p>

  <div class="campo">
    <label>Email</label>
    <input id="email" type="email" placeholder="seu@email.com">
  </div>

  <div class="campo">
    <label>Senha</label>
    <input id="senha" type="password" placeholder="Sua senha">
  </div>

  <button class="btn btn-primary" onclick="entrar()">Entrar</button>

  <div class="divisor">ou</div>

  <button class="btn btn-google" onclick="entrarGoogle()">Entrar com Google</button>

  <div class="links">
    <button onclick="recuperarSenha()">Esqueci minha senha</button>
    <a href="/">Voltar</a>
  </div>

  <div id="erro" class="erro"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  sendPasswordResetEmail,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770",
  storageBucket: "clube-da-caminhonete-be770.firebasestorage.app",
  messagingSenderId: "559157035885",
  appId: "1:559157035885:web:dd265c86d0a3db6a6b9064",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

function mostrarErro(msg) {
  const erro = document.getElementById("erro");
  erro.innerText = msg;
  erro.style.display = "block";
}

window.entrar = async function () {
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value;

  if (!email || !senha) {
    mostrarErro("Informe email e senha.");
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, senha);
    window.location.href = "/";
  } catch (e) {
    mostrarErro("Não foi possível entrar. Verifique seus dados.");
  }
};

window.recuperarSenha = async function () {
  const email = document.getElementById("email").value.trim();

  if (!email) {
    mostrarErro("Informe seu email para recuperar a senha.");
    return;
  }

  try {
    await sendPasswordResetEmail(auth, email);
    mostrarErro("Enviamos um link de recuperação para seu email.");
  } catch (e) {
    mostrarErro("Não foi possível enviar a recuperação.");
  }
};

window.entrarGoogle = async function () {
  try {
    await signInWithPopup(auth, provider);
    window.location.href = "/";
  } catch (e) {
    mostrarErro("Login com Google não disponível ou cancelado.");
  }
};
</script>

</body>
</html>
