<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Conta — Volante App</title>
  <meta name="description" content="Entrar ou criar conta no Volante App." />
  <link rel="icon" href="/favicon.png" type="image/png" />

  <style>
    :root {
      --background: #ffffff;
      --surface: #ffffff;
      --text: #111111;
      --text-muted: #6b7280;
      --icon-muted: #6b7280;
      --border: #e5e7eb;
      --primary: #1e3a8a;
      --danger: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--background);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--background);
    }

    .box {
      width: min(100%, 420px);
    }

    .logo {
      width: 120px;
      height: 100px;
      object-fit: contain;
      display: block;
      margin: 0 auto 24px;
    }

    .fallback-logo {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      background: var(--primary);
      color: #ffffff;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 40px;
      margin: 0 auto 24px;
    }

    .logged-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid var(--border);
    }

    .title {
      margin: 0 0 15px;
      font-size: 20px;
      font-weight: 900;
      text-align: center;
      color: var(--text);
    }

    .label {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
    }

    .email {
      margin-top: 5px;
      text-align: center;
      font-weight: 900;
      color: var(--text);
      word-break: break-word;
    }

    .input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0 15px;
      margin-bottom: 12px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      font-size: 15px;
    }

    .input::placeholder {
      color: var(--icon-muted);
    }

    .input:focus {
      border-color: var(--primary);
    }

    .forgot {
      display: block;
      text-align: right;
      color: var(--primary);
      margin-bottom: 10px;
      font-weight: 600;
      font-size: 14px;
      background: transparent;
      width: 100%;
    }

    .main-button {
      width: 100%;
      background: var(--primary);
      color: #ffffff;
      padding: 16px;
      border-radius: 14px;
      font-weight: 900;
      margin-top: 6px;
      min-height: 52px;
    }

    .main-button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .link-button {
      width: 100%;
      margin-top: 15px;
      color: var(--primary);
      text-align: center;
      font-weight: 600;
      background: transparent;
      min-height: 32px;
    }

    .google-button {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-top: 15px;
      background: #ffffff;
      color: #333333;
      font-weight: 800;
    }

    .info {
      margin-top: 8px;
      text-align: center;
      color: #999999;
      font-size: 12px;
    }

    .notice {
      margin-top: 12px;
      min-height: 20px;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      color: var(--text-muted);
    }

    .notice.error {
      color: var(--danger);
    }

    .notice.success {
      color: var(--primary);
    }

    .back {
      display: block;
      margin-top: 18px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 700;
    }

    @media (max-width: 520px) {
      .screen {
        align-items: stretch;
        padding: 24px;
      }

      .box {
        margin: auto 0;
      }
    }
  </style>
</head>

<body>
  <main class="screen">
    <section class="box" id="appBox">
      <img class="logo" src="/logo.png" alt="Volante App" onerror="this.replaceWith(Object.assign(document.createElement('div'), {className:'fallback-logo', textContent:'V'}));" />

      <form id="authForm">
        <input class="input" id="email" type="email" placeholder="Email" autocomplete="email" />
        <input class="input" id="senha" type="password" placeholder="Senha" autocomplete="current-password" />

        <button class="forgot" id="forgotButton" type="button">Esqueci minha senha</button>

        <button class="main-button" id="submitButton" type="submit">Entrar</button>

        <button class="link-button" id="modeButton" type="button">Criar uma conta</button>

        <button class="google-button" type="button" disabled>
          <span>G</span>
          <span>Entrar com Google</span>
        </button>

        <p class="info">Google será ativado em breve</p>
        <div class="notice" id="notice"></div>
        <a class="back" href="/">Continuar visualizando</a>
      </form>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      sendPasswordResetEmail,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
      authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
      projectId: "clube-da-caminhonete-be770",
      storageBucket: "clube-da-caminhonete-be770.firebasestorage.app",
      messagingSenderId: "559157035885",
      appId: "1:559157035885:web:6fdb9bb64c7b1b6b43b4b5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const $ = (id) => document.getElementById(id);

    let modoCadastro = false;
    let usuarioAtual = null;

    function setNotice(texto, tipo = "") {
      const el = $("notice");
      el.textContent = texto;
      el.className = `notice ${tipo}`;
    }

    function traduzirErro(error) {
      const code = error?.code || "";
      const mapa = {
        "auth/invalid-email": "Email inválido.",
        "auth/invalid-credential": "Email ou senha inválidos.",
        "auth/wrong-password": "Email ou senha inválidos.",
        "auth/user-not-found": "Email ou senha inválidos.",
        "auth/email-already-in-use": "Este email já está cadastrado.",
        "auth/weak-password": "A senha precisa ter pelo menos 6 caracteres.",
        "auth/network-request-failed": "Falha de conexão. Verifique sua internet."
      };

      return mapa[code] || "Não foi possível concluir. Tente novamente.";
    }

    function atualizarModo() {
      $("submitButton").textContent = modoCadastro ? "Criar conta" : "Entrar";
      $("modeButton").textContent = modoCadastro ? "Já tenho conta" : "Criar uma conta";
      $("forgotButton").style.display = modoCadastro ? "none" : "block";
      $("senha").autocomplete = modoCadastro ? "new-password" : "current-password";
      setNotice("");
    }

    function renderLogado(usuario) {
      $("appBox").innerHTML = `
        <img class="logo" src="/logo.png" alt="Volante App" onerror="this.replaceWith(Object.assign(document.createElement('div'), {className:'fallback-logo', textContent:'V'}));" />

        <div class="logged-card">
          <h1 class="title">Minha conta</h1>
          <div class="label">Logado como</div>
          <div class="email">${usuario.email || ""}</div>
          <button class="main-button" id="logoutButton" type="button">Sair</button>
          <a class="back" href="/">Voltar ao site</a>
        </div>
      `;

      $("logoutButton").addEventListener("click", async () => {
        await signOut(auth);
        location.reload();
      });
    }

    $("modeButton").addEventListener("click", () => {
      modoCadastro = !modoCadastro;
      atualizarModo();
    });

    $("forgotButton").addEventListener("click", async () => {
      const email = $("email").value.trim().toLowerCase();

      if (!email) {
        setNotice("Digite seu email para recuperar a senha.", "error");
        return;
      }

      try {
        await sendPasswordResetEmail(auth, email);
        setNotice("Email enviado. Verifique sua caixa de entrada.", "success");
      } catch (error) {
        setNotice("Não foi possível enviar o email.", "error");
      }
    });

    $("authForm").addEventListener("submit", async (event) => {
      event.preventDefault();

      const email = $("email").value.trim().toLowerCase();
      const senha = $("senha").value;

      if (!email || !senha) {
        setNotice("Informe email e senha.", "error");
        return;
      }

      if (modoCadastro && senha.length < 6) {
        setNotice("A senha precisa ter pelo menos 6 caracteres.", "error");
        return;
      }

      $("submitButton").disabled = true;
      $("submitButton").textContent = "Aguarde...";

      try {
        if (modoCadastro) {
          await createUserWithEmailAndPassword(auth, email, senha);
          setNotice("Conta criada com sucesso.", "success");
        } else {
          await signInWithEmailAndPassword(auth, email, senha);
          setNotice("Login realizado.", "success");
        }

        setTimeout(() => {
          window.location.href = "/";
        }, 650);
      } catch (error) {
        setNotice(traduzirErro(error), "error");
      } finally {
        $("submitButton").disabled = false;
        atualizarModo();
      }
    });

    onAuthStateChanged(auth, (usuario) => {
      usuarioAtual = usuario;
      if (usuario) renderLogado(usuario);
    });

    atualizarModo();
  </script>
</body>
</html>
