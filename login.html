<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Volante</title>

<link rel="icon" href="./favicon.png">

<style>
body {
  margin: 0;
  background: #0f1115;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  width: 320px;
  background: #1c1f24;
  padding: 24px;
  border-radius: 14px;
}

.logo {
  width: 60px;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: none;
  background: #2a2f36;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  margin-top: 6px;
}

.primary {
  background: #e5e7eb;
  color: #111;
}

.secondary {
  background: #374151;
  color: white;
}
</style>
</head>

<body>

<div class="box">
  <img src="./logo.png" class="logo">

  <h2>Entrar</h2>

  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">

  <button class="primary" onclick="entrar()">Entrar</button>
  <button class="secondary" onclick="criar()">Criar conta</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.entrar = async function () {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  await signInWithEmailAndPassword(auth, email, senha);
  window.location.href = "/";
};

window.criar = async function () {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  await createUserWithEmailAndPassword(auth, email, senha);
  window.location.href = "/";
};
</script>

</body>
</html>
