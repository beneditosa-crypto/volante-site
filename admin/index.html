<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Administrativo - Volante</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./admin.css">
  <link rel="icon" href="./favicon.png">
</head>

<body>

<div id="login" class="login">
  <div class="login-box">
    <img src="../logo.png" class="login-logo" alt="Volante">

    <h2>Painel Administrativo</h2>
    <p>Volante App</p>

    <input id="email" type="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <button class="btn-login" onclick="login()">Entrar</button>

    <small>Acesso restrito ao administrador.</small>
  </div>
</div>

<div id="painel" class="hidden">

  <header class="header">
    <div class="header-left">
      <img src="../logo.png" class="logo" alt="Volante">

      <div>
        <strong>Painel Administrativo</strong>
        <span id="adminEmail">Volante App</span>
      </div>
    </div>

    <div class="header-actions">
      <button class="btn-secundario" onclick="carregar()">Atualizar</button>
      <button class="btn-sair" onclick="logout()">Sair</button>
    </div>
  </header>

  <main class="container">

    <div class="resumo">
      <div>
        <strong id="totalItens">0</strong>
        <span>Total</span>
      </div>

      <div>
        <strong id="totalPendentes">0</strong>
        <span>Pendentes</span>
      </div>

      <div>
        <strong id="totalAnuncios">0</strong>
        <span>Anúncios</span>
      </div>

      <div>
        <strong id="totalEventos">0</strong>
        <span>Eventos</span>
      </div>
    </div>

    <div class="tabela-box">
      <table>
        <thead>
          <tr>
            <th>Foto</th>
            <th>Tipo</th>
            <th>Status</th>
            <th>Título</th>
            <th>Usuário</th>
            <th>Ações</th>
          </tr>
        </thead>

        <tbody id="lista">
          <tr>
            <td colspan="6" class="mensagem">Carregando...</td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<div id="modalDevolver" class="modal hidden">
  <div class="modal-box">
    <h3>Devolver item</h3>
    <p id="devolverTitulo"></p>

    <textarea id="motivo" placeholder="Informe o motivo da devolução"></textarea>

    <div class="modal-actions">
      <button class="btn-devolver" onclick="confirmarDevolucao()">Confirmar devolução</button>
      <button class="btn-secundario" onclick="fecharModalDevolver()">Cancelar</button>
    </div>
  </div>
</div>

<div id="modalDetalhe" class="modal hidden">
  <div class="modal-box detalhe-box">
    <h3>Detalhes do item</h3>

    <div id="detalheConteudo"></div>

    <div class="modal-actions">
      <button class="btn-secundario" onclick="fecharModalDetalhe()">Fechar</button>
    </div>
  </div>
</div>

<script type="module" src="./admin.js"></script>

</body>
</html>
