<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Admin - Volante</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f1115;
      color: #e5e7eb;
    }

    .hidden {
      display: none !important;
    }

    /* LOGIN */

    .login {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      background: #1c1f24;
      padding: 24px;
      border-radius: 12px;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #2a2f36;
      color: white;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-login {
      background: #2563eb;
      color: white;
    }

    /* HEADER */

    .header {
      display: flex;
      justify-content: space-between;
      padding: 14px;
      background: #1c1f24;
      border-bottom: 1px solid #2a2f36;
    }

    .header button {
      margin-left: 8px;
    }

    /* TABLE */

    .container {
      padding: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      font-size: 12px;
      color: #9ca3af;
      text-align: left;
      padding: 10px;
    }

    td {
      padding: 10px;
      border-top: 1px solid #1f2937;
    }

    img {
      width: 56px;
      height: 42px;
      border-radius: 6px;
      background: #2a2f36;
    }

    .tag {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
    }

    .tipo {
      background: #374151;
    }

    .status {
      background: #16a34a;
      color: white;
    }

    /* AÇÕES */

    .acoes {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    .acoes button {
      height: 32px;
      font-size: 12px;
      padding: 0 10px;
    }

    .aprovar { background: #16a34a; color: white; }
    .devolver { background: #f59e0b; }
    .excluir { background: #dc2626; color: white; }
    .detalhar { background: #374151; color: white; }

    /* MODAL */

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal-box {
      background: #1c1f24;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    textarea {
      width: 100%;
      height: 80px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
      background: #2a2f36;
      color: white;
      padding: 8px;
    }

    .modal-buttons {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .cancelar {
      background: #374151;
      color: white;
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="box">
    <h3>Admin</h3>
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button class="btn-login" onclick="login()">Entrar</button>
  </div>
</div>

<!-- PAINEL -->
<div id="painel" class="hidden">

  <div class="header">
    <strong>Painel</strong>
    <div>
      <button onclick="carregar()">Atualizar</button>
      <button onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="container">
    <table>
      <thead>
        <tr>
          <th>Foto</th>
          <th>Tipo</th>
          <th>Status</th>
          <th>Título</th>
          <th>Usuário</th>
          <th></th>
        </tr>
      </thead>

      <tbody id="lista"></tbody>
    </table>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <strong>Motivo da devolução</strong>

    <textarea id="motivo"></textarea>

    <div class="modal-buttons">
      <button class="devolver" onclick="confirmar()">Confirmar</button>
      <button class="cancelar" onclick="fecharModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>

let itemId = null;

function login() {
  const email = document.getElementById("email").value;

  if (email.toLowerCase() === "admin@clube.com") {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("painel").classList.remove("hidden");
    carregar();
  } else {
    alert("Acesso negado");
  }
}

function logout() {
  document.getElementById("painel").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
}

function carregar() {
  const lista = document.getElementById("lista");

  lista.innerHTML = "";

  const dados = [
    {
      id: 1,
      tipo: "Anúncio",
      status: "ATIVO",
      titulo: "teste de integração",
      usuario: "email@email.com"
    }
  ];

  dados.forEach(item => {
    lista.innerHTML += `
      <tr>
        <td><img></td>
        <td><span class="tag tipo">${item.tipo}</span></td>
        <td><span class="tag status">${item.status}</span></td>
        <td>${item.titulo}</td>
        <td>${item.usuario}</td>
        <td>
          <div class="acoes">
            <button class="detalhar">Detalhar</button>
            <button class="aprovar">Aprovar</button>
            <button class="devolver" onclick="abrirModal(${item.id})">Devolver</button>
            <button class="excluir">Excluir</button>
          </div>
        </td>
      </tr>
    `;
  });
}

function abrirModal(id) {
  itemId = id;
  document.getElementById("modal").classList.remove("hidden");
}

function fecharModal() {
  itemId = null;
  document.getElementById("modal").classList.add("hidden");
  document.getElementById("motivo").value = "";
}

function confirmar() {
  const motivo = document.getElementById("motivo").value;

  if (!motivo) {
    alert("Informe o motivo");
    return;
  }

  alert("Devolvido: " + motivo);

  fecharModal();
}

</script>

</body>
</html>
