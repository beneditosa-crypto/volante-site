<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Painel Admin - Volante</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #111315;
      color: #e5e7eb;
    }

    .hidden {
      display: none;
    }

    /* LOGIN */

    .login-container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: #1c1f24;
      padding: 24px;
      border-radius: 14px;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #2a2f36;
      color: white;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-login {
      background: #2563eb;
      color: white;
    }

    /* HEADER */

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: #1c1f24;
      border-bottom: 1px solid #2a2f36;
    }

    .header h1 {
      font-size: 18px;
      margin: 0;
    }

    .header-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-refresh {
      background: #374151;
      color: white;
    }

    .btn-logout {
      background: #dc2626;
      color: white;
    }

    /* TABLE */

    .container {
      padding: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      font-size: 13px;
      padding: 10px;
      color: #9ca3af;
      border-bottom: 1px solid #2a2f36;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #1f2937;
      font-size: 14px;
    }

    tr {
      height: 72px;
    }

    img {
      width: 56px;
      height: 42px;
      object-fit: cover;
      border-radius: 8px;
      background: #2a2f36;
    }

    .tag {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
    }

    .tipo {
      background: #374151;
    }

    .status {
      background: #16a34a;
      color: white;
    }

    /* AÇÕES */

    .acoes {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .acoes button {
      height: 36px;
      padding: 0 12px;
      font-size: 12px;
    }

    .btn-detalhar {
      background: #374151;
      color: white;
    }

    .btn-aprovar {
      background: #16a34a;
      color: white;
    }

    .btn-devolver {
      background: #f59e0b;
      color: #111;
    }

    .btn-excluir {
      background: #dc2626;
      color: white;
    }

    /* MODAL */

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal-box {
      background: #1c1f24;
      padding: 20px;
      border-radius: 12px;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    textarea {
      width: 100%;
      height: 80px;
      border-radius: 8px;
      border: none;
      padding: 8px;
      background: #2a2f36;
      color: white;
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login-container">
  <div class="login-box">
    <h2>Admin</h2>
    <input id="email" placeholder="Email" />
    <input id="senha" type="password" placeholder="Senha" />
    <button class="btn-login" onclick="login()">Entrar</button>
  </div>
</div>

<!-- PAINEL -->
<div id="painel" class="hidden">

  <div class="header">
    <h1>Painel Admin</h1>

    <div class="header-buttons">
      <button class="btn-refresh" onclick="carregar()">Atualizar</button>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="container">
    <table>
      <thead>
        <tr>
          <th>Foto</th>
          <th>Tipo</th>
          <th>Status</th>
          <th>Título</th>
          <th>Usuário</th>
          <th style="text-align:right;">Ações</th>
        </tr>
      </thead>

      <tbody id="lista"></tbody>
    </table>
  </div>

</div>

<!-- MODAL DEVOLVER -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h3>Motivo da devolução</h3>
    <textarea id="motivo"></textarea>
    <button class="btn-devolver" onclick="confirmarDevolucao()">Confirmar</button>
  </div>
</div>

<script>
  let itemSelecionado = null;

  function login() {
    const email = document.getElementById("email").value;

    if (email.trim().toLowerCase() === "admin@clube.com") {
      document.getElementById("login").classList.add("hidden");
      document.getElementById("painel").classList.remove("hidden");
      carregar();
    } else {
      alert("Acesso negado");
    }
  }

  function logout() {
    document.getElementById("painel").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
  }

  function carregar() {
    const lista = document.getElementById("lista");

    // MOCK TEMPORÁRIO
    const dados = [
      {
        id: 1,
        tipo: "Anúncio",
        status: "ATIVO",
        titulo: "teste de integração site/app",
        usuario: "benedito.sa@gmail.com"
      }
    ];

    lista.innerHTML = "";

    dados.forEach(item => {
      lista.innerHTML += `
        <tr>
          <td><img /></td>

          <td>
            <span class="tag tipo">${item.tipo}</span>
          </td>

          <td>
            <span class="tag status">${item.status}</span>
          </td>

          <td>${item.titulo}</td>

          <td>${item.usuario}</td>

          <td>
            <div class="acoes">
              <button class="btn-detalhar">Detalhar</button>
              <button class="btn-aprovar">Aprovar</button>
              <button class="btn-devolver" onclick="abrirModal(${item.id})">Devolver</button>
              <button class="btn-excluir">Excluir</button>
            </div>
          </td>
        </tr>
      `;
    });
  }

  function abrirModal(id) {
    itemSelecionado = id;
    document.getElementById("modal").classList.remove("hidden");
  }

  function confirmarDevolucao() {
    const motivo = document.getElementById("motivo").value;

    if (!motivo) {
      alert("Informe o motivo");
      return;
    }

    alert("Item devolvido com motivo: " + motivo);

    document.getElementById("modal").classList.add("hidden");
    document.getElementById("motivo").value = "";
  }
</script>

</body>
</html>
