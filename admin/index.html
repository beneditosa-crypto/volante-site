<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Painel administrativo | Volante</title>

  <link rel="stylesheet" href="./admin.css" />
  <link rel="icon" href="./favicon.png" />
</head>

<body>
  <main class="app">

    <header class="topo">
      <div class="brand">
        <img src="./logo.png" class="logo" />
        <span>Volante</span>
      </div>

      <h1>PAINEL ADMINISTRATIVO</h1>

      <div class="top-actions">
        <button id="btnAtualizar">Atualizar</button>
        <button id="btnSair" class="sair">Sair</button>
      </div>
    </header>

    <section id="resumo" class="resumo"></section>

    <!-- CABEÇALHO DO GRID -->
    <section class="cabecalho-lista">
      <div>Tipo</div>
      <div>Título</div>
      <div>Descrição</div>
      <div>Usuário</div>
      <div>Local</div>
      <div>Data</div>
      <div>Status</div>
      <div>Ações</div>
      <div>Fotos</div>
    </section>

    <section id="lista" class="lista"></section>

  </main>

  <script type="module" src="./admin.js"></script>
</body>
</html>
