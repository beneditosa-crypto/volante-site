<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin - Volante</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f6f6f6;
  color: #111;
}

header {
  background: #111;
  color: #fff;
  padding: 18px 20px;
  display: flex;
  justify-content: space-between;
}

.container {
  max-width: 1400px;
  margin: auto;
  padding: 16px;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.success { background: #147a3d; color: #fff; }
.danger { background: #9b111e; color: #fff; }
.secondary { background: #e9e9e9; }

.table-wrap {
  overflow-x: auto;
  background: #fff;
  border-radius: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
  font-size: 13px;
}

th { background: #fafafa; }

.status {
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: bold;
}

.PENDENTE { background: #fff3cd; }
.ATIVO { background: #d4edda; }
.RECUSADO { background: #f8d7da; }
.EXCLUIDO { background: #eee; }

.fotos {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.thumb {
  width: 60px;
  height: 45px;
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid #ddd;
}

</style>
</head>

<body>

<header>
  <div>
    <strong>Volante Admin</strong><br>
    <small>Painel de moderação</small>
  </div>

  <div id="usuario"></div>
</header>

<div class="container">

  <button class="secondary" onclick="location.href='/'">Voltar site</button>
  <button onclick="tipo='anuncios'; carregar()">Anúncios</button>
  <button onclick="tipo='eventos'; carregar()">Eventos</button>

  <h2 id="titulo">Anúncios</h2>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Fotos</th>
          <th>Status</th>
          <th>Título</th>
          <th>Usuário</th>
          <th>Dados</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIza...",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770"
});

const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN = "admin@clube.com";

let tipo = "anuncios";

onAuthStateChanged(auth, (user) => {
  if (!user || user.email !== ADMIN) {
    document.body.innerHTML = "<h2>Acesso restrito</h2>";
    return;
  }

  document.getElementById("usuario").innerText = user.email;
  carregar();
});

function fotosHTML(d) {
  const fotos = d.fotos || (d.foto ? [d.foto] : []);

  if (!fotos.length) return "—";

  return `<div class="fotos">
    ${fotos.map(f => `<a href="${f}" target="_blank"><img src="${f}" class="thumb"/></a>`).join("")}
  </div>`;
}

function getTime(d) {
  return d.criadoEm?.toMillis?.() || 0;
}

window.carregar = async function () {
  const snap = await getDocs(collection(db, tipo));
  const lista = document.getElementById("lista");
  const titulo = document.getElementById("titulo");

  titulo.innerText = tipo;

  let dados = [];

  snap.forEach(doc => {
    dados.push({ id: doc.id, ...doc.data() });
  });

  // 🔥 ordenação mais recente
  dados.sort((a,b) => getTime(b) - getTime(a));

  lista.innerHTML = "";

  dados.forEach(d => {

    lista.innerHTML += `
      <tr>
        <td>${fotosHTML(d)}</td>

        <td><span class="status ${d.status}">${d.status}</span></td>

        <td>${d.titulo || "-"}</td>

        <td>${d.usuarioEmail || "-"}</td>

        <td>
          ${d.marca || ""} ${d.modelo || ""}<br>
          ${d.ano || ""}
        </td>

        <td>
          <button class="success" onclick="aprovar('${tipo}','${d.id}')">✔</button>
          <button class="danger" onclick="recusar('${tipo}','${d.id}')">✖</button>
        </td>
      </tr>
    `;
  });
};

window.aprovar = async (c, id) => {
  await updateDoc(doc(db, c, id), {
    status: "ATIVO",
    atualizadoEm: serverTimestamp()
  });
  carregar();
};

window.recusar = async (c, id) => {
  const m = prompt("Motivo:");
  if (!m) return;

  await updateDoc(doc(db, c, id), {
    status: "RECUSADO",
    motivoRecusa: m,
    atualizadoEm: serverTimestamp()
  });
  carregar();
};
</script>

</body>
</html>
