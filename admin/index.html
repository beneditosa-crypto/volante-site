<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin - Volante</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="../favicon.ico">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: #0f1115;
      color: #e5e7eb;
    }

    .hidden {
      display: none !important;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }

    input,
    textarea {
      width: 100%;
      padding: 11px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: #20242b;
      color: white;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: #6b7280;
    }

    /* LOGIN */

    .login {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-box {
      width: 340px;
      background: #1c1f24;
      border: 1px solid #2a2f36;
      border-radius: 18px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .login-logo {
      width: 58px;
      height: 58px;
      object-fit: contain;
      margin-bottom: 4px;
    }

    .login-title {
      margin: 0;
      font-size: 20px;
    }

    .login-subtitle {
      margin: -6px 0 10px;
      font-size: 13px;
      color: #9ca3af;
    }

    .btn-login {
      background: #e5e7eb;
      color: #111827;
      margin-top: 4px;
    }

    .login-help {
      font-size: 12px;
      color: #9ca3af;
      line-height: 1.4;
    }

    /* HEADER */

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: #1c1f24;
      border-bottom: 1px solid #2a2f36;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 36px;
      height: 36px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .titulo {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .titulo strong {
      font-size: 16px;
      white-space: nowrap;
    }

    .titulo span {
      font-size: 12px;
      color: #9ca3af;
    }

    .header-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    .btn-refresh {
      background: #374151;
      color: white;
    }

    .btn-logout {
      background: #991b1b;
      color: white;
    }

    /* CONTAINER */

    .container {
      padding: 14px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .summary {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .summary-card {
      background: #1c1f24;
      border: 1px solid #2a2f36;
      border-radius: 14px;
      padding: 10px 12px;
      min-width: 130px;
    }

    .summary-card strong {
      display: block;
      font-size: 18px;
    }

    .summary-card span {
      font-size: 12px;
      color: #9ca3af;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      background: #15181d;
      border: 1px solid #242933;
      border-radius: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 940px;
    }

    th {
      font-size: 12px;
      color: #9ca3af;
      text-align: left;
      padding: 10px;
      border-bottom: 1px solid #242933;
      font-weight: 700;
    }

    td {
      padding: 9px 10px;
      border-bottom: 1px solid #20242b;
      font-size: 13px;
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .preview {
      width: 64px;
      height: 46px;
      border-radius: 8px;
      background: #2a2f36;
      object-fit: cover;
      display: block;
    }

    .sem-foto {
      width: 64px;
      height: 46px;
      border-radius: 8px;
      background: #2a2f36;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      font-size: 11px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .tipo {
      background: #374151;
      color: #f9fafb;
    }

    .status-ativo {
      background: #14532d;
      color: #bbf7d0;
    }

    .status-pendente {
      background: #78350f;
      color: #fde68a;
    }

    .status-recusado {
      background: #7f1d1d;
      color: #fecaca;
    }

    .status-excluido {
      background: #374151;
      color: #d1d5db;
    }

    .titulo-item {
      font-weight: 700;
      color: #f9fafb;
      max-width: 260px;
    }

    .subinfo {
      color: #9ca3af;
      font-size: 12px;
      margin-top: 3px;
    }

    .usuario {
      max-width: 230px;
      color: #d1d5db;
      word-break: break-word;
    }

    .acoes {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      align-items: center;
      flex-wrap: nowrap;
    }

    .acoes button {
      height: 32px;
      font-size: 12px;
      padding: 0 10px;
      white-space: nowrap;
    }

    .detalhar {
      background: #374151;
      color: white;
    }

    .aprovar {
      background: #15803d;
      color: white;
    }

    .devolver {
      background: #d97706;
      color: #111827;
    }

    .excluir {
      background: #991b1b;
      color: white;
    }

    .empty,
    .erro {
      padding: 18px;
      color: #9ca3af;
    }

    .erro {
      color: #fca5a5;
    }

    /* MODAIS */

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      z-index: 50;
    }

    .modal-box {
      background: #1c1f24;
      border: 1px solid #2a2f36;
      padding: 18px;
      border-radius: 16px;
      width: min(520px, 100%);
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 20px 70px rgba(0,0,0,0.45);
    }

    .modal-box h3 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .modal-box textarea {
      height: 100px;
      resize: vertical;
      margin-top: 8px;
    }

    .modal-buttons {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .cancelar {
      background: #374151;
      color: white;
    }

    .detalhe-grid {
      display: grid;
      gap: 8px;
      font-size: 13px;
    }

    .detalhe-grid div {
      padding: 8px;
      background: #15181d;
      border-radius: 10px;
      border: 1px solid #242933;
    }

    .detalhe-grid strong {
      display: block;
      color: #9ca3af;
      font-size: 11px;
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .detalhe-fotos {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin: 10px 0;
      padding-bottom: 4px;
    }

    .detalhe-fotos img {
      width: 140px;
      height: 95px;
      object-fit: cover;
      border-radius: 10px;
      background: #2a2f36;
      flex-shrink: 0;
    }

    @media (max-width: 700px) {
      .header {
        align-items: flex-start;
        flex-direction: column;
      }

      .header-buttons {
        width: 100%;
      }

      .header-buttons button {
        flex: 1;
      }

      .login-box {
        width: 100%;
      }
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="login-box">
    <img src="../logo.png" class="login-logo" alt="Volante">
    <h2 class="login-title">Painel Administrativo</h2>
    <p class="login-subtitle">Volante App</p>

    <input id="email" type="email" placeholder="Email do administrador" autocomplete="email">
    <input id="senha" type="password" placeholder="Senha" autocomplete="current-password">

    <button class="btn-login" onclick="login()">Entrar</button>

    <div class="login-help">
      Acesso restrito ao administrador autorizado.
    </div>
  </div>
</div>

<!-- PAINEL -->
<div id="painel" class="hidden">

  <div class="header">
    <div class="header-left">
      <img src="../logo.png" class="logo" alt="Volante">

      <div class="titulo">
        <strong>Painel Administrativo</strong>
        <span id="adminEmail">Volante App</span>
      </div>
    </div>

    <div class="header-buttons">
      <button class="btn-refresh" onclick="carregar()">Atualizar</button>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="container">
    <div class="summary">
      <div class="summary-card">
        <strong id="totalItens">0</strong>
        <span>Total</span>
      </div>

      <div class="summary-card">
        <strong id="totalPendentes">0</strong>
        <span>Pendentes</span>
      </div>

      <div class="summary-card">
        <strong id="totalAnuncios">0</strong>
        <span>Anúncios</span>
      </div>

      <div class="summary-card">
        <strong id="totalEventos">0</strong>
        <span>Eventos</span>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Foto</th>
            <th>Tipo</th>
            <th>Status</th>
            <th>Título</th>
            <th>Usuário</th>
            <th style="text-align:right;">Ações</th>
          </tr>
        </thead>

        <tbody id="lista">
          <tr>
            <td colspan="6" class="empty">Carregando...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- MODAL DEVOLVER -->
<div id="modalDevolver" class="modal hidden">
  <div class="modal-box">
    <h3>Devolver item</h3>

    <div class="subinfo" id="devolverTitulo"></div>

    <textarea id="motivo" placeholder="Informe o motivo da devolução"></textarea>

    <div class="modal-buttons">
      <button class="devolver" onclick="confirmarDevolucao()">Confirmar devolução</button>
      <button class="cancelar" onclick="fecharModalDevolver()">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL DETALHAR -->
<div id="modalDetalhe" class="modal hidden">
  <div class="modal-box">
    <h3>Detalhes do item</h3>

    <div id="detalheConteudo"></div>

    <div class="modal-buttons">
      <button class="cancelar" onclick="fecharModalDetalhe()">Fechar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signInWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770",
  storageBucket: "clube-da-caminhonete-be770.firebasestorage.app",
  messagingSenderId: "559157035885",
  appId: "1:559157035885:web:dd265c86d0a3db6a6b9064",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ADMIN_EMAIL = "admin@clube.com";

let itens = [];
let itemSelecionado = null;

const loginEl = document.getElementById("login");
const painelEl = document.getElementById("painel");
const listaEl = document.getElementById("lista");

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    mostrarLogin();
    return;
  }

  if ((user.email || "").trim().toLowerCase() !== ADMIN_EMAIL) {
    await signOut(auth);
    alert("Acesso negado.");
    mostrarLogin();
    return;
  }

  mostrarPainel(user.email);
  carregar();
});

function mostrarLogin() {
  painelEl.classList.add("hidden");
  loginEl.classList.remove("hidden");
}

function mostrarPainel(email) {
  loginEl.classList.add("hidden");
  painelEl.classList.remove("hidden");
  document.getElementById("adminEmail").innerText = email || "Volante App";
}

window.login = async function () {
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value;

  if (!email || !senha) {
    alert("Informe email e senha.");
    return;
  }

  if (email.toLowerCase() !== ADMIN_EMAIL) {
    alert("Acesso permitido somente ao administrador.");
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, senha);
  } catch (erro) {
    console.error(erro);
    alert("Não foi possível entrar. Verifique email e senha.");
  }
};

window.logout = async function () {
  await signOut(auth);
  mostrarLogin();
};

function primeiraFoto(item) {
  const d = item.dados;

  if (item.tipo === "Anúncio") {
    return d.fotos?.[0] || d.foto || d.imagem || "";
  }

  return d.imagem || d.foto || d.fotos?.[0] || "";
}

function tituloItem(item) {
  return item.dados.titulo || item.dados.nome || "Sem título";
}

function usuarioItem(item) {
  return (
    item.dados.usuarioEmail ||
    item.dados.emailUsuario ||
    item.dados.email ||
    item.dados.criadoPor ||
    item.dados.userEmail ||
    "-"
  );
}

function localItem(item) {
  const cidade = item.dados.cidade || "";
  const estado = item.dados.estado || "";
  const local = `${cidade} ${estado}`.trim();
  return local || "";
}

function statusClass(status) {
  const s = (status || "").toUpperCase();

  if (s === "ATIVO") return "status-ativo";
  if (s === "PENDENTE") return "status-pendente";
  if (s === "RECUSADO" || s === "DEVOLVIDO") return "status-recusado";
  if (s === "EXCLUIDO") return "status-excluido";

  return "status-pendente";
}

function escapar(valor) {
  return String(valor ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

async function buscarColecao(nomeColecao, tipo) {
  const snapshot = await getDocs(collection(db, nomeColecao));

  return snapshot.docs.map((documento) => ({
    id: documento.id,
    colecao: nomeColecao,
    tipo,
    dados: documento.data()
  }));
}

window.carregar = async function () {
  listaEl.innerHTML = `
    <tr>
      <td colspan="6" class="empty">Carregando...</td>
    </tr>
  `;

  try {
    const [anuncios, eventos] = await Promise.all([
      buscarColecao("anuncios", "Anúncio"),
      buscarColecao("eventos", "Evento")
    ]);

    itens = [...anuncios, ...eventos]
      .filter((item) => (item.dados.status || "").toUpperCase() !== "EXCLUIDO")
      .sort((a, b) => {
        const dataA = a.dados.criadoEm?.seconds || a.dados.createdAt?.seconds || a.dados.atualizadoEm?.seconds || 0;
        const dataB = b.dados.criadoEm?.seconds || b.dados.createdAt?.seconds || b.dados.atualizadoEm?.seconds || 0;
        return dataB - dataA;
      });

    renderizar();
  } catch (erro) {
    console.error(erro);
    listaEl.innerHTML = `
      <tr>
        <td colspan="6" class="erro">Erro ao carregar dados do Firebase.</td>
      </tr>
    `;
  }
};

function renderizar() {
  document.getElementById("totalItens").innerText = itens.length;
  document.getElementById("totalPendentes").innerText =
    itens.filter((i) => (i.dados.status || "").toUpperCase() === "PENDENTE").length;
  document.getElementById("totalAnuncios").innerText =
    itens.filter((i) => i.tipo === "Anúncio").length;
  document.getElementById("totalEventos").innerText =
    itens.filter((i) => i.tipo === "Evento").length;

  if (!itens.length) {
    listaEl.innerHTML = `
      <tr>
        <td colspan="6" class="empty">Nenhum item encontrado.</td>
      </tr>
    `;
    return;
  }

  listaEl.innerHTML = "";

  itens.forEach((item, index) => {
    const foto = primeiraFoto(item);
    const titulo = tituloItem(item);
    const usuario = usuarioItem(item);
    const status = item.dados.status || "PENDENTE";
    const local = localItem(item);

    listaEl.innerHTML += `
      <tr>
        <td>
          ${
            foto
              ? `<img class="preview" src="${escapar(foto)}" alt="Foto">`
              : `<div class="sem-foto">sem foto</div>`
          }
        </td>

        <td>
          <span class="tag tipo">${item.tipo}</span>
        </td>

        <td>
          <span class="tag ${statusClass(status)}">${escapar(status)}</span>
        </td>

        <td>
          <div class="titulo-item">${escapar(titulo)}</div>
          ${local ? `<div class="subinfo">${escapar(local)}</div>` : ""}
        </td>

        <td>
          <div class="usuario">${escapar(usuario)}</div>
        </td>

        <td>
          <div class="acoes">
            <button class="detalhar" onclick="detalhar(${index})">Detalhar</button>
            <button class="aprovar" onclick="aprovar(${index})">Aprovar</button>
            <button class="devolver" onclick="abrirModalDevolver(${index})">Devolver</button>
            <button class="excluir" onclick="excluirItem(${index})">Excluir</button>
          </div>
        </td>
      </tr>
    `;
  });
}

window.aprovar = async function (index) {
  const item = itens[index];

  if (!item) return;

  const confirmar = window.confirm(`Aprovar ${item.tipo.toLowerCase()} "${tituloItem(item)}"?`);

  if (!confirmar) return;

  try {
    await updateDoc(doc(db, item.colecao, item.id), {
      status: "ATIVO",
      motivoDevolucao: "",
      observacaoAdmin: "",
      atualizadoEm: serverTimestamp()
    });

    await carregar();
  } catch (erro) {
    console.error(erro);
    alert("Erro ao aprovar item.");
  }
};

window.abrirModalDevolver = function (index) {
  itemSelecionado = itens[index];

  if (!itemSelecionado) return;

  document.getElementById("devolverTitulo").innerText =
    `${itemSelecionado.tipo}: ${tituloItem(itemSelecionado)}`;

  document.getElementById("motivo").value =
    itemSelecionado.dados.motivoDevolucao ||
    itemSelecionado.dados.observacaoAdmin ||
    "";

  document.getElementById("modalDevolver").classList.remove("hidden");
};

window.fecharModalDevolver = function () {
  itemSelecionado = null;
  document.getElementById("modalDevolver").classList.add("hidden");
  document.getElementById("motivo").value = "";
};

window.confirmarDevolucao = async function () {
  const motivo = document.getElementById("motivo").value.trim();

  if (!itemSelecionado) return;

  if (!motivo) {
    alert("Informe o motivo da devolução.");
    return;
  }

  try {
    await updateDoc(doc(db, itemSelecionado.colecao, itemSelecionado.id), {
      status: "RECUSADO",
      motivoDevolucao: motivo,
      observacaoAdmin: motivo,
      atualizadoEm: serverTimestamp()
    });

    fecharModalDevolver();
    await carregar();
  } catch (erro) {
    console.error(erro);
    alert("Erro ao devolver item.");
  }
};

window.excluirItem = async function (index) {
  const item = itens[index];

  if (!item) return;

  const confirmar = window.confirm(`Excluir ${item.tipo.toLowerCase()} "${tituloItem(item)}"?`);

  if (!confirmar) return;

  try {
    await updateDoc(doc(db, item.colecao, item.id), {
      status: "EXCLUIDO",
      atualizadoEm: serverTimestamp()
    });

    await carregar();
  } catch (erro) {
    console.error(erro);
    alert("Erro ao excluir item.");
  }
};

window.detalhar = function (index) {
  const item = itens[index];

  if (!item) return;

  const d = item.dados;
  const fotos = item.tipo === "Anúncio"
    ? (d.fotos || [])
    : ([d.imagem || d.foto].filter(Boolean));

  const fotosHtml = fotos.length
    ? `
      <div class="detalhe-fotos">
        ${fotos.map((foto) => `<img src="${escapar(foto)}" alt="Foto">`).join("")}
      </div>
    `
    : "";

  document.getElementById("detalheConteudo").innerHTML = `
    ${fotosHtml}

    <div class="detalhe-grid">
      <div><strong>Tipo</strong>${escapar(item.tipo)}</div>
      <div><strong>Status</strong>${escapar(d.status || "PENDENTE")}</div>
      <div><strong>Título</strong>${escapar(tituloItem(item))}</div>
      <div><strong>Usuário</strong>${escapar(usuarioItem(item))}</div>
      <div><strong>Cidade/Estado</strong>${escapar(localItem(item) || "-")}</div>
      <div><strong>Marca</strong>${escapar(d.marca || "-")}</div>
      <div><strong>Modelo</strong>${escapar(d.modelo || "-")}</div>
      <div><strong>Ano</strong>${escapar(d.ano || d.anoFabricacao || "-")}</div>
      <div><strong>Preço</strong>${escapar(d.preco || "-")}</div>
      <div><strong>Telefone</strong>${escapar(d.telefone || d.whatsapp || "-")}</div>
      <div><strong>Descrição</strong>${escapar(d.descricao || d.observacoes || "-")}</div>
      <div><strong>Motivo/Observação Admin</strong>${escapar(d.motivoDevolucao || d.observacaoAdmin || "-")}</div>
    </div>
  `;

  document.getElementById("modalDetalhe").classList.remove("hidden");
};

window.fecharModalDetalhe = function () {
  document.getElementById("modalDetalhe").classList.add("hidden");
  document.getElementById("detalheConteudo").innerHTML = "";
};
</script>
