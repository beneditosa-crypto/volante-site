<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Volante Admin</title>
<link rel="icon" href="/logo.png" />

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: #f4f6f8;
  color: #111827;
}

header {
  background: #0b0f14;
  color: #fff;
  padding: 16px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand img {
  width: 38px;
  height: 38px;
  border-radius: 999px;
  object-fit: contain;
}

.brand-text strong {
  font-size: 20px;
}

.brand-text small {
  display: block;
  color: #9ca3af;
  font-size: 12px;
  margin-top: 2px;
}

#usuarioArea {
  font-size: 13px;
  text-align: right;
}

.login-page {
  min-height: calc(100vh - 72px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 30%),
    linear-gradient(135deg, #0b0f14 0%, #111827 45%, #f4f6f8 45%, #f4f6f8 100%);
}

.login-card {
  width: 100%;
  max-width: 460px;
  background: #fff;
  border-radius: 22px;
  padding: 30px;
  box-shadow: 0 24px 70px rgba(0,0,0,0.18);
  border: 1px solid #e5e7eb;
}

.login-logo {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 24px;
}

.login-logo img {
  width: 52px;
  height: 52px;
  border-radius: 999px;
  object-fit: contain;
  background: #0b0f14;
  padding: 4px;
}

.login-logo strong {
  font-size: 22px;
}

.login-logo span {
  display: block;
  color: #6b7280;
  font-size: 13px;
  margin-top: 2px;
}

h2 {
  margin: 0 0 8px;
  font-size: 26px;
}

.login-desc {
  color: #6b7280;
  font-size: 14px;
  margin-bottom: 22px;
  line-height: 1.5;
}

input {
  width: 100%;
  padding: 15px;
  border: 1px solid #d1d5db;
  border-radius: 14px;
  font-size: 15px;
  margin-bottom: 12px;
  outline: none;
}

input:focus {
  border-color: #111827;
}

button {
  padding: 11px 15px;
  border: none;
  border-radius: 12px;
  background: #111827;
  color: #fff;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
}

button.full {
  width: 100%;
  padding: 15px;
  margin-top: 8px;
}

button.secondary {
  background: #e5e7eb;
  color: #111827;
}

button.danger {
  background: #9b111e;
}

button.success {
  background: #147a3d;
}

.alerta {
  margin-top: 14px;
  background: #fff3cd;
  color: #856404;
  padding: 12px;
  border-radius: 12px;
  font-size: 14px;
}

#painel {
  display: none;
  max-width: 1400px;
  margin: auto;
  padding: 16px;
}

.top-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.card {
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 16px;
  overflow: hidden;
}

.table-wrap {
  width: 100%;
  overflow-x: auto;
}

table {
  width: 100%;
  min-width: 1150px;
  border-collapse: collapse;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  text-align: left;
  font-size: 14px;
  vertical-align: top;
}

th {
  background: #fafafa;
  font-size: 13px;
  color: #555;
}

.status {
  display: inline-block;
  padding: 5px 9px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
}

.PENDENTE { background: #fff3cd; color: #856404; }
.ATIVO { background: #d4edda; color: #155724; }
.RECUSADO { background: #f8d7da; color: #721c24; }
.EXCLUIDO { background: #eee; color: #555; }

.fotos {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  max-width: 250px;
}

.thumb {
  width: 72px;
  height: 54px;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid #ddd;
  background: #eee;
}

.no-image {
  width: 96px;
  height: 72px;
  border-radius: 10px;
  background: #eee;
  border: 1px solid #ddd;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #777;
  font-size: 12px;
  text-align: center;
}

.actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.muted {
  color: #666;
  font-size: 13px;
}

@media (max-width: 700px) {
  header {
    align-items: flex-start;
    gap: 12px;
  }

  .login-page {
    background: #f4f6f8;
  }

  .login-card {
    padding: 24px;
  }
}
</style>
</head>

<body>

<header>
  <div class="brand">
    <img src="/logo.png" alt="Volante" />
    <div class="brand-text">
      <strong>Volante Admin</strong>
      <small>Painel administrativo</small>
    </div>
  </div>

  <div id="usuarioArea"></div>
</header>

<div id="loginArea" class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <img src="/logo.png" alt="Volante" />
      <div>
        <strong>Volante</strong>
        <span>Área restrita de moderação</span>
      </div>
    </div>

    <h2>Entrar no Admin</h2>

    <div class="login-desc">
      Acesse para revisar anúncios, eventos, imagens, aprovações e recusas do Volante.
    </div>

    <input id="email" type="email" placeholder="E-mail administrativo" />
    <input id="senha" type="password" placeholder="Senha" />

    <button class="full" onclick="loginAdmin()">Entrar</button>

    <button class="full secondary" onclick="window.location.href='https://volante.app.br'">
      Ir para o site público
    </button>

    <div id="loginMensagem"></div>
  </div>
</div>

<div id="painel">

  <div class="top-actions">
    <button class="secondary" onclick="window.location.href='https://volante.app.br'">
      Site público
    </button>

    <button onclick="tipoAtual='anuncios'; carregar()">Anúncios</button>
    <button onclick="tipoAtual='eventos'; carregar()">Eventos</button>
    <button class="secondary" onclick="carregar()">Atualizar</button>
    <button class="danger" onclick="logout()">Sair</button>
  </div>

  <h2 id="tituloSecao">Todos os anúncios</h2>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Fotos</th>
            <th>Status</th>
            <th>Título</th>
            <th>Usuário</th>
            <th>Local</th>
            <th>Dados</th>
            <th>Motivo</th>
            <th>Ações</th>
          </tr>
        </thead>

        <tbody id="lista">
          <tr><td colspan="8">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged,
  signInWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770",
  storageBucket: "clube-da-caminhonete-be770.firebasestorage.app",
  messagingSenderId: "559157035885",
  appId: "1:559157035885:web:dd265c86d0a3db6a6b9064",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "admin@clube.com";

window.tipoAtual = "anuncios";

onAuthStateChanged(auth, (user) => {
  const loginArea = document.getElementById("loginArea");
  const painel = document.getElementById("painel");
  const usuarioArea = document.getElementById("usuarioArea");
  const loginMensagem = document.getElementById("loginMensagem");

  if (!user) {
    loginArea.style.display = "flex";
    painel.style.display = "none";
    usuarioArea.innerHTML = "";
    return;
  }

  const email = user.email.trim().toLowerCase();

  if (email !== ADMIN_EMAIL) {
    loginArea.style.display = "flex";
    painel.style.display = "none";

    usuarioArea.innerHTML = `
      ${user.email}<br>
      <button onclick="logout()" style="margin-top:6px;">Sair</button>
    `;

    loginMensagem.innerHTML = `
      <div class="alerta">
        Você está logado como <strong>${user.email}</strong>.<br>
        Para acessar o painel, entre com <strong>${ADMIN_EMAIL}</strong>.
      </div>
    `;
    return;
  }

  loginArea.style.display = "none";
  painel.style.display = "block";

  usuarioArea.innerHTML = `
    ${user.email}<br>
    <button onclick="logout()" style="margin-top:6px;">Sair</button>
  `;

  carregar();
});

window.loginAdmin = async function () {
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value.trim();
  const loginMensagem = document.getElementById("loginMensagem");

  if (!email || !senha) {
    loginMensagem.innerHTML = `<div class="alerta">Informe e-mail e senha.</div>`;
    return;
  }

  if (email.toLowerCase() !== ADMIN_EMAIL) {
    loginMensagem.innerHTML = `<div class="alerta">Use o e-mail administrativo: ${ADMIN_EMAIL}</div>`;
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, senha);
  } catch (error) {
    console.error(error);
    loginMensagem.innerHTML = `<div class="alerta">Erro ao entrar. Confira e-mail e senha.</div>`;
  }
};

window.logout = async function () {
  await signOut(auth);
  location.reload();
};

function limparTexto(valor) {
  if (valor === undefined || valor === null) return "";
  return String(valor)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatarPreco(valor) {
  if (!valor) return "-";

  const numero = Number(valor);

  if (Number.isNaN(numero)) return valor;

  return numero.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function obterFotos(d) {
  if (Array.isArray(d.fotos) && d.fotos.length > 0) return d.fotos;
  if (d.foto) return [d.foto];
  if (d.imagem) return [d.imagem];
  return [];
}

function fotosHtml(fotos, titulo) {
  if (!fotos || fotos.length === 0) {
    return `<div class="no-image">Sem imagem</div>`;
  }

  return `
    <div class="fotos">
      ${fotos.map((url) => {
        const seguraUrl = limparTexto(url);
        const seguroTitulo = limparTexto(titulo);

        return `
          <a href="${seguraUrl}" target="_blank" rel="noopener noreferrer">
            <img class="thumb" src="${seguraUrl}" alt="${seguroTitulo}" />
          </a>
        `;
      }).join("")}
    </div>
  `;
}

function obterDataOrdenacao(d) {
  if (d.criadoEm && typeof d.criadoEm.toMillis === "function") {
    return d.criadoEm.toMillis();
  }

  if (d.atualizadoEm && typeof d.atualizadoEm.toMillis === "function") {
    return d.atualizadoEm.toMillis();
  }

  return 0;
}

window.carregar = async function () {
  const lista = document.getElementById("lista");
  const tituloSecao = document.getElementById("tituloSecao");

  tituloSecao.innerText = tipoAtual === "anuncios"
    ? "Todos os anúncios"
    : "Todos os eventos";

  lista.innerHTML = `<tr><td colspan="8">Carregando...</td></tr>`;

  try {
    const snapshot = await getDocs(collection(db, tipoAtual));

    const itens = [];

    snapshot.forEach((docSnap) => {
      itens.push({
        id: docSnap.id,
        data: docSnap.data()
      });
    });

    itens.sort((a, b) => obterDataOrdenacao(b.data) - obterDataOrdenacao(a.data));

    lista.innerHTML = "";

    if (itens.length === 0) {
      lista.innerHTML = `<tr><td colspan="8">Nenhum item encontrado.</td></tr>`;
      return;
    }

    itens.forEach((item) => {
      const d = item.data;
      const id = item.id;

      const status = d.status || "PENDENTE";
      const titulo = d.titulo || (tipoAtual === "anuncios" ? "Veículo anunciado" : "Evento");
      const usuario = d.usuarioEmail || d.email || "Não informado";
      const local = [d.cidade, d.estado].filter(Boolean).join(" - ") || "Não informado";
      const motivo = d.motivoRecusa || "-";
      const fotos = obterFotos(d);

      const dados = tipoAtual === "anuncios"
        ? `
          <strong>${limparTexto(d.marca || "")} ${limparTexto(d.modelo || "")}</strong><br>
          Ano: ${limparTexto(d.ano || "-")}<br>
          Preço: ${limparTexto(formatarPreco(d.preco))}
        `
        : `
          Data: ${limparTexto(d.data || "-")}<br>
          Link: ${limparTexto(d.link || "-")}
        `;

      lista.innerHTML += `
        <tr>
          <td>${fotosHtml(fotos, titulo)}</td>

          <td>
            <span class="status ${limparTexto(status)}">${limparTexto(status)}</span>
          </td>

          <td>
            <strong>${limparTexto(titulo)}</strong><br>
            <span class="muted">ID: ${limparTexto(id)}</span>
          </td>

          <td>${limparTexto(usuario)}</td>
          <td>${limparTexto(local)}</td>
          <td>${dados}</td>
          <td>${limparTexto(motivo)}</td>

          <td>
            <div class="actions">
              <button class="success" onclick="aprovar('${tipoAtual}', '${id}')">Aprovar</button>
              <button class="danger" onclick="recusar('${tipoAtual}', '${id}')">Recusar</button>
            </div>
          </td>
        </tr>
      `;
    });

  } catch (error) {
    console.error(error);
    lista.innerHTML = `<tr><td colspan="8">Erro ao carregar o painel.</td></tr>`;
  }
};

window.aprovar = async function (colecao, id) {
  if (!confirm("Aprovar este item?")) return;

  try {
    await updateDoc(doc(db, colecao, id), {
      status: "ATIVO",
      motivoRecusa: "",
      atualizadoEm: serverTimestamp()
    });

    carregar();
  } catch (error) {
    console.error(error);
    alert("Erro ao aprovar.");
  }
};

window.recusar = async function (colecao, id) {
  const motivo = prompt("Informe o motivo da recusa:");

  if (!motivo) {
    alert("Informe um motivo.");
    return;
  }

  try {
    await updateDoc(doc(db, colecao, id), {
      status: "RECUSADO",
      motivoRecusa: motivo,
      atualizadoEm: serverTimestamp()
    });

    carregar();
  } catch (error) {
    console.error(error);
    alert("Erro ao recusar.");
  }
};
</script>

</body>
</html>
