<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Painel Administrativo</title>
<link rel="icon" href="/logo.png" />

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Roboto, sans-serif;
  background: #121212;
  color: #e0e0e0;
}

/* HEADER */
header {
  background: #1f1f1f;
  padding: 16px 22px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #2a2a2a;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand img {
  width: 34px;
  height: 34px;
  border-radius: 50%;
}

.brand strong {
  font-size: 17px;
}

#usuarioArea {
  font-size: 13px;
  color: #9e9e9e;
}

/* BUTTONS */
button {
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
}

.btn {
  padding: 8px 12px;
  font-size: 12px;
}

.gray { background: #2a2a2a; color: #fff; }
.green { background: #43a047; color: #fff; }
.red { background: #e53935; color: #fff; }

/* LOGIN */
.login {
  min-height: calc(100vh - 64px);
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-card {
  width: 100%;
  max-width: 360px;
  background: #1e1e1e;
  border-radius: 16px;
  padding: 24px;
  border: 1px solid #2a2a2a;
}

input {
  width: 100%;
  padding: 13px;
  border-radius: 8px;
  border: 1px solid #333;
  background: #121212;
  color: #fff;
  margin-bottom: 10px;
}

/* PANEL */
#painel {
  display: none;
  max-width: 1500px;
  margin: auto;
  padding: 20px;
}

.painel-topo {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
}

.table {
  background: #1e1e1e;
  border-radius: 14px;
  overflow-x: auto;
  border: 1px solid #2a2a2a;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 14px;
  border-bottom: 1px solid #2a2a2a;
  font-size: 13px;
}

th {
  background: #181818;
  color: #9e9e9e;
}

tr:hover {
  background: #1a1a1a;
}

/* STATUS */
.status {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px;
}

.PENDENTE { background: #fbc02d; color: #000; }
.ATIVO { background: #43a047; }
.RECUSADO { background: #e53935; }
.EXCLUIDO { background: #424242; }

/* TIPO */
.tipo {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px;
  background: #2a2a2a;
}

.tipo.evento { background: #283593; }

/* IMAGES */
.fotos {
  display: flex;
  gap: 6px;
}

.thumb {
  width: 64px;
  height: 48px;
  object-fit: cover;
  border-radius: 6px;
}

.acoes {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
</style>
</head>

<body>

<header>
  <div class="brand">
    <img src="/logo.png" />
    <strong>Painel Administrativo</strong>
  </div>

  <div>
    <span id="usuarioArea"></span>
    <button class="btn red" onclick="logout()">Sair</button>
  </div>
</header>

<div id="login" class="login">
  <div class="login-card">
    <input id="email" placeholder="E-mail" />
    <input id="senha" type="password" placeholder="Senha" />
    <button class="btn gray" onclick="login()">Entrar</button>
  </div>
</div>

<div id="painel">

  <div class="painel-topo">
    <h2>Fila de moderação</h2>
    <button class="btn gray" onclick="carregar()">Atualizar</button>
  </div>

  <div class="table">
    <table>
      <thead>
        <tr>
          <th>Fotos</th>
          <th>Tipo</th>
          <th>Status</th>
          <th>Título</th>
          <th>Usuário</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770"
});

const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN = "admin@clube.com";

onAuthStateChanged(auth, user => {
  if (!user || user.email !== ADMIN) {
    login.style.display = "flex";
    painel.style.display = "none";
    return;
  }

  login.style.display = "none";
  painel.style.display = "block";
  usuarioArea.innerText = user.email;
  carregar();
});

window.login = async () => {
  const email = email.value;
  const senha = senha.value;
  if (email !== ADMIN) return;
  await signInWithEmailAndPassword(auth, email, senha);
};

window.logout = () => signOut(auth);

function fotosHTML(d){
  const fotos = d.fotos || (d.foto ? [d.foto] : []);
  return fotos.map(f=>`<img src="${f}" class="thumb"/>`).join("");
}

window.carregar = async ()=>{
  const lista = document.getElementById("lista");

  const anuncios = await getDocs(collection(db,"anuncios"));
  const eventos = await getDocs(collection(db,"eventos"));

  let dados = [];

  anuncios.forEach(doc=>dados.push({id:doc.id,tipo:"Anúncio",col:"anuncios",...doc.data()}));
  eventos.forEach(doc=>dados.push({id:doc.id,tipo:"Evento",col:"eventos",...doc.data()}));

  dados.sort((a,b)=>(b.criadoEm?.seconds||0)-(a.criadoEm?.seconds||0));

  lista.innerHTML="";

  dados.forEach(d=>{
    lista.innerHTML+=`
    <tr>
      <td>${fotosHTML(d)}</td>
      <td><span class="tipo ${d.tipo==='Evento'?'evento':''}">${d.tipo}</span></td>
      <td><span class="status ${d.status}">${d.status}</span></td>
      <td>${d.titulo||'-'}</td>
      <td>${d.usuarioEmail||'-'}</td>
      <td class="acoes">
        <button class="btn green" onclick="aprovar('${d.col}','${d.id}')">Aprovar</button>
        <button class="btn gray" onclick="devolver('${d.col}','${d.id}')">Devolver</button>
        <button class="btn red" onclick="excluir('${d.col}','${d.id}')">Excluir</button>
      </td>
    </tr>`;
  });
};

window.aprovar = async (c,id)=>{
  if(!confirm("Aprovar item?")) return;
  await updateDoc(doc(db,c,id),{status:"ATIVO"});
  carregar();
};

window.devolver = async (c,id)=>{
  const motivo = prompt("Informe o motivo da devolução:");
  if(!motivo) return alert("Motivo obrigatório");
  await updateDoc(doc(db,c,id),{status:"RECUSADO", motivoRecusa:motivo});
  carregar();
};

window.excluir = async (c,id)=>{
  if(!confirm("Excluir item?")) return;
  await updateDoc(doc(db,c,id),{status:"EXCLUIDO"});
  carregar();
};
</script>

</body>
</html>
