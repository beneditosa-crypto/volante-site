<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Painel Administrativo</title>
<link rel="icon" href="/logo.png" />

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #0b0f14;
  color: #e5e7eb;
}

/* HEADER */
header {
  background: #070a0e;
  padding: 18px 22px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #1f2937;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand img {
  width: 36px;
  height: 36px;
  border-radius: 999px;
}

.brand strong {
  font-size: 18px;
  color: #fff;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

#usuarioArea {
  font-size: 13px;
  color: #9ca3af;
}

button {
  border: none;
  cursor: pointer;
  font-weight: 700;
  border-radius: 12px;
}

.btn {
  padding: 11px 16px;
}

.gray { background: #1f2937; color: #e5e7eb; }
.red { background: #b91c1c; color: #fff; }
.green { background: #15803d; color: #fff; }

/* LOGIN */
.login {
  min-height: calc(100vh - 72px);
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-card {
  width: 100%;
  max-width: 360px;
  background: #111827;
  border-radius: 18px;
  padding: 28px;
  border: 1px solid #1f2937;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #374151;
  background: #0b0f14;
  color: #fff;
  margin-bottom: 10px;
}

.login-card button {
  width: 100%;
  padding: 14px;
}

.alerta {
  color: #f87171;
  font-size: 13px;
  margin-top: 10px;
}

/* PANEL */
#painel {
  display: none;
  max-width: 1500px;
  margin: auto;
  padding: 18px;
}

.painel-topo {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.painel-topo h2 {
  margin: 0;
  color: #fff;
}

.resumo {
  color: #9ca3af;
  font-size: 13px;
}

/* TABLE */
.table {
  background: #111827;
  border-radius: 16px;
  overflow-x: auto;
  border: 1px solid #1f2937;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1200px;
}

th, td {
  padding: 14px;
  border-bottom: 1px solid #1f2937;
  font-size: 13px;
}

th {
  background: #0b0f14;
  color: #9ca3af;
}

.tipo {
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: bold;
  background: #1f2937;
}

.tipo.evento {
  background: #1e3a8a;
}

.status {
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: bold;
}

.PENDENTE { background: #facc15; color: #000; }
.ATIVO { background: #16a34a; }
.RECUSADO { background: #dc2626; }
.EXCLUIDO { background: #374151; }

.fotos {
  display: flex;
  gap: 6px;
}

.thumb {
  width: 64px;
  height: 48px;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid #374151;
}

.no-image {
  width: 80px;
  height: 48px;
  border-radius: 8px;
  background: #1f2937;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #777;
}

.acoes {
  display: flex;
  gap: 8px;
}
</style>
</head>

<body>

<header>
  <div class="brand">
    <img src="/logo.png" />
    <strong>Painel Administrativo</strong>
  </div>

  <div class="header-actions">
    <div id="usuarioArea"></div>
    <button id="botaoSairHeader" class="btn red" onclick="logout()" style="display:none;">Sair</button>
  </div>
</header>

<div id="login" class="login">
  <div class="login-card">
    <input id="email" placeholder="E-mail" />
    <input id="senha" type="password" placeholder="Senha" />

    <button class="gray" onclick="login()">Entrar</button>

    <div id="msg" class="alerta"></div>
  </div>
</div>

<div id="painel">

  <div class="painel-topo">
    <div>
      <h2>Fila de moderação</h2>
      <div id="resumo" class="resumo"></div>
    </div>

    <button class="btn gray" onclick="carregar()">Atualizar</button>
  </div>

  <div class="table">
    <table>
      <thead>
        <tr>
          <th>Fotos</th>
          <th>Tipo</th>
          <th>Status</th>
          <th>Título</th>
          <th>Usuário</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770"
});

const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN = "admin@clube.com";

onAuthStateChanged(auth, user => {
  if (!user || user.email !== ADMIN) {
    document.getElementById("login").style.display = "flex";
    document.getElementById("painel").style.display = "none";
    return;
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("painel").style.display = "block";
  document.getElementById("usuarioArea").innerText = user.email;
  document.getElementById("botaoSairHeader").style.display = "inline-block";

  carregar();
});

window.login = async () => {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  if (email !== ADMIN) return;

  await signInWithEmailAndPassword(auth, email, senha);
};

window.logout = () => signOut(auth);

function fotosHTML(d) {
  const fotos = d.fotos || (d.foto ? [d.foto] : []);
  if (!fotos.length) return `<div class="no-image">Sem</div>`;
  return fotos.map(f => `<img src="${f}" class="thumb"/>`).join("");
}

window.carregar = async () => {
  const lista = document.getElementById("lista");

  const anuncios = await getDocs(collection(db, "anuncios"));
  const eventos = await getDocs(collection(db, "eventos"));

  let dados = [];

  anuncios.forEach(doc => dados.push({ id: doc.id, tipo: "Anúncio", col: "anuncios", ...doc.data() }));
  eventos.forEach(doc => dados.push({ id: doc.id, tipo: "Evento", col: "eventos", ...doc.data() }));

  dados.sort((a,b) => (b.criadoEm?.seconds||0)-(a.criadoEm?.seconds||0));

  lista.innerHTML = "";

  dados.forEach(d => {
    lista.innerHTML += `
      <tr>
        <td>${fotosHTML(d)}</td>
        <td><span class="tipo ${d.tipo==='Evento'?'evento':''}">${d.tipo}</span></td>
        <td><span class="status ${d.status}">${d.status}</span></td>
        <td>${d.titulo||'-'}</td>
        <td>${d.usuarioEmail||'-'}</td>
        <td class="acoes">
          <button class="green" onclick="aprovar('${d.col}','${d.id}')">✔</button>
          <button class="red" onclick="recusar('${d.col}','${d.id}')">✖</button>
        </td>
      </tr>
    `;
  });
};

window.aprovar = async (c,id)=>{
  await updateDoc(doc(db,c,id),{status:"ATIVO", atualizadoEm:serverTimestamp()});
  carregar();
};

window.recusar = async (c,id)=>{
  await updateDoc(doc(db,c,id),{status:"RECUSADO", atualizadoEm:serverTimestamp()});
  carregar();
};
</script>

</body>
</html>
