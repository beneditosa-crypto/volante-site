<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo - Volante</title>
<link rel="icon" href="../favicon.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #0f1115;
  color: #e5e7eb;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
}

.hidden { display: none !important; }

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  background: #1c1f24;
  border-bottom: 1px solid #2a2f36;
  position: sticky;
  top: 0;
  z-index: 10;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  width: 34px;
  height: 34px;
  object-fit: contain;
}

.header-title {
  display: flex;
  flex-direction: column;
}

.header-title strong {
  font-size: 17px;
}

.header-title span {
  font-size: 12px;
  color: #9ca3af;
}

.header-actions {
  display: flex;
  gap: 8px;
}

button {
  border: none;
  border-radius: 10px;
  padding: 9px 12px;
  font-weight: 700;
  cursor: pointer;
}

.btn-update { background: #374151; color: white; }
.btn-logout { background: #b91c1c; color: white; }
.btn-ok { background: #15803d; color: white; }
.btn-dev { background: #d97706; color: #111827; }
.btn-del { background: #b91c1c; color: white; }
.btn-sec { background: #374151; color: white; }

.container {
  padding: 16px;
  max-width: 1280px;
  margin: 0 auto;
}

.filtros {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.filtros button {
  background: #1f2937;
  color: #d1d5db;
}

.filtros button.ativo {
  background: #e5e7eb;
  color: #111827;
}

.lista {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.item-card {
  display: grid;
  grid-template-columns: 96px 1fr 230px;
  gap: 14px;
  align-items: center;
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 16px;
  padding: 12px;
}

.foto {
  width: 96px;
  height: 72px;
  border-radius: 12px;
  object-fit: cover;
  background: #2a2f36;
  display: block;
}

.sem-foto {
  width: 96px;
  height: 72px;
  border-radius: 12px;
  background: #2a2f36;
  color: #6b7280;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.info-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}

.tag {
  display: inline-flex;
  padding: 4px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 800;
}

.tipo { background: #374151; color: white; }

.status-pendente {
  background: #78350f;
  color: #fde68a;
}

.status-ativo {
  background: #14532d;
  color: #bbf7d0;
}

.status-recusado {
  background: #7f1d1d;
  color: #fecaca;
}

.status-excluido {
  background: #374151;
  color: #d1d5db;
}

.titulo-item {
  font-size: 15px;
  font-weight: 800;
  color: #f9fafb;
  margin-bottom: 5px;
}

.meta {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  color: #9ca3af;
  font-size: 12px;
}

.usuario {
  color: #d1d5db;
  font-size: 13px;
  margin-top: 6px;
  word-break: break-word;
}

.acoes {
  display: grid;
  grid-template-columns: 1fr;
  gap: 7px;
}

.acoes button {
  width: 100%;
  height: 36px;
  font-size: 13px;
}

.data {
  font-size: 12px;
  color: #9ca3af;
  text-align: right;
  margin-bottom: 8px;
}

.mensagem {
  color: #9ca3af;
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 14px;
  padding: 18px;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.72);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
  z-index: 99;
}

.modal-box {
  width: min(460px, 100%);
  background: #1c1f24;
  border: 1px solid #2a2f36;
  border-radius: 16px;
  padding: 18px;
}

textarea {
  width: 100%;
  height: 100px;
  border-radius: 10px;
  border: 1px solid #374151;
  background: #20242b;
  color: white;
  padding: 10px;
  margin: 10px 0;
}

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

@media (max-width: 800px) {
  .item-card {
    grid-template-columns: 84px 1fr;
  }

  .foto,
  .sem-foto {
    width: 84px;
    height: 64px;
  }

  .acoes {
    grid-column: 1 / -1;
    grid-template-columns: repeat(3, 1fr);
  }

  .data {
    text-align: left;
  }
}
</style>
</head>

<body>

<header class="header">
  <div class="header-left">
    <img src="../logo.png" class="logo" alt="Volante">

    <div class="header-title">
      <strong>Painel Administrativo</strong>
      <span id="adminEmail">Volante App</span>
    </div>
  </div>

  <div class="header-actions">
    <button class="btn-update" onclick="carregar()">Atualizar</button>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</header>

<main class="container">

  <div class="filtros">
    <button id="filtro-todos" class="ativo" onclick="filtrar('TODOS')">Todos</button>
    <button id="filtro-pendente" onclick="filtrar('PENDENTE')">Pendentes</button>
    <button id="filtro-ativo" onclick="filtrar('ATIVO')">Ativos</button>
    <button id="filtro-recusado" onclick="filtrar('RECUSADO')">Recusados</button>
    <button id="filtro-excluido" onclick="filtrar('EXCLUIDO')">Excluídos</button>
  </div>

  <div id="lista" class="lista">
    <div class="mensagem">Carregando...</div>
  </div>

</main>

<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h3>Motivo da devolução</h3>
    <textarea id="motivo" placeholder="Informe o motivo"></textarea>

    <div class="modal-actions">
      <button class="btn-dev" onclick="confirmarDevolucao()">Confirmar</button>
      <button class="btn-sec" onclick="fecharModal()">Cancelar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770",
  storageBucket: "clube-da-caminhonete-be770.firebasestorage.app",
  messagingSenderId: "559157035885",
  appId: "1:559157035885:web:dd265c86d0a3db6a6b9064",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ADMIN_EMAIL = "admin@clube.com";

let itens = [];
let statusAtual = "TODOS";
let selecionado = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "/admin/login.html";
    return;
  }

  if ((user.email || "").toLowerCase() !== ADMIN_EMAIL) {
    await signOut(auth);
    window.location.href = "/admin/login.html";
    return;
  }

  document.getElementById("adminEmail").innerText = user.email;
  carregar();
});

window.logout = async function () {
  await signOut(auth);
  window.location.href = "/admin/login.html";
};

window.filtrar = function (status) {
  statusAtual = status;

  document.querySelectorAll(".filtros button").forEach(btn => {
    btn.classList.remove("ativo");
  });

  const id = "filtro-" + status.toLowerCase();
  const btn = document.getElementById(id);

  if (btn) {
    btn.classList.add("ativo");
  }

  if (status === "TODOS") {
    document.getElementById("filtro-todos").classList.add("ativo");
  }

  renderizar();
};

window.carregar = async function () {
  const lista = document.getElementById("lista");
  lista.innerHTML = `<div class="mensagem">Carregando...</div>`;

  try {
    const [anunciosSnap, eventosSnap] = await Promise.all([
      getDocs(collection(db, "anuncios")),
      getDocs(collection(db, "eventos"))
    ]);

    itens = [];

    anunciosSnap.forEach((d) => {
      itens.push({
        id: d.id,
        colecao: "anuncios",
        tipo: "Anúncio",
        dados: d.data()
      });
    });

    eventosSnap.forEach((d) => {
      itens.push({
        id: d.id,
        colecao: "eventos",
        tipo: "Evento",
        dados: d.data()
      });
    });

    itens.sort((a, b) => obterData(b) - obterData(a));

    renderizar();

  } catch (e) {
    console.error(e);
    lista.innerHTML = `<div class="mensagem">Erro ao carregar dados.</div>`;
  }
};

function obterData(item) {
  const d = item.dados;

  return (
    d.atualizadoEm?.seconds ||
    d.criadoEm?.seconds ||
    d.createdAt?.seconds ||
    d.dataCriacao?.seconds ||
    d.data?.seconds ||
    0
  );
}

function formatarData(item) {
  const segundos = obterData(item);

  if (!segundos) return "sem data";

  return new Date(segundos * 1000).toLocaleString("pt-BR", {
    day: "2-digit",
    month: "2-digit",
    year: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function renderizar() {
  const lista = document.getElementById("lista");

  const filtrados = itens.filter((item) => {
    const status = (item.dados.status || "PENDENTE").toUpperCase();
    return statusAtual === "TODOS" || status === statusAtual;
  });

  if (!filtrados.length) {
    lista.innerHTML = `<div class="mensagem">Nenhum item encontrado.</div>`;
    return;
  }

  lista.innerHTML = "";

  filtrados.forEach((item) => {
    const index = itens.indexOf(item);
    const d = item.dados;

    const foto = item.tipo === "Anúncio"
      ? d.fotos?.[0]
      : d.imagem || d.foto || d.fotos?.[0];

    const status = (d.status || "PENDENTE").toUpperCase();
    const titulo = d.titulo || d.nome || "Sem título";
    const cidade = d.cidade || "";
    const estado = d.estado || "";
    const usuario = d.usuarioEmail || d.email || d.emailUsuario || "-";
    const local = `${cidade} ${estado}`.trim();

    lista.innerHTML += `
      <div class="item-card">
        <div>
          ${foto ? `<img class="foto" src="${foto}">` : `<div class="sem-foto">sem foto</div>`}
        </div>

        <div>
          <div class="info-top">
            <span class="tag tipo">${item.tipo}</span>
            <span class="tag ${classeStatus(status)}">${status}</span>
          </div>

          <div class="titulo-item">${titulo}</div>

          <div class="meta">
            ${local ? `<span>${local}</span>` : ""}
            <span>${formatarData(item)}</span>
          </div>

          <div class="usuario">${usuario}</div>
        </div>

        <div>
          <div class="data">${formatarData(item)}</div>

          <div class="acoes">
            <button class="btn-ok" onclick="aprovar(${index})">Aprovar</button>
            <button class="btn-dev" onclick="abrirModal(${index})">Devolver</button>
            <button class="btn-del" onclick="excluirItem(${index})">Excluir</button>
          </div>
        </div>
      </div>
    `;
  });
}

function classeStatus(status) {
  if (status === "ATIVO") return "status-ativo";
  if (status === "RECUSADO") return "status-recusado";
  if (status === "EXCLUIDO") return "status-excluido";
  return "status-pendente";
}

window.aprovar = async function (index) {
  const item = itens[index];

  await updateDoc(doc(db, item.colecao, item.id), {
    status: "ATIVO",
    motivoDevolucao: "",
    observacaoAdmin: "",
    atualizadoEm: serverTimestamp()
  });

  carregar();
};

window.abrirModal = function (index) {
  selecionado = itens[index];
  document.getElementById("modal").classList.remove("hidden");
};

window.fecharModal = function () {
  selecionado = null;
  document.getElementById("modal").classList.add("hidden");
  document.getElementById("motivo").value = "";
};

window.confirmarDevolucao = async function () {
  const motivo = document.getElementById("motivo").value.trim();

  if (!motivo) {
    alert("Informe o motivo.");
    return;
  }

  await updateDoc(doc(db, selecionado.colecao, selecionado.id), {
    status: "RECUSADO",
    motivoDevolucao: motivo,
    observacaoAdmin: motivo,
    atualizadoEm: serverTimestamp()
  });

  fecharModal();
  carregar();
};

window.excluirItem = async function (index) {
  const item = itens[index];

  if (!confirm("Excluir este item?")) return;

  await updateDoc(doc(db, item.colecao, item.id), {
    status: "EXCLUIDO",
    atualizadoEm: serverTimestamp()
  });

  carregar();
};
</script>

</body>
</html>
