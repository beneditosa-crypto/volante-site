<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo - Volante</title>
<link rel="icon" href="../favicon.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #0f1115;
  color: #e5e7eb;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
}

.hidden { display: none !important; }

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  background: #1c1f24;
  border-bottom: 1px solid #2a2f36;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  width: 34px;
  height: 34px;
  object-fit: contain;
}

.header-title {
  display: flex;
  flex-direction: column;
}

.header-title strong {
  font-size: 17px;
}

.header-title span {
  font-size: 12px;
  color: #9ca3af;
}

.header-actions {
  display: flex;
  gap: 8px;
}

button {
  border: none;
  border-radius: 10px;
  padding: 9px 12px;
  font-weight: 700;
  cursor: pointer;
}

.btn-update { background: #374151; color: white; }
.btn-logout { background: #b91c1c; color: white; }
.btn-ok { background: #15803d; color: white; }
.btn-dev { background: #d97706; color: #111827; }
.btn-del { background: #b91c1c; color: white; }
.btn-sec { background: #374151; color: white; }

.container {
  padding: 16px;
}

.filtros {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.filtros button {
  background: #1f2937;
  color: #d1d5db;
}

.filtros button.ativo {
  background: #e5e7eb;
  color: #111827;
}

.table-box {
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 14px;
  overflow-x: auto;
}

table {
  width: 100%;
  min-width: 1050px;
  border-collapse: collapse;
}

th {
  text-align: left;
  padding: 10px 12px;
  font-size: 12px;
  color: #9ca3af;
  border-bottom: 1px solid #1f2937;
}

td {
  padding: 9px 12px;
  border-bottom: 1px solid #1f2937;
  font-size: 13px;
  vertical-align: middle;
}

.preview {
  width: 76px;
  height: 54px;
  object-fit: cover;
  border-radius: 9px;
  background: #2a2f36;
  display: block;
}

.sem-foto {
  width: 76px;
  height: 54px;
  border-radius: 9px;
  background: #2a2f36;
  color: #6b7280;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.tag {
  display: inline-flex;
  padding: 4px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 800;
}

.tipo { background: #374151; color: white; }

.status-pendente { color: #facc15; font-weight: 800; }
.status-ativo { color: #22c55e; font-weight: 800; }
.status-recusado { color: #f87171; font-weight: 800; }
.status-excluido { color: #9ca3af; font-weight: 800; }

.titulo-item {
  font-weight: 700;
  color: #f9fafb;
}

.subinfo {
  margin-top: 3px;
  font-size: 12px;
  color: #9ca3af;
}

.usuario {
  word-break: break-word;
}

.acoes {
  display: flex;
  gap: 6px;
  justify-content: flex-end;
  flex-wrap: nowrap;
}

.acoes button {
  height: 34px;
  padding: 0 11px;
  font-size: 12px;
  white-space: nowrap;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.72);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
  z-index: 99;
}

.modal-box {
  width: min(460px, 100%);
  background: #1c1f24;
  border: 1px solid #2a2f36;
  border-radius: 16px;
  padding: 18px;
}

textarea {
  width: 100%;
  height: 100px;
  border-radius: 10px;
  border: 1px solid #374151;
  background: #20242b;
  color: white;
  padding: 10px;
  margin: 10px 0;
}

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.mensagem {
  color: #9ca3af;
  padding: 18px;
}
</style>
</head>

<body>

<header class="header">
  <div class="header-left">
    <img src="../logo.png" class="logo" alt="Volante">

    <div class="header-title">
      <strong>Painel Administrativo</strong>
      <span id="adminEmail">Volante App</span>
    </div>
  </div>

  <div class="header-actions">
    <button class="btn-update" onclick="carregar()">Atualizar</button>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</header>

<main class="container">

  <div class="filtros">
    <button id="filtro-todos" class="ativo" onclick="filtrar('TODOS')">Todos</button>
    <button id="filtro-pendente" onclick="filtrar('PENDENTE')">Pendentes</button>
    <button id="filtro-ativo" onclick="filtrar('ATIVO')">Ativos</button>
    <button id="filtro-recusado" onclick="filtrar('RECUSADO')">Recusados</button>
    <button id="filtro-excluido" onclick="filtrar('EXCLUIDO')">Excluídos</button>
  </div>

  <div class="table-box">
    <table>
      <thead>
        <tr>
          <th>Foto</th>
          <th>Tipo</th>
          <th>Status</th>
          <th>Título</th>
          <th>Usuário</th>
          <th style="text-align:right;">Ações</th>
        </tr>
      </thead>

      <tbody id="lista">
        <tr>
          <td colspan="6" class="mensagem">Carregando...</td>
        </tr>
      </tbody>
    </table>
  </div>

</main>

<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h3>Motivo da devolução</h3>
    <textarea id="motivo" placeholder="Informe o motivo"></textarea>

    <div class="modal-actions">
      <button class="btn-dev" onclick="confirmarDevolucao()">Confirmar</button>
      <button class="btn-sec" onclick="fecharModal()">Cancelar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770",
  storageBucket: "clube-da-caminhonete-be770.firebasestorage.app",
  messagingSenderId: "559157035885",
  appId: "1:559157035885:web:dd265c86d0a3db6a6b9064",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ADMIN_EMAIL = "admin@clube.com";

let itens = [];
let statusAtual = "TODOS";
let selecionado = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "/admin/login.html";
    return;
  }

  if ((user.email || "").toLowerCase() !== ADMIN_EMAIL) {
    await signOut(auth);
    window.location.href = "/admin/login.html";
    return;
  }

  document.getElementById("adminEmail").innerText = user.email;
  carregar();
});

window.logout = async function () {
  await signOut(auth);
  window.location.href = "/admin/login.html";
};

window.filtrar = function (status) {
  statusAtual = status;

  document.querySelectorAll(".filtros button").forEach(btn => {
    btn.classList.remove("ativo");
  });

  const id = "filtro-" + status.toLowerCase();
  const btn = document.getElementById(id);
  if (btn) btn.classList.add("ativo");

  if (status === "TODOS") {
    document.getElementById("filtro-todos").classList.add("ativo");
  }

  renderizar();
};

window.carregar = async function () {
  const lista = document.getElementById("lista");

  lista.innerHTML = `
    <tr>
      <td colspan="6" class="mensagem">Carregando...</td>
    </tr>
  `;

  try {
    const [anunciosSnap, eventosSnap] = await Promise.all([
      getDocs(collection(db, "anuncios")),
      getDocs(collection(db, "eventos"))
    ]);

    itens = [];

    anunciosSnap.forEach((d) => {
      itens.push({
        id: d.id,
        colecao: "anuncios",
        tipo: "Anúncio",
        dados: d.data()
      });
    });

    eventosSnap.forEach((d) => {
      itens.push({
        id: d.id,
        colecao: "eventos",
        tipo: "Evento",
        dados: d.data()
      });
    });

    renderizar();

  } catch (e) {
    console.error(e);
    lista.innerHTML = `
      <tr>
        <td colspan="6" class="mensagem">Erro ao carregar dados.</td>
      </tr>
    `;
  }
};

function renderizar() {
  const lista = document.getElementById("lista");

  const filtrados = itens.filter((item) => {
    const status = (item.dados.status || "PENDENTE").toUpperCase();
    return statusAtual === "TODOS" || status === statusAtual;
  });

  if (!filtrados.length) {
    lista.innerHTML = `
      <tr>
        <td colspan="6" class="mensagem">Nenhum item encontrado.</td>
      </tr>
    `;
    return;
  }

  lista.innerHTML = "";

  filtrados.forEach((item) => {
    const index = itens.indexOf(item);
    const d = item.dados;
    const foto = item.tipo === "Anúncio"
      ? d.fotos?.[0]
      : d.imagem || d.foto || d.fotos?.[0];

    const status = (d.status || "PENDENTE").toUpperCase();

    lista.innerHTML += `
      <tr>
        <td>
          ${foto ? `<img class="preview" src="${foto}">` : `<div class="sem-foto">sem foto</div>`}
        </td>

        <td><span class="tag tipo">${item.tipo}</span></td>

        <td>
          <span class="${classeStatus(status)}">${status}</span>
        </td>

        <td>
          <div class="titulo-item">${d.titulo || d.nome || "Sem título"}</div>
          <div class="subinfo">${d.cidade || ""} ${d.estado || ""}</div>
        </td>

        <td>
          <div class="usuario">${d.usuarioEmail || d.email || d.emailUsuario || "-"}</div>
        </td>

        <td>
          <div class="acoes">
            <button class="btn-ok" onclick="aprovar(${index})">Aprovar</button>
            <button class="btn-dev" onclick="abrirModal(${index})">Devolver</button>
            <button class="btn-del" onclick="excluirItem(${index})">Excluir</button>
          </div>
        </td>
      </tr>
    `;
  });
}

function classeStatus(status) {
  if (status === "ATIVO") return "status-ativo";
  if (status === "RECUSADO") return "status-recusado";
  if (status === "EXCLUIDO") return "status-excluido";
  return "status-pendente";
}

window.aprovar = async function (index) {
  const item = itens[index];

  await updateDoc(doc(db, item.colecao, item.id), {
    status: "ATIVO",
    motivoDevolucao: "",
    observacaoAdmin: "",
    atualizadoEm: serverTimestamp()
  });

  carregar();
};

window.abrirModal = function (index) {
  selecionado = itens[index];
  document.getElementById("modal").classList.remove("hidden");
};

window.fecharModal = function () {
  selecionado = null;
  document.getElementById("modal").classList.add("hidden");
  document.getElementById("motivo").value = "";
};

window.confirmarDevolucao = async function () {
  const motivo = document.getElementById("motivo").value.trim();

  if (!motivo) {
    alert("Informe o motivo.");
    return;
  }

  await updateDoc(doc(db, selecionado.colecao, selecionado.id), {
    status: "RECUSADO",
    motivoDevolucao: motivo,
    observacaoAdmin: motivo,
    atualizadoEm: serverTimestamp()
  });

  fecharModal();
  carregar();
};

window.excluirItem = async function (index) {
  const item = itens[index];

  if (!confirm("Excluir este item?")) return;

  await updateDoc(doc(db, item.colecao, item.id), {
    status: "EXCLUIDO",
    atualizadoEm: serverTimestamp()
  });

  carregar();
};
</script>

</body>
</html>
