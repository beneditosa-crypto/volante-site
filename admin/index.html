<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Volante Admin</title>

<link rel="icon" href="/logo.png" />

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f5f7fa;
  color: #111;
}

/* HEADER */
header {
  background: #0b0f14;
  color: #fff;
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 34px;
  height: 34px;
}

.logo strong {
  font-size: 18px;
}

/* CONTAINER */
.container {
  max-width: 1400px;
  margin: auto;
  padding: 16px;
}

/* BUTTONS */
button {
  padding: 8px 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 500;
}

.primary { background: #111; color: #fff; }
.secondary { background: #e9e9e9; }
.success { background: #1e8e3e; color: #fff; }
.danger { background: #c5221f; color: #fff; }

/* TABLE */
.table-wrap {
  background: #fff;
  border-radius: 14px;
  overflow-x: auto;
  border: 1px solid #e6e6e6;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  font-size: 13px;
}

th {
  background: #fafafa;
  text-align: left;
}

/* STATUS */
.status {
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: bold;
}

.PENDENTE { background: #fff3cd; }
.ATIVO { background: #d4edda; }
.RECUSADO { background: #f8d7da; }
.EXCLUIDO { background: #eee; }

/* IMAGENS */
.fotos {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.thumb {
  width: 60px;
  height: 45px;
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid #ddd;
}

/* LOGIN */
.login-box {
  max-width: 360px;
  margin: 60px auto;
  background: #fff;
  padding: 20px;
  border-radius: 16px;
  border: 1px solid #e6e6e6;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="/logo.png" />
    <strong>Volante Admin</strong>
  </div>

  <div id="usuario"></div>
</header>

<div id="login" class="login-box">
  <h3>Entrar</h3>
  <input id="email" placeholder="E-mail admin"/>
  <input id="senha" type="password" placeholder="Senha"/>
  <button class="primary" onclick="login()">Entrar</button>
</div>

<div id="app" class="container" style="display:none">

  <button onclick="tipo='anuncios'; carregar()">Anúncios</button>
  <button onclick="tipo='eventos'; carregar()">Eventos</button>
  <button onclick="logout()">Sair</button>

  <h2 id="titulo"></h2>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Fotos</th>
          <th>Status</th>
          <th>Título</th>
          <th>Usuário</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770"
});

const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN = "admin@clube.com";

let tipo = "anuncios";

onAuthStateChanged(auth, user => {
  if (!user || user.email !== ADMIN) {
    document.getElementById("login").style.display = "block";
    document.getElementById("app").style.display = "none";
    return;
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("usuario").innerText = user.email;

  carregar();
});

window.login = async () => {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;
  await signInWithEmailAndPassword(auth, email, senha);
};

window.logout = () => signOut(auth);

function fotosHTML(d) {
  const fotos = d.fotos || (d.foto ? [d.foto] : []);
  return fotos.map(f => `<img src="${f}" class="thumb"/>`).join("");
}

window.carregar = async () => {
  const snap = await getDocs(collection(db, tipo));
  const lista = document.getElementById("lista");
  const titulo = document.getElementById("titulo");

  titulo.innerText = tipo;

  let dados = [];

  snap.forEach(doc => {
    dados.push({ id: doc.id, ...doc.data() });
  });

  dados.sort((a,b) => (b.criadoEm?.seconds || 0) - (a.criadoEm?.seconds || 0));

  lista.innerHTML = "";

  dados.forEach(d => {
    lista.innerHTML += `
      <tr>
        <td>${fotosHTML(d)}</td>
        <td><span class="status ${d.status}">${d.status}</span></td>
        <td>${d.titulo}</td>
        <td>${d.usuarioEmail}</td>
        <td>
          <button class="success" onclick="aprovar('${tipo}','${d.id}')">✔</button>
          <button class="danger" onclick="recusar('${tipo}','${d.id}')">✖</button>
        </td>
      </tr>
    `;
  });
};

window.aprovar = async (c,id) => {
  await updateDoc(doc(db,c,id), { status:"ATIVO" });
  carregar();
};

window.recusar = async (c,id) => {
  await updateDoc(doc(db,c,id), { status:"RECUSADO" });
  carregar();
};

</script>

</body>
</html>
