<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #0f1115;
  color: #e5e7eb;
  font-family: Arial;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 10px 16px;
  background: #1c1f24;
  border-bottom: 1px solid #2a2f36;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo {
  width: 26px;
}

.header-title {
  font-size: 14px;
}

.header-actions button {
  padding: 6px 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.btn-update { background: #374151; color: white; }
.btn-logout { background: #b91c1c; color: white; }

/* FILTRO */
.filtros {
  display: flex;
  gap: 6px;
  padding: 10px 16px;
}

.filtros button {
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 999px;
  border: none;
  background: #1f2937;
  color: #d1d5db;
  cursor: pointer;
}

.filtros button.ativo {
  background: #e5e7eb;
  color: #111;
}

/* LISTA */
.lista {
  padding: 10px;
}

.item {
  display: grid;
  grid-template-columns: 70px 1fr 280px;
  align-items: center;
  gap: 10px;
  padding: 8px;
  border-bottom: 1px solid #1f2937;
}

/* FOTO */
.foto {
  width: 70px;
  height: 50px;
  border-radius: 6px;
  object-fit: cover;
  background: #2a2f36;
}

/* INFO */
.info {
  font-size: 13px;
}

.titulo {
  font-weight: bold;
}

.meta {
  font-size: 11px;
  color: #9ca3af;
}

/* TAGS */
.tag {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 999px;
  margin-right: 4px;
}

.tipo { background: #374151; }
.pendente { color: #facc15; }
.ativo { color: #22c55e; }
.recusado { color: #f87171; }
.excluido { color: #9ca3af; }

/* AÇÕES */
.acoes {
  display: flex;
  gap: 6px;
  justify-content: flex-end;
}

.acoes button {
  height: 28px;
  font-size: 11px;
  padding: 0 10px;
  border-radius: 6px;
}

.btn-ok { background: #15803d; color: white; }
.btn-dev { background: #d97706; color: black; }
.btn-del { background: #b91c1c; color: white; }

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: #1c1f24;
  padding: 16px;
  border-radius: 10px;
  width: 280px;
}

textarea {
  width: 100%;
  height: 80px;
  margin: 10px 0;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="header">
  <div class="header-left">
    <img src="../logo.png" class="logo">
    <div class="header-title">Painel Administrativo</div>
  </div>

  <div class="header-actions">
    <button class="btn-update" onclick="carregar()">Atualizar</button>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</div>

<div class="filtros">
  <button onclick="filtrar('TODOS')" class="ativo">Todos</button>
  <button onclick="filtrar('PENDENTE')">Pendentes</button>
  <button onclick="filtrar('ATIVO')">Ativos</button>
  <button onclick="filtrar('RECUSADO')">Recusados</button>
  <button onclick="filtrar('EXCLUIDO')">Excluídos</button>
</div>

<div id="lista" class="lista"></div>

<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h4>Motivo</h4>
    <textarea id="motivo"></textarea>
    <button onclick="confirmar()">Confirmar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let itens = [];
let filtro = "TODOS";
let atual = null;

onAuthStateChanged(auth, user => {
  if (!user) location.href = "/admin/login.html";
  carregar();
});

window.logout = () => signOut(auth);

window.filtrar = (f) => {
  filtro = f;
  render();
};

async function carregar() {
  const anuncios = await getDocs(collection(db, "anuncios"));
  const eventos = await getDocs(collection(db, "eventos"));

  itens = [];

  anuncios.forEach(d => itens.push({ ...d.data(), id:d.id, tipo:"Anúncio" }));
  eventos.forEach(d => itens.push({ ...d.data(), id:d.id, tipo:"Evento" }));

  itens.sort((a,b) => (b.atualizadoEm?.seconds||0)-(a.atualizadoEm?.seconds||0));

  render();
}

function render() {
  const el = document.getElementById("lista");
  el.innerHTML = "";

  itens
    .filter(i => filtro==="TODOS" || (i.status||"PENDENTE")===filtro)
    .forEach((i,idx)=>{
      const foto = i.fotos?.[0] || i.imagem || "";

      el.innerHTML += `
        <div class="item">
          <img src="${foto}" class="foto">

          <div class="info">
            <div class="titulo">${i.titulo||"Sem título"}</div>
            <div class="meta">${i.cidade||""} ${i.estado||""}</div>
            <div class="meta">${i.usuarioEmail||""}</div>
          </div>

          <div class="acoes">
            <button class="btn-ok" onclick="aprovar(${idx})">OK</button>
            <button class="btn-dev" onclick="devolver(${idx})">Dev</button>
            <button class="btn-del" onclick="excluir(${idx})">X</button>
          </div>
        </div>
      `;
    });
}

window.aprovar = async (i)=>{
  await updateDoc(doc(db,"anuncios",itens[i].id),{status:"ATIVO"});
  carregar();
};

window.devolver = (i)=>{
  atual=i;
  document.getElementById("modal").classList.remove("hidden");
};

window.confirmar = async ()=>{
  const motivo=document.getElementById("motivo").value;
  await updateDoc(doc(db,"anuncios",itens[atual].id),{status:"RECUSADO",motivo});
  carregar();
};

window.excluir = async (i)=>{
  await updateDoc(doc(db,"anuncios",itens[i].id),{status:"EXCLUIDO"});
  carregar();
};
</script>

</body>
</html>
