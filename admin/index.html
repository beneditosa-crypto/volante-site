<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Painel Administrativo</title>
<link rel="icon" href="/logo.png" />

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f5f7fa;
  color: #111;
}

/* HEADER */
header {
  background: #0b0f14;
  color: #fff;
  padding: 18px 22px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand img {
  width: 36px;
  height: 36px;
  border-radius: 999px;
}

.brand strong {
  font-size: 18px;
}

#usuarioArea {
  font-size: 13px;
}

/* LOGIN */
.login {
  min-height: calc(100vh - 70px);
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  width: 100%;
  max-width: 360px;
  background: #fff;
  border-radius: 18px;
  padding: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.12);
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
}

button {
  padding: 12px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: 600;
}

.primary { background: #111827; color: #fff; }
.gray { background: #e5e7eb; }
.red { background: #9b111e; color: #fff; }
.green { background: #147a3d; color: #fff; }

/* PANEL */
#painel {
  display: none;
  max-width: 1400px;
  margin: auto;
  padding: 16px;
}

.top {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}

/* TABLE */
.table {
  background: #fff;
  border-radius: 16px;
  overflow-x: auto;
  border: 1px solid #e5e5e5;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1100px;
}

th, td {
  padding: 14px;
  border-bottom: 1px solid #eee;
  font-size: 13px;
}

th {
  background: #fafafa;
  text-align: left;
}

/* STATUS */
.status {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: bold;
}

.PENDENTE { background: #fff3cd; }
.ATIVO { background: #d4edda; }
.RECUSADO { background: #f8d7da; }
.EXCLUIDO { background: #eee; }

/* IMAGES */
.fotos {
  display: flex;
  gap: 6px;
}

.thumb {
  width: 64px;
  height: 48px;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 8px;
}

.actions button {
  width: 70px;
}

.alerta {
  color: #b91c1c;
  font-size: 13px;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>
  <div class="brand">
    <img src="/logo.png" />
    <strong>Painel Administrativo</strong>
  </div>

  <div id="usuarioArea"></div>
</header>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="card">
    <input id="email" placeholder="E-mail" />
    <input id="senha" type="password" placeholder="Senha" />

    <button class="primary" onclick="login()">Entrar</button>

    <div id="msg" class="alerta"></div>
  </div>
</div>

<!-- PAINEL -->
<div id="painel">

  <div class="top">
    <button class="primary" onclick="tipo='anuncios'; carregar()">Anúncios</button>
    <button class="primary" onclick="tipo='eventos'; carregar()">Eventos</button>
    <button class="gray" onclick="carregar()">Atualizar</button>
    <button class="red" onclick="logout()">Sair</button>
  </div>

  <div class="table">
    <table>
      <thead>
        <tr>
          <th>Fotos</th>
          <th>Status</th>
          <th>Título</th>
          <th>Usuário</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770"
});

const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN = "admin@clube.com";

let tipo = "anuncios";

onAuthStateChanged(auth, user => {
  if (!user || user.email !== ADMIN) {
    document.getElementById("login").style.display = "flex";
    document.getElementById("painel").style.display = "none";
    return;
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("painel").style.display = "block";
  document.getElementById("usuarioArea").innerText = user.email;

  carregar();
});

window.login = async () => {
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value.trim();

  if (email !== ADMIN) {
    document.getElementById("msg").innerText = "Acesso não permitido";
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, senha);
  } catch {
    document.getElementById("msg").innerText = "Erro ao entrar";
  }
};

window.logout = () => signOut(auth);

function fotosHTML(d) {
  const fotos = d.fotos || (d.foto ? [d.foto] : []);
  return fotos.map(f => `<img src="${f}" class="thumb"/>`).join("");
}

window.carregar = async () => {
  const snap = await getDocs(collection(db, tipo));
  const lista = document.getElementById("lista");

  let dados = [];
  snap.forEach(doc => dados.push({ id: doc.id, ...doc.data() }));

  dados.sort((a,b) => (b.criadoEm?.seconds || 0) - (a.criadoEm?.seconds || 0));

  lista.innerHTML = "";

  dados.forEach(d => {
    lista.innerHTML += `
      <tr>
        <td>${fotosHTML(d)}</td>
        <td><span class="status ${d.status}">${d.status}</span></td>
        <td>${d.titulo || "-"}</td>
        <td>${d.usuarioEmail || "-"}</td>
        <td class="actions">
          <button class="green" onclick="aprovar('${tipo}','${d.id}')">✔</button>
          <button class="red" onclick="recusar('${tipo}','${d.id}')">✖</button>
        </td>
      </tr>
    `;
  });
};

window.aprovar = async (c,id) => {
  await updateDoc(doc(db,c,id), { status:"ATIVO" });
  carregar();
};

window.recusar = async (c,id) => {
  await updateDoc(doc(db,c,id), { status:"RECUSADO" });
  carregar();
};
</script>

</body>
</html>
