<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Painel Administrativo</title>
<link rel="icon" href="/logo.png" />

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: #f5f7fa;
  color: #111827;
}

header {
  background: #0b0f14;
  color: #fff;
  padding: 18px 22px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand img {
  width: 36px;
  height: 36px;
  border-radius: 999px;
  object-fit: contain;
}

.brand strong {
  font-size: 18px;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

#usuarioArea {
  font-size: 13px;
  color: #d1d5db;
}

button {
  border: none;
  cursor: pointer;
  font-weight: 700;
  border-radius: 12px;
}

.btn {
  padding: 11px 16px;
}

.primary { background: #111827; color: #fff; }
.gray { background: #e5e7eb; color: #111827; }
.red { background: #9b111e; color: #fff; }
.green { background: #147a3d; color: #fff; }

.login {
  min-height: calc(100vh - 72px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 22px;
}

.login-card {
  width: 100%;
  max-width: 360px;
  background: #fff;
  border-radius: 18px;
  padding: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.12);
  border: 1px solid #e5e7eb;
}

.login-card h2 {
  margin: 0 0 18px;
  font-size: 22px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #d1d5db;
  margin-bottom: 10px;
  font-size: 15px;
}

.login-card button {
  width: 100%;
  padding: 14px;
  margin-top: 6px;
}

.alerta {
  color: #b91c1c;
  font-size: 13px;
  margin-top: 10px;
}

#painel {
  display: none;
  max-width: 1500px;
  margin: auto;
  padding: 18px;
}

.painel-topo {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  gap: 12px;
}

.painel-topo h2 {
  margin: 0;
  font-size: 22px;
}

.resumo {
  color: #6b7280;
  font-size: 13px;
  margin-top: 4px;
}

.table {
  background: #fff;
  border-radius: 16px;
  overflow-x: auto;
  border: 1px solid #e5e5e5;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1200px;
}

th, td {
  padding: 14px;
  border-bottom: 1px solid #eee;
  font-size: 13px;
  text-align: left;
  vertical-align: middle;
}

th {
  background: #fafafa;
  color: #374151;
  font-weight: 800;
}

.tipo {
  display: inline-block;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 800;
  background: #e5e7eb;
  color: #111827;
}

.tipo.evento {
  background: #dbeafe;
  color: #1e40af;
}

.tipo.anuncio {
  background: #f3f4f6;
  color: #111827;
}

.status {
  display: inline-block;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 800;
}

.PENDENTE { background: #fff3cd; color: #856404; }
.ATIVO { background: #d4edda; color: #155724; }
.RECUSADO { background: #f8d7da; color: #721c24; }
.EXCLUIDO { background: #eee; color: #555; }

.fotos {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  max-width: 270px;
}

.thumb {
  width: 64px;
  height: 48px;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid #ddd;
  background: #eee;
}

.no-image {
  width: 80px;
  height: 48px;
  border-radius: 8px;
  background: #eee;
  color: #777;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.acoes {
  display: flex;
  gap: 8px;
}

.acoes button {
  width: 72px;
  padding: 10px;
}

.muted {
  color: #6b7280;
  font-size: 12px;
}

@media (max-width: 700px) {
  header {
    align-items: flex-start;
    gap: 12px;
  }

  .header-actions {
    flex-direction: column;
    align-items: flex-end;
  }

  .painel-topo {
    align-items: flex-start;
    flex-direction: column;
  }
}
</style>
</head>

<body>

<header>
  <div class="brand">
    <img src="/logo.png" alt="Volante" />
    <strong>Painel Administrativo</strong>
  </div>

  <div class="header-actions">
    <div id="usuarioArea"></div>
    <button id="botaoSairHeader" class="btn red" onclick="logout()" style="display:none;">Sair</button>
  </div>
</header>

<div id="login" class="login">
  <div class="login-card">
    <h2>Acessar painel</h2>

    <input id="email" placeholder="E-mail" />
    <input id="senha" type="password" placeholder="Senha" />

    <button class="primary" onclick="login()">Entrar</button>

    <div id="msg" class="alerta"></div>
  </div>
</div>

<div id="painel">

  <div class="painel-topo">
    <div>
      <h2>Fila de moderação</h2>
      <div id="resumo" class="resumo">Carregando...</div>
    </div>

    <button class="btn gray" onclick="carregar()">Atualizar</button>
  </div>

  <div class="table">
    <table>
      <thead>
        <tr>
          <th>Fotos</th>
          <th>Tipo</th>
          <th>Status</th>
          <th>Título</th>
          <th>Usuário</th>
          <th>Local</th>
          <th>Dados</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="lista"></tbody>
    </table>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged,
  signInWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770",
  storageBucket: "clube-da-caminhonete-be770.firebasestorage.app",
  messagingSenderId: "559157035885",
  appId: "1:559157035885:web:dd265c86d0a3db6a6b9064",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN = "admin@clube.com";

onAuthStateChanged(auth, user => {
  if (!user || user.email !== ADMIN) {
    document.getElementById("login").style.display = "flex";
    document.getElementById("painel").style.display = "none";
    document.getElementById("usuarioArea").innerText = "";
    document.getElementById("botaoSairHeader").style.display = "none";
    return;
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("painel").style.display = "block";
  document.getElementById("usuarioArea").innerText = user.email;
  document.getElementById("botaoSairHeader").style.display = "inline-block";

  carregar();
});

window.login = async () => {
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value.trim();

  if (email !== ADMIN) {
    document.getElementById("msg").innerText = "Acesso não permitido";
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, senha);
  } catch {
    document.getElementById("msg").innerText = "Erro ao entrar";
  }
};

window.logout = async () => {
  await signOut(auth);
  location.reload();
};

function limparTexto(valor) {
  if (valor === undefined || valor === null) return "";
  return String(valor)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function obterFotos(d) {
  if (Array.isArray(d.fotos) && d.fotos.length > 0) return d.fotos;
  if (d.foto) return [d.foto];
  if (d.imagem) return [d.imagem];
  return [];
}

function fotosHTML(d) {
  const fotos = obterFotos(d);

  if (!fotos.length) {
    return `<div class="no-image">Sem foto</div>`;
  }

  return `
    <div class="fotos">
      ${fotos.map(f => {
        const url = limparTexto(f);
        return `
          <a href="${url}" target="_blank" rel="noopener noreferrer">
            <img src="${url}" class="thumb" />
          </a>
        `;
      }).join("")}
    </div>
  `;
}

function formatarPreco(valor) {
  if (!valor) return "-";

  const numero = Number(valor);

  if (Number.isNaN(numero)) return valor;

  return numero.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function obterData(d) {
  if (d.criadoEm?.toMillis) return d.criadoEm.toMillis();
  if (d.atualizadoEm?.toMillis) return d.atualizadoEm.toMillis();
  if (d.criadoEm?.seconds) return d.criadoEm.seconds * 1000;
  if (d.atualizadoEm?.seconds) return d.atualizadoEm.seconds * 1000;
  return 0;
}

async function buscarColecao(nome, tipoLabel) {
  const snap = await getDocs(collection(db, nome));
  const itens = [];

  snap.forEach(documento => {
    itens.push({
      id: documento.id,
      colecao: nome,
      tipo: tipoLabel,
      ...documento.data()
    });
  });

  return itens;
}

window.carregar = async () => {
  const lista = document.getElementById("lista");
  const resumo = document.getElementById("resumo");

  lista.innerHTML = `<tr><td colspan="8">Carregando...</td></tr>`;
  resumo.innerText = "Atualizando fila...";

  try {
    const anuncios = await buscarColecao("anuncios", "Anúncio");
    const eventos = await buscarColecao("eventos", "Evento");

    const dados = [...anuncios, ...eventos];

    dados.sort((a, b) => obterData(b) - obterData(a));

    const total = dados.length;
    const pendentes = dados.filter(i => (i.status || "PENDENTE") === "PENDENTE").length;
    const ativos = dados.filter(i => i.status === "ATIVO").length;
    const recusados = dados.filter(i => i.status === "RECUSADO").length;

    resumo.innerText =
      `${total} itens • ${pendentes} pendentes • ${ativos} ativos • ${recusados} recusados`;

    lista.innerHTML = "";

    if (!dados.length) {
      lista.innerHTML = `<tr><td colspan="8">Nenhum item encontrado.</td></tr>`;
      return;
    }

    dados.forEach(d => {
      const status = d.status || "PENDENTE";
      const tipoClasse = d.tipo === "Evento" ? "evento" : "anuncio";

      const local = [d.cidade, d.estado].filter(Boolean).join(" - ") || "-";

      const dadosItem = d.tipo === "Anúncio"
        ? `
          <strong>${limparTexto(d.marca || "")} ${limparTexto(d.modelo || "")}</strong><br>
          <span class="muted">Ano: ${limparTexto(d.ano || "-")}</span><br>
          <span class="muted">${limparTexto(formatarPreco(d.preco))}</span>
        `
        : `
          <strong>${limparTexto(d.data || "-")}</strong><br>
          <span class="muted">${limparTexto(d.link || "")}</span>
        `;

      lista.innerHTML += `
        <tr>
          <td>${fotosHTML(d)}</td>

          <td>
            <span class="tipo ${tipoClasse}">${limparTexto(d.tipo)}</span>
          </td>

          <td>
            <span class="status ${limparTexto(status)}">${limparTexto(status)}</span>
          </td>

          <td>
            <strong>${limparTexto(d.titulo || "-")}</strong><br>
            <span class="muted">${limparTexto(d.id)}</span>
          </td>

          <td>${limparTexto(d.usuarioEmail || d.email || "-")}</td>

          <td>${limparTexto(local)}</td>

          <td>${dadosItem}</td>

          <td>
            <div class="acoes">
              <button class="green" onclick="aprovar('${d.colecao}','${d.id}')">✔</button>
              <button class="red" onclick="recusar('${d.colecao}','${d.id}')">✖</button>
            </div>
          </td>
        </tr>
      `;
    });
  } catch (error) {
    console.error(error);
    lista.innerHTML = `<tr><td colspan="8">Erro ao carregar a fila.</td></tr>`;
    resumo.innerText = "Erro ao atualizar.";
  }
};

window.aprovar = async (colecao, id) => {
  await updateDoc(doc(db, colecao, id), {
    status: "ATIVO",
    motivoRecusa: "",
    atualizadoEm: serverTimestamp()
  });

  carregar();
};

window.recusar = async (colecao, id) => {
  const motivo = prompt("Motivo da recusa:");

  if (!motivo) return;

  await updateDoc(doc(db, colecao, id), {
    status: "RECUSADO",
    motivoRecusa: motivo,
    atualizadoEm: serverTimestamp()
  });

  carregar();
};
</script>

</body>
</html>
