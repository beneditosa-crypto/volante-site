<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo - Volante</title>
<link rel="icon" href="../favicon.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #0f1115;
  color: #e5e7eb;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  background: #111827;
  border-bottom: 1px solid #1f2937;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  width: 32px;
  height: 32px;
  object-fit: contain;
}

.header-title {
  display: flex;
  flex-direction: column;
}

.header-title strong {
  font-size: 16px;
}

.header-title span {
  font-size: 12px;
  color: #9ca3af;
}

.header-actions {
  display: flex;
  gap: 8px;
}

/* BOTÕES */
button {
  border: none;
  border-radius: 10px;
  padding: 8px 12px;
  font-weight: 600;
  cursor: pointer;
}

.btn-update {
  background: #374151;
  color: white;
}

.btn-logout {
  background: #b91c1c;
  color: white;
}

/* CONTAINER */
.container {
  padding: 16px;
}

/* TABELA */
.table-box {
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 14px;
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  text-align: left;
  padding: 12px;
  font-size: 12px;
  color: #9ca3af;
  border-bottom: 1px solid #1f2937;
}

td {
  padding: 10px 12px;
  border-bottom: 1px solid #1f2937;
  font-size: 13px;
}

/* FOTO */
.preview {
  width: 70px;
  height: 50px;
  object-fit: cover;
  border-radius: 8px;
}

/* TAGS */
.tag {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: bold;
}

.tipo {
  background: #374151;
}

.status-ativo {
  color: #22c55e;
  font-weight: bold;
}

/* AÇÕES */
.acoes {
  display: flex;
  gap: 6px;
  justify-content: flex-end;
}

.acoes button {
  height: 32px;
  font-size: 12px;
  padding: 0 12px;
}

.btn-ok {
  background: #15803d;
  color: white;
}

.btn-dev {
  background: #d97706;
  color: black;
}

.btn-del {
  background: #b91c1c;
  color: white;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  display: flex;
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: #111827;
  padding: 20px;
  border-radius: 12px;
  width: 300px;
}

textarea {
  width: 100%;
  height: 80px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  background: #1f2937;
  color: white;
  padding: 8px;
}

.modal-actions {
  display: flex;
  gap: 8px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<header class="header">
  <div class="header-left">
    <img src="../logo.png" class="logo">
    <div class="header-title">
      <strong>Painel Administrativo</strong>
      <span id="email"></span>
    </div>
  </div>

  <div class="header-actions">
    <button class="btn-update" onclick="carregar()">Atualizar</button>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</header>

<div class="container">
  <div class="table-box">
    <table>
      <thead>
        <tr>
          <th>Foto</th>
          <th>Tipo</th>
          <th>Status</th>
          <th>Título</th>
          <th>Usuário</th>
          <th style="text-align:right;">Ações</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>
  </div>
</div>

<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h3>Motivo da devolução</h3>
    <textarea id="motivo"></textarea>

    <div class="modal-actions">
      <button class="btn-dev" onclick="confirmar()">Confirmar</button>
      <button onclick="fechar()">Cancelar</button>
    </div>
  </div>
</div>

<script type="module" src="./admin.js"></script>

</body>
</html>
