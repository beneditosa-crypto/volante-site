<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo</title>
<link rel="icon" href="./favicon.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #0f1115;
  color: #e5e7eb;
  font-family: Arial, sans-serif;
}

.header {
  height: 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 18px;
  background: #1c1f24;
  border-bottom: 1px solid #2a2f36;
}

.logo {
  width: 28px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-title strong {
  font-size: 16px;
}

.header-title span {
  font-size: 12px;
  color: #9ca3af;
}

.header-actions button {
  margin-left: 6px;
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.btn-update { background:#374151;color:white;}
.btn-logout { background:#b91c1c;color:white;}

.filtros {
  display: flex;
  gap: 8px;
  padding: 12px;
  border-bottom: 1px solid #1f2937;
}

.filtros button {
  padding: 6px 12px;
  border-radius: 999px;
  background: #1f2937;
  color: #d1d5db;
  border: none;
  cursor: pointer;
}

.filtros button.ativo {
  background: white;
  color: black;
}

.lista {
  padding: 10px;
}

.linha {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border-bottom: 1px solid #1f2937;
}

.foto {
  width: 80px;
  height: 60px;
  object-fit: cover;
  border-radius: 6px;
}

.info {
  flex: 1;
}

.titulo {
  font-weight: bold;
  font-size: 14px;
}

.usuario {
  font-size: 12px;
  color: #9ca3af;
}

.desc {
  font-size: 12px;
  color: #cbd5e1;
  margin-top: 2px;
}

.tags {
  margin-top: 6px;
  display: flex;
  gap: 6px;
}

.tag {
  font-size: 10px;
  padding: 3px 6px;
  border-radius: 999px;
  background: #374151;
}

.status-ativo { color:#22c55e;}
.status-pendente { color:#facc15;}
.status-recusado { color:#f87171;}
.status-excluido { color:#9ca3af;}

.acoes {
  display: flex;
  gap: 6px;
}

.acoes button {
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
  font-size: 12px;
  cursor: pointer;
}

.ok { background:#15803d;color:white;}
.dev { background:#d97706;}
.del { background:#b91c1c;color:white;}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  display: flex;
  align-items: center;
  justify-content: center;
}

.hidden { display:none; }

.modal-box {
  background:#1c1f24;
  padding:16px;
  border-radius:10px;
  width:300px;
}

textarea {
  width:100%;
  height:80px;
  margin:10px 0;
}
</style>
</head>

<body>

<header class="header">
  <div class="header-left">
    <img src="./logo.png" class="logo">
    <div class="header-title">
      <strong>Volante App</strong><br>
      <span>Painel Administrativo</span><br>
      <span id="adminEmail"></span>
    </div>
  </div>

  <div class="header-actions">
    <button class="btn-update" onclick="carregar()">Atualizar</button>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</header>

<div class="filtros">
  <button onclick="filtrar('TODOS')" class="ativo">Todos</button>
  <button onclick="filtrar('PENDENTE')">Pendentes</button>
  <button onclick="filtrar('ATIVO')">Ativos</button>
  <button onclick="filtrar('RECUSADO')">Recusados</button>
  <button onclick="filtrar('EXCLUIDO')">Excluídos</button>
</div>

<div id="lista" class="lista"></div>

<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h4>Motivo da devolução</h4>
    <textarea id="motivo"></textarea>
    <button onclick="confirmar()">Confirmar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770",
  storageBucket: "clube-da-caminhonete-be770.firebasestorage.app",
  messagingSenderId: "559157035885",
  appId: "1:559157035885:web:dd265c86d0a3db6a6b9064",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ADMIN_EMAIL = "admin@clube.com";

let itens = [];
let filtro = "TODOS";
let atual = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) return location.href="/login.html";
  if ((user.email||"").toLowerCase()!==ADMIN_EMAIL){
    await signOut(auth);
    return location.href="/login.html";
  }
  document.getElementById("adminEmail").innerText=user.email;
  carregar();
});

window.logout=()=>signOut(auth).then(()=>location.href="/login.html");
window.filtrar=(f)=>{filtro=f;render();}

async function carregar(){
  const anuncios=await getDocs(collection(db,"anuncios"));
  const eventos=await getDocs(collection(db,"eventos"));

  itens=[];
  anuncios.forEach(d=>itens.push({...d.data(),id:d.id,tipo:"Anúncio",colecao:"anuncios"}));
  eventos.forEach(d=>itens.push({...d.data(),id:d.id,tipo:"Evento",colecao:"eventos"}));

  render();
}

function pegarDescricao(d){
  return d.descricao || d.texto || d.observacoes || d.desc || "";
}

function pegarUsuario(d){
  return d.usuarioEmail || d.email || "-";
}

function render(){
  const el=document.getElementById("lista");
  el.innerHTML="";

  itens
    .filter(i=>filtro==="TODOS"||(i.status||"PENDENTE")===filtro)
    .forEach((i,idx)=>{

      const desc=pegarDescricao(i);
      const curta=desc.length>120?desc.substring(0,120)+"...":desc;

      el.innerHTML+=`
      <div class="linha">
        <img src="${i.fotos?.[0]||i.imagem||""}" class="foto">

        <div class="info">
          <div class="titulo">${i.titulo||"Sem título"}</div>
          <div class="usuario">${pegarUsuario(i)}</div>
          ${curta?`<div class="desc">${curta}</div>`:""}

          <div class="tags">
            <span class="tag">${i.tipo}</span>
            <span class="status-${(i.status||"pendente").toLowerCase()}">${i.status||"PENDENTE"}</span>
          </div>
        </div>

        <div class="acoes">
          <button class="ok" onclick="aprovar(${idx})">Aprovar</button>
          <button class="dev" onclick="devolver(${idx})">Devolver</button>
          <button class="del" onclick="excluir(${idx})">Excluir</button>
        </div>
      </div>`;
    });
}

window.aprovar=async(i)=>{
  const item=itens[i];
  await updateDoc(doc(db,item.colecao,item.id),{status:"ATIVO"});
  carregar();
};

window.devolver=(i)=>{
  atual=i;
  document.getElementById("modal").classList.remove("hidden");
};

window.confirmar=async()=>{
  const motivo=document.getElementById("motivo").value;
  const item=itens[atual];

  await updateDoc(doc(db,item.colecao,item.id),{
    status:"RECUSADO",
    motivo,
    motivoDevolucao:motivo
  });

  document.getElementById("modal").classList.add("hidden");
  document.getElementById("motivo").value="";
  carregar();
};

window.excluir=async(i)=>{
  const item=itens[i];
  await updateDoc(doc(db,item.colecao,item.id),{status:"EXCLUIDO"});
  carregar();
};
</script>

</body>
</html>
