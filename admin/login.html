<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login administrativo | Volante</title>

<link rel="icon" href="../favicon.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background: #0b1320;
  color: #e5e7eb;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* CARD */

.card {
  width: 100%;
  max-width: 420px;
  background: #1c2a3a;
  border: 1px solid #2a2f36;
  border-radius: 22px;
  padding: 32px;
}

/* HEADER */

.header-login {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 28px;
}

.logo {
  width: 48px;
  height: 48px;
  object-fit: contain;
}

.header-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.header-text strong {
  font-size: 22px;
  color: #ffffff;
}

.header-text span {
  font-size: 14px;
  color: #9ca3af;
}

/* INPUTS */

input {
  width: 100%;
  height: 54px;
  margin-bottom: 14px;
  border-radius: 16px;
  border: 1px solid #374151;
  background: #111827;
  color: white;
  padding: 0 16px;
  font-size: 15px;
  outline: none;
}

input:focus {
  border-color: #6b7280;
}

/* BOTÃO */

button {
  width: 100%;
  height: 54px;
  border: none;
  border-radius: 16px;
  background: #ffffff;
  color: #0b1320;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  margin-top: 6px;
}

button:disabled {
  opacity: 0.7;
}

/* ERRO */

.erro {
  display: none;
  margin-top: 14px;
  color: #fca5a5;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="card">

  <div class="header-login">
    <img src="../logo.png" class="logo" alt="Volante">

    <div class="header-text">
      <strong>Volante</strong>
      <span>Painel administrativo</span>
    </div>
  </div>

  <input id="email" type="email" placeholder="Email do administrador">
  <input id="senha" type="password" placeholder="Senha">

  <button id="btnEntrar">Entrar</button>

  <div id="erro" class="erro"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* 🔒 CONFIG COMPLETO — NÃO ALTERAR */
const firebaseConfig = {
  apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770",
  storageBucket: "clube-da-caminhonete-be770.firebasestorage.app",
  messagingSenderId: "559157035885",
  appId: "1:559157035885:web:dd265c86d0a3db6a6b9064",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const ADMIN_EMAIL = "admin@clube.com";

const emailInput = document.getElementById("email");
const senhaInput = document.getElementById("senha");
const erro = document.getElementById("erro");
const btnEntrar = document.getElementById("btnEntrar");

/* 🔁 Se já estiver logado corretamente, entra direto */
onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  const email = (user.email || "").trim().toLowerCase();

  if (email === ADMIN_EMAIL) {
    window.location.href = "./index.html";
    return;
  }

  await signOut(auth);
});

/* LOGIN */
btnEntrar.onclick = entrar;

senhaInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") entrar();
});

async function entrar() {
  const email = emailInput.value.trim().toLowerCase();
  const senha = senhaInput.value;

  erro.style.display = "none";

  if (!email || !senha) {
    mostrarErro("Informe email e senha.");
    return;
  }

  if (email !== ADMIN_EMAIL) {
    mostrarErro("Acesso restrito ao administrador.");
    return;
  }

  btnEntrar.disabled = true;
  btnEntrar.textContent = "Entrando...";

  try {
    await signInWithEmailAndPassword(auth, email, senha);
    window.location.href = "./index.html"; // 🔥 CORREÇÃO CRÍTICA
  } catch (e) {
    console.error(e);
    mostrarErro("Email ou senha inválidos.");
  } finally {
    btnEntrar.disabled = false;
    btnEntrar.textContent = "Entrar";
  }
}

function mostrarErro(msg) {
  erro.innerText = msg;
  erro.style.display = "block";
}
</script>

</body>
</html>
