<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin - Volante</title>

<link rel="icon" href="../favicon.png">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: #0f1115;
  color: #e5e7eb;
  font-family: Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-box {
  width: 100%;
  max-width: 320px;
  background: #1c1f24;
  border: 1px solid #2a2f36;
  border-radius: 16px;
  padding: 24px;
}

.logo {
  width: 42px;
  height: 42px;
  object-fit: contain;
  display: block;
  margin-bottom: 14px;
}

h1 {
  margin: 0;
  font-size: 20px;
}

p {
  margin: 6px 0 20px;
  color: #9ca3af;
  font-size: 13px;
}

input {
  width: 100%;
  height: 44px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #374151;
  background: #20242b;
  color: #ffffff;
  padding: 0 12px;
  outline: none;
}

button {
  width: 100%;
  height: 44px;
  border: none;
  border-radius: 10px;
  background: #e5e7eb;
  color: #111827;
  font-weight: bold;
  cursor: pointer;
  margin-top: 6px;
}

.erro {
  display: none;
  margin-top: 12px;
  color: #fca5a5;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="login-box">
  <img src="../logo.png" class="logo" alt="Volante">

  <h1>Painel Admin</h1>
  <p>Volante App</p>

  <input id="email" type="email" placeholder="Email do administrador">
  <input id="senha" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>

  <div id="erro" class="erro"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770",
  storageBucket: "clube-da-caminhonete-be770.firebasestorage.app",
  messagingSenderId: "559157035885",
  appId: "1:559157035885:web:dd265c86d0a3db6a6b9064",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function mostrarErro(mensagem) {
  const erro = document.getElementById("erro");
  erro.innerText = mensagem;
  erro.style.display = "block";
}

window.login = async function () {
  const email = document.getElementById("email").value.trim().toLowerCase();
  const senha = document.getElementById("senha").value;

  if (!email || !senha) {
    mostrarErro("Informe email e senha.");
    return;
  }

  if (email !== "admin@clube.com") {
    mostrarErro("Acesso restrito ao administrador.");
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, senha);
    window.location.href = "/admin/index.html";
  } catch (e) {
    console.error(e);
    mostrarErro("Não foi possível entrar. Verifique email e senha.");
  }
};
</script>

</body>
</html>
