<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acesso ao Painel | Volante</title>

<link rel="icon" href="./favicon.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background: #0f1720;
  font-family: Arial, Helvetica, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #e5e7eb;
}

/* CARD */

.card {
  width: 100%;
  max-width: 360px;
  background: #1a2531;
  border: 1px solid #243040;
  border-radius: 16px;
  padding: 22px;
}

/* HEADER */

.header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
}

.logo {
  width: 34px;
  height: 34px;
  object-fit: contain;
}

.header-text strong {
  display: block;
  font-size: 16px;
}

.header-text span {
  font-size: 12px;
  color: #9ca3af;
}

/* INPUTS */

input {
  width: 100%;
  height: 44px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #2c3b4d;
  background: #0f1720;
  color: #fff;
  padding: 0 12px;
  font-size: 13px;
}

input:focus {
  outline: none;
  border-color: #475569;
}

/* BOTÃO */

button {
  width: 100%;
  height: 44px;
  border: none;
  border-radius: 10px;
  background: #e5e7eb;
  color: #111827;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 6px;
}

/* ERRO */

.erro {
  display: none;
  margin-top: 10px;
  color: #fca5a5;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="card">

  <div class="header">
    <img src="./logo.png" class="logo" alt="Volante">

    <div class="header-text">
      <strong>Volante</strong>
      <span>Acesso ao painel</span>
    </div>
  </div>

  <input id="email" type="email" placeholder="Email do administrador">
  <input id="senha" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>

  <div id="erro" class="erro"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770",
  storageBucket: "clube-da-caminhonete-be770.firebasestorage.app",
  messagingSenderId: "559157035885",
  appId: "1:559157035885:web:dd265c86d0a3db6a6b9064",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function mostrarErro(msg) {
  const erro = document.getElementById("erro");
  erro.innerText = msg;
  erro.style.display = "block";
}

window.login = async function () {
  const email = document.getElementById("email").value.trim().toLowerCase();
  const senha = document.getElementById("senha").value;

  if (!email || !senha) {
    mostrarErro("Informe email e senha.");
    return;
  }

  if (email !== "admin@clube.com") {
    mostrarErro("Acesso restrito.");
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, senha);
    window.location.href = "./index.html";
  } catch (e) {
    mostrarErro("Erro ao entrar.");
  }
};
</script>

</body>
</html>
