```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Volante App</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #ffffff;
  color: #111;
}

header {
  text-align: center;
  padding: 24px;
  border-bottom: 1px solid #eee;
}

.slogan {
  color: #666;
  font-size: 14px;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 16px;
}

.actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.button {
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.primary { background: #111; color: #fff; }
.secondary { background: #f3f3f3; }

.section { margin-top: 30px; }

.grid {
  display: grid;
  gap: 16px;
}

@media (min-width: 600px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}

@media (min-width: 1024px) {
  .grid { grid-template-columns: repeat(3, 1fr); }
}

.card {
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid #eee;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content { padding: 10px; }

.price { font-weight: bold; }

footer {
  margin-top: 40px;
  padding: 20px;
  text-align: center;
  color: #777;
}
</style>
</head>

<body>

<header>
  <h1>Volante App 🚗</h1>
  <div class="slogan">Mais que carros, paixão</div>
</header>

<div class="container">

  <div class="actions">
    <button class="button primary">Anunciar veículo</button>
    <button class="button secondary">Publicar evento</button>
   <button class="button secondary" onclick="window.location.href='/login.html'">
  Entrar / Criar conta
</button>

  <div class="section">
    <h2>🚘 Anúncios recentes</h2>
    <div id="anuncios" class="grid"></div>
  </div>

  <div class="section">
    <h2>📍 Próximos eventos</h2>
    <div id="eventos" class="grid"></div>
  </div>

</div>

<footer>Volante App © 2026</footer>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770",
  storageBucket: "clube-da-caminhonete-be770.firebasestorage.app",
  messagingSenderId: "559157035885",
  appId: "1:559157035885:web:dd265c86d0a3db6a6b9064",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 BUSCAR ANÚNCIOS
async function carregarAnuncios() {
  const lista = document.getElementById("anuncios");
  lista.innerHTML = "Carregando...";

  const q = query(collection(db, "anuncios"), where("status", "==", "ATIVO"));
  const snapshot = await getDocs(q);

  lista.innerHTML = "";

  snapshot.forEach(doc => {
    const data = doc.data();

    const card = `
      <div class="card">
        <img src="${data.fotos?.[0] || 'https://via.placeholder.com/400'}" />
        <div class="card-content">
          <div>${data.titulo || "Veículo"}</div>
          <div class="price">R$ ${data.preco || "-"}</div>
        </div>
      </div>
    `;

    lista.innerHTML += card;
  });

  if (snapshot.empty) {
    lista.innerHTML = "<p>Nenhum anúncio disponível</p>";
  }
}

// 🔥 BUSCAR EVENTOS
async function carregarEventos() {
  const lista = document.getElementById("eventos");
  lista.innerHTML = "Carregando...";

  const q = query(collection(db, "eventos"), where("status", "==", "ATIVO"));
  const snapshot = await getDocs(q);

  lista.innerHTML = "";

  snapshot.forEach(doc => {
    const data = doc.data();

    const card = `
      <div class="card">
        <img src="${data.imagem || 'https://via.placeholder.com/400'}" />
        <div class="card-content">
          <div>${data.titulo || "Evento"}</div>
        </div>
      </div>
    `;

    lista.innerHTML += card;
  });

  if (snapshot.empty) {
    lista.innerHTML = "<p>Nenhum evento disponível</p>";
  }
}

carregarAnuncios();
carregarEventos();
</script>

</body>
</html>
```
