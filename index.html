<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volante App</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background:#0b0f14;
      color:#fff;
    }

    .container {
      max-width:1200px;
      margin:auto;
      padding:20px;
    }

    header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .logo {
      font-size:22px;
      font-weight:800;
    }

    .search {
      background:#111827;
      border:1px solid rgba(255,255,255,0.1);
      border-radius:999px;
      padding:10px 15px;
      width:300px;
      color:#fff;
    }

    .section {
      margin-bottom:40px;
    }

    .section h2 {
      margin-bottom:15px;
      font-size:20px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:15px;
    }

    .card {
      background:#111827;
      border-radius:16px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.1);
    }

    .img {
      height:140px;
      background:#222;
    }

    .img img {
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .content {
      padding:12px;
    }

    .title {
      font-weight:700;
      margin-bottom:6px;
    }

    .meta {
      font-size:12px;
      color:#9ca3af;
    }

    .price {
      margin-top:8px;
      font-weight:800;
    }

    @media(max-width:900px){
      .grid { grid-template-columns:repeat(2,1fr); }
    }

  </style>
</head>

<body>
  <div class="container">

    <header>
      <div class="logo">Volante</div>
      <input class="search" id="busca" placeholder="Buscar..." />
    </header>

    <!-- DESTAQUES -->
    <section class="section">
      <h2>Destaques</h2>
      <div class="grid" id="destaques"></div>
    </section>

    <!-- RECENTES -->
    <section class="section">
      <h2>Recentes</h2>
      <div class="grid" id="recentes"></div>
    </section>

    <!-- EVENTOS -->
    <section class="section">
      <h2>Eventos</h2>
      <div class="grid" id="eventos"></div>
    </section>

  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770",
  storageBucket: "clube-da-caminhonete-be770.firebasestorage.app",
  messagingSenderId: "559157035885",
  appId: "1:559157035885:web:7b01f7d15a0b5a8c6f4b6f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let anuncios = [];
let eventos = [];

const busca = document.getElementById("busca");

busca.addEventListener("input", render);

function img(item){
  return item.fotos?.[0] || "";
}

function card(a){
  return `
    <div class="card">
      <div class="img">
        ${img(a) ? `<img src="${img(a)}">` : ""}
      </div>
      <div class="content">
        <div class="title">${a.titulo || "Veículo"}</div>
        <div class="meta">${a.cidade || ""} ${a.estado || ""}</div>
        <div class="price">${formatar(a.preco)}</div>
      </div>
    </div>
  `;
}

function cardEvento(e){
  return `
    <div class="card">
      <div class="img">
        ${img(e) ? `<img src="${img(e)}">` : ""}
      </div>
      <div class="content">
        <div class="title">${e.titulo}</div>
        <div class="meta">${e.cidade || ""}</div>
      </div>
    </div>
  `;
}

function formatar(v){
  if(!v) return "Consultar";
  return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

function filtro(lista){
  const t = busca.value.toLowerCase();
  if(!t) return lista;

  return lista.filter(i =>
    (i.titulo || "").toLowerCase().includes(t)
  );
}

function render(){

  const f = filtro(anuncios);

  // DESTAQUES (primeiros 8)
  document.getElementById("destaques").innerHTML =
    f.slice(0,8).map(card).join("");

  // RECENTES (próximos 8)
  document.getElementById("recentes").innerHTML =
    f.slice(8,16).map(card).join("");

  // EVENTOS (12 = 3 linhas)
  document.getElementById("eventos").innerHTML =
    filtro(eventos).slice(0,12).map(cardEvento).join("");
}

async function load(){

  const aSnap = await getDocs(query(collection(db,"anuncios"),where("status","==","ATIVO")));
  anuncios = aSnap.docs.map(d=>d.data());

  const eSnap = await getDocs(query(collection(db,"eventos"),where("status","==","ATIVO")));
  eventos = eSnap.docs.map(d=>d.data());

  render();
}

load();
</script>

</body>
</html>
