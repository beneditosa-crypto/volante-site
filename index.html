<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Volante App</title>

<link rel="icon" href="/favicon.png" />

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial, sans-serif;
  background:#f5f2eb;
  color:#111;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 20px;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo{
  width:48px;
}

.title{
  font-weight:900;
  font-size:22px;
}

.subtitle{
  font-size:11px;
  color:#777;
}

.actions button{
  border:none;
  border-radius:20px;
  padding:10px 14px;
  font-weight:700;
  margin-left:8px;
}

.gold{background:#c9a24a;}
.dark{background:#111;color:#fff;}

/* HERO */
.hero{
  background:#efe6d8;
  margin:10px;
  padding:20px;
  border-radius:20px;
}

.hero h1{
  font-size:28px;
  margin-bottom:8px;
}

.hero p{
  font-size:14px;
  color:#555;
}

.search{
  margin-top:12px;
  padding:12px;
  width:100%;
  border-radius:20px;
  border:none;
}

/* BOTÕES APP */
.stores{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.store{
  flex:1;
  background:#fff;
  border:1px solid #ddd;
  border-radius:14px;
  padding:12px;
  text-align:center;
  font-weight:700;
}

/* GRID */
.section{
  padding:10px;
}

.section h2{
  margin-bottom:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:18px;
}

/* CARD */
.card{
  cursor:pointer;
}

.card img{
  width:100%;
  border-radius:20px;
  height:180px;
  object-fit:cover;
}

.card-title{
  font-weight:900;
  margin-top:6px;
  font-size:14px;
}

.card-meta{
  font-size:12px;
  color:#777;
}

.card-price{
  font-weight:900;
  font-size:14px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#fff;
  padding:20px;
  border-radius:20px;
  max-width:400px;
}

.modal-box button{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
}

footer{
  background:#111;
  color:#fff;
  padding:20px;
  margin-top:20px;
  border-radius:20px;
}
</style>
</head>

<body>

<header>
  <div class="logo-box">
    <img src="/logo.png" class="logo"/>
    <div>
      <div class="title">Volante</div>
      <div class="subtitle">Mais que carros, paixão</div>
    </div>
  </div>

  <div class="actions">
    <button class="gold">Baixar App</button>
    <button class="dark">Entrar</button>
  </div>
</header>

<div class="hero">
  <h1>O lugar onde os clássicos ganham vida.</h1>
  <p>Descubra veículos raros, participe de eventos e conecte-se com quem vive essa paixão.</p>
  <input class="search" placeholder="Buscar veículos, cidades ou eventos..." />

  <div class="stores">
    <div class="store">▶ Google Play</div>
    <div class="store"> App Store</div>
  </div>
</div>

<div class="section">
  <h2>Destaques</h2>
  <div class="grid" id="grid"></div>
</div>

<footer>
  Volante App • contato@volante.app.br
</footer>

<div class="modal" id="modal">
  <div class="modal-box" id="modalBox"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const grid = document.getElementById("grid");

function getImagem(item){
  if(item.fotos && item.fotos.length) return item.fotos[0];
  return null;
}

function card(item){
  const img = getImagem(item);
  if(!img) return "";

  return `
  <div class="card" onclick="openModal('${item.titulo}','${img}')">
    <img src="${img}">
    <div class="card-title">${item.titulo || ""}</div>
    <div class="card-meta">${item.cidade || ""}</div>
    <div class="card-price">${item.preco || ""}</div>
  </div>
  `;
}

window.openModal = function(titulo,img){
  modal.style.display="flex";
  modalBox.innerHTML = `
    <img src="${img}" style="width:100%;border-radius:10px">
    <h3>${titulo}</h3>
    <p>Quer falar com o anunciante? Baixe o app.</p>
    <button onclick="alert('Baixar app')">Ver no app</button>
  `;
}

window.onclick = function(e){
  if(e.target.id==="modal") modal.style.display="none";
}

async function load(){
  const q = query(collection(db,"anuncios"), where("status","==","ATIVO"));
  const snap = await getDocs(q);

  let html="";
  snap.forEach(doc=>{
    html += card(doc.data());
  });

  grid.innerHTML = html;
}

load();
</script>

</body>
</html>
