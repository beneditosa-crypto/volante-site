<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Volante App</title>
<link rel="icon" href="./logo.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,Helvetica,sans-serif;
background:#f5f2eb;
color:#1a1a1a;
}

/* HEADER */

header{
position:sticky;
top:0;
background:#f5f2eb;
border-bottom:1px solid #e4ded2;
z-index:10;
}

.topo{
max-width:1100px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
}

.logo{width:64px;}

.nome{font-size:24px;font-weight:900;}
.slogan{font-size:12px;color:#7a7267;}

.actions{
display:flex;
gap:8px;
}

.btn{
border:none;
border-radius:999px;
padding:10px 14px;
font-weight:800;
font-size:13px;
}

.btn-dark{background:#151515;color:#fff;}
.btn-gold{background:#c9a24a;color:#151515;}

/* HERO */

main{
max-width:1100px;
margin:auto;
padding:14px;
}

.hero{
background:linear-gradient(135deg,#fffaf2,#efe6d8);
border-radius:20px;
padding:16px;
margin-bottom:16px;
}

.hero h1{font-size:24px;margin-bottom:6px;}
.hero p{font-size:14px;color:#6f665d;}

.busca{
margin-top:10px;
background:#fff;
border-radius:14px;
padding:10px;
}

.busca input{
border:none;
width:100%;
outline:none;
}

/* CTA APP */

.cta{
margin-top:14px;
display:flex;
gap:10px;
}

.store{
flex:1;
background:#000;
color:#fff;
border-radius:12px;
padding:10px;
text-align:center;
font-weight:800;
font-size:13px;
}

/* GRID */

.grid{
display:grid;
gap:12px;
}

.grid-2{grid-template-columns:repeat(2,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}

/* CARD */

.card{
cursor:pointer;
}

.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:14px;
}

.card-body{
padding:6px 2px;
}

.title{
font-size:14px;
font-weight:900;
}

.meta{
font-size:12px;
color:#6f665d;
}

.price{
font-weight:900;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
padding:20px;
}

.modal-box{
background:#fff;
border-radius:16px;
max-width:400px;
width:100%;
padding:16px;
}

.modal img{
width:100%;
border-radius:12px;
margin-bottom:10px;
}

.cta-login{
margin-top:12px;
display:flex;
flex-direction:column;
gap:8px;
}

.cta-login button{
border:none;
padding:10px;
border-radius:12px;
font-weight:900;
}

.footer{
margin-top:20px;
background:#1a1a1a;
color:#fff;
padding:16px;
border-radius:16px;
}

.footer p{
font-size:12px;
color:#ccc;
margin:4px 0;
}

/* DESKTOP */

@media(min-width:800px){
.grid-2{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(6,1fr);}
}

</style>
</head>

<body>

<header>
<div class="topo">

<div>
<div class="nome">Volante</div>
<div class="slogan">Mais que carros, paixão</div>
</div>

<div class="actions">
<button class="btn btn-gold">Baixar App</button>
<button class="btn btn-dark">Entrar</button>
</div>

</div>
</header>

<main>

<div class="hero">
<h1>Clássicos e eventos em um só lugar</h1>
<p>Explore anúncios e descubra eventos.</p>

<div class="busca">
<input placeholder="Buscar...">
</div>

<div class="cta">
<div class="store">Google Play</div>
<div class="store">App Store</div>
</div>
</div>

<h2>Destaques</h2>
<div class="grid grid-2" id="destaques"></div>

<h2 style="margin-top:14px;">Eventos</h2>
<div class="grid grid-3" id="eventos"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box" id="modalContent"></div>
</div>

<div class="footer">
<p>Volante App</p>
<p>contato@volante.app.br</p>
<p>volante.app.br</p>
<p>Políticas • Termos • Quem somos</p>
</div>

</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
authDomain:"clube-da-caminhonete-be770.firebaseapp.com",
projectId:"clube-da-caminhonete-be770",
storageBucket:"clube-da-caminhonete-be770.firebasestorage.app",
messagingSenderId:"559157035885",
appId:"1:559157035885:web:8d3c4c8d7c7c5f7b3b2a91"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const modal=document.getElementById("modal");

function abrirModal(item){

document.getElementById("modalContent").innerHTML=`
<img src="${item.fotos?.[0]||""}">
<h3>${item.titulo||""}</h3>
<p>${item.cidade||""}</p>

<div class="cta-login">
<button style="background:#c9a24a;">Criar conta</button>
<button style="background:#151515;color:#fff;">Baixar app</button>
</div>

<p style="font-size:12px;color:#777;margin-top:10px;">
Para ver contato e falar com o anunciante, entre no app.
</p>
`;

modal.style.display="flex";
}

modal.onclick=()=>modal.style.display="none";

async function load(){

const aSnap=await getDocs(query(collection(db,"anuncios"),where("status","==","ATIVO")));
const eSnap=await getDocs(query(collection(db,"eventos"),where("status","==","ATIVO")));

const anuncios=aSnap.docs.map(d=>d.data());
const eventos=eSnap.docs.map(d=>d.data());

document.getElementById("destaques").innerHTML=
anuncios.slice(0,8).map(a=>`
<div class="card" onclick='abrirModal(${JSON.stringify(a)})'>
<img src="${a.fotos?.[0]||""}">
<div class="card-body">
<div class="title">${a.titulo||""}</div>
<div class="meta">${a.cidade||""}</div>
<div class="price">${a.preco||""}</div>
</div>
</div>
`).join("");

document.getElementById("eventos").innerHTML=
eventos.slice(0,6).map(e=>`
<div class="card" onclick='abrirModal(${JSON.stringify(e)})'>
<img src="${e.fotos?.[0]||""}">
<div class="card-body">
<div class="title">${e.titulo||""}</div>
<div class="meta">${e.cidade||""}</div>
</div>
</div>
`).join("");

}

load();

</script>

</body>
</html>
