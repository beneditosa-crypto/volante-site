<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Volante App</title>

<link rel="icon" href="./favicon.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #ffffff;
  color: #111827;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  border-bottom: 1px solid #eee;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-area img {
  width: 38px;
  height: 38px;
}

.logo-text strong {
  display: block;
  font-size: 18px;
}

.logo-text span {
  font-size: 12px;
  color: #666;
}

#usuarioArea button {
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  background: #111827;
  color: #fff;
  cursor: pointer;
}

.container {
  max-width: 1180px;
  margin: auto;
  padding: 16px;
}

.actions {
  display: grid;
  gap: 10px;
}

.button {
  padding: 13px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-weight: 600;
}

.primary {
  background: #111827;
  color: #fff;
}

.secondary {
  background: #f3f4f6;
}

.section {
  margin-top: 28px;
}

.grid {
  display: grid;
  gap: 16px;
}

.card {
  border: 1px solid #eee;
  border-radius: 14px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 12px;
}

.price {
  font-weight: bold;
}

.meta {
  font-size: 13px;
  color: #666;
}

@media (min-width: 600px) {
  .actions {
    grid-template-columns: repeat(4, 1fr);
  }

  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 1024px) {
  .grid {
    grid-template-columns: repeat(3, 1fr);
  }
}
</style>
</head>

<body>

<header>
  <div class="logo-area">
    <img src="./logo.png">
    <div class="logo-text">
      <strong>Volante</strong>
      <span>Mais que carros, paixão</span>
    </div>
  </div>

  <div id="usuarioArea"></div>
</header>

<div class="container">

  <div class="actions">
    <button class="button primary" onclick="irPublicar()">Anunciar veículo</button>

    <button class="button secondary" onclick="window.location.href='/meus-anuncios.html'">
      Meus anúncios
    </button>

    <button class="button secondary">
      Publicar evento
    </button>

    <button class="button secondary" onclick="window.location.href='/login.html'">
      Entrar / Criar conta
    </button>
  </div>

  <div class="section">
    <h2>Anúncios recentes</h2>
    <div id="anuncios" class="grid">Carregando...</div>
  </div>

  <div class="section">
    <h2>Próximos eventos</h2>
    <div id="eventos" class="grid">Carregando...</div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  const area = document.getElementById("usuarioArea");

  if (user) {
    area.innerHTML = `
      <div>${user.email}</div>
      <button onclick="logout()">Sair</button>
    `;
  } else {
    area.innerHTML = `
      <button onclick="window.location.href='/login.html'">Entrar</button>
    `;
  }
});

window.logout = async function () {
  await signOut(auth);
  location.reload();
};

window.irPublicar = function () {
  const user = auth.currentUser;

  if (!user) {
    alert("Faça login.");
    window.location.href = "/login.html";
    return;
  }

  window.location.href = "/publicar.html";
};

async function carregarAnuncios() {
  const lista = document.getElementById("anuncios");

  const q = query(collection(db, "anuncios"), where("status", "==", "ATIVO"));
  const snapshot = await getDocs(q);

  lista.innerHTML = "";

  snapshot.forEach(doc => {
    const d = doc.data();
    const foto = d.fotos?.[0] || "";

    lista.innerHTML += `
      <div class="card">
        <img src="${foto}">
        <div class="card-content">
          <div>${d.titulo}</div>
        </div>
      </div>
    `;
  });
}

async function carregarEventos() {
  const lista = document.getElementById("eventos");

  const q = query(collection(db, "eventos"), where("status", "==", "ATIVO"));
  const snapshot = await getDocs(q);

  lista.innerHTML = "";

  snapshot.forEach(doc => {
    const d = doc.data();
    const foto = d.imagem || "";

    lista.innerHTML += `
      <div class="card">
        <img src="${foto}">
        <div class="card-content">
          <div>${d.titulo}</div>
        </div>
      </div>
    `;
  });
}

carregarAnuncios();
carregarEventos();
</script>

</body>
</html>
