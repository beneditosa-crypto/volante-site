<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Volante App — Mais que carros, uma paixão</title>
  <meta name="description" content="Volante App: anúncios de veículos clássicos e eventos de antigomobilismo." />
  <link rel="icon" href="/favicon.png" type="image/png" />

  <style>
    :root {
      --background: #ffffff;
      --surface: #ffffff;
      --surface-soft: #f9fafb;
      --surface-muted: #f3f4f6;
      --text: #111111;
      --text-muted: #6b7280;
      --icon-muted: #6b7280;
      --border: #e5e7eb;
      --primary: #1e3a8a;
      --event-bg: #111827;
      --event-text: #e5e7eb;
      --shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--background);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app-shell {
      max-width: 1180px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--background);
      padding-bottom: 128px;
    }

    .header {
      padding: 12px 16px 0;
      background: var(--background);
    }

    .header-inner {
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 12px;
    }

    .brand-logo {
      width: 58px;
      height: 48px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .brand-fallback {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: var(--primary);
      color: #ffffff;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 22px;
      flex: 0 0 auto;
    }

    .brand-title {
      font-size: 20px;
      line-height: 1;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.04em;
    }

    .brand-subtitle {
      margin-top: 5px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .notification-button,
    .account-button {
      min-width: 42px;
      height: 42px;
      border-radius: 16px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      color: var(--text);
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 900;
    }

    .account-button {
      padding: 0 14px;
      min-width: 78px;
      color: #ffffff;
      background: var(--primary);
      border-color: var(--primary);
      font-size: 13px;
    }

    .search-box {
      margin: 14px 16px 0;
      height: 50px;
      border-radius: 18px;
      background: var(--surface-muted);
      border: 1px solid var(--border);
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-icon {
      color: var(--icon-muted);
      font-size: 20px;
      line-height: 1;
    }

    .search-input {
      flex: 1;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      min-width: 0;
    }

    .search-input::placeholder {
      color: #9ca3af;
    }

    .section-header {
      margin: 24px 16px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .section-title {
      margin: 0;
      color: var(--text);
      font-size: 21px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .see-all {
      background: transparent;
      color: var(--primary);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .loading-box,
    .empty-box {
      margin: 0 16px;
      border-radius: 20px;
      padding: 18px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .empty-box {
      display: block;
    }

    .loading-spinner {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 3px solid #d1d5db;
      border-top-color: var(--text);
      animation: spin 0.8s linear infinite;
      flex: 0 0 auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);
    }

    .empty-title {
      margin: 0;
      font-size: 15px;
      font-weight: 900;
      color: var(--text);
    }

    .empty-text {
      margin: 6px 0 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      line-height: 19px;
    }

    .horizontal-list {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 0 16px 4px;
      scroll-snap-type: x mandatory;
      overscroll-behavior-inline: contain;
      scrollbar-width: none;
    }

    .horizontal-list::-webkit-scrollbar {
      display: none;
    }

    .highlight-card {
      width: 300px;
      height: 200px;
      border-radius: 22px;
      overflow: hidden;
      background: var(--surface-muted);
      flex: 0 0 auto;
      position: relative;
      scroll-snap-align: start;
      border: 0;
      padding: 0;
      text-align: left;
    }

    .highlight-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: var(--surface-muted);
    }

    .highlight-gradient {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 82px;
      background: linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,0.58));
    }

    .highlight-overlay {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      color: #ffffff;
    }

    .highlight-title {
      margin: 0;
      color: #ffffff;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .highlight-subtitle {
      margin: 4px 0 0;
      color: #e5e7eb;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recent-card {
      width: 180px;
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      overflow: hidden;
      flex: 0 0 auto;
      scroll-snap-align: start;
      padding: 0;
      text-align: left;
    }

    .recent-image {
      width: 100%;
      height: 120px;
      display: block;
      object-fit: cover;
      background: var(--surface-muted);
    }

    .recent-title {
      margin: 10px 12px 0;
      font-size: 14px;
      font-weight: 900;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recent-price {
      margin: 4px 12px 12px;
      font-size: 14px;
      font-weight: 900;
      color: var(--primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-card {
      width: 250px;
      background: var(--event-bg);
      border-radius: 20px;
      overflow: hidden;
      flex: 0 0 auto;
      scroll-snap-align: start;
      padding: 0;
      text-align: left;
      border: 0;
    }

    .event-image {
      width: 100%;
      height: 130px;
      display: block;
      object-fit: cover;
      background: var(--surface-muted);
    }

    .event-info {
      padding: 16px;
    }

    .event-date {
      color: var(--primary);
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .event-title {
      margin: 0 0 6px;
      color: #ffffff;
      font-size: 17px;
      line-height: 1.25;
      font-weight: 900;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .event-local {
      margin: 0 0 8px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-text {
      margin: 0;
      color: var(--event-text);
      font-size: 14px;
      line-height: 20px;
      font-weight: 600;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .event-button {
      margin-top: 16px;
      background: var(--primary);
      border-radius: 14px;
      padding: 11px 14px;
      text-align: center;
      color: #ffffff;
      font-weight: 900;
      font-size: 13px;
    }

    .bottom-menu {
      position: fixed;
      left: 18px;
      right: 18px;
      bottom: 18px;
      height: 74px;
      border-radius: 24px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      box-shadow: var(--shadow);
      z-index: 50;
      max-width: 620px;
      margin: 0 auto;
    }

    .bottom-item {
      flex: 1;
      height: 58px;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--icon-muted);
      font-size: 9px;
      font-weight: 900;
      gap: 3px;
    }

    .bottom-item.active {
      background: var(--primary);
      color: #ffffff;
    }

    .bottom-icon {
      font-size: 22px;
      line-height: 1;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.62);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(920px, 100%);
      max-height: min(88vh, 900px);
      background: #ffffff;
      border-radius: 24px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
    }

    .modal-gallery {
      background: #111827;
      min-height: 430px;
      display: grid;
      grid-template-rows: 1fr auto;
    }

    .modal-main {
      min-height: 340px;
      overflow: hidden;
    }

    .modal-main img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: var(--surface-muted);
    }

    .thumbs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px;
      scrollbar-width: none;
    }

    .thumbs::-webkit-scrollbar {
      display: none;
    }

    .thumb {
      width: 72px;
      height: 58px;
      border-radius: 13px;
      border: 2px solid transparent;
      overflow: hidden;
      background: #374151;
      flex: 0 0 auto;
      padding: 0;
    }

    .thumb.active {
      border-color: var(--primary);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .modal-content {
      padding: 22px;
      overflow: auto;
    }

    .modal-close {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      background: var(--surface-muted);
      float: right;
      color: var(--text);
      font-size: 22px;
      line-height: 1;
    }

    .modal-title {
      clear: both;
      margin: 14px 0 8px;
      color: var(--text);
      font-size: 28px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .modal-price {
      color: var(--primary);
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .modal-meta {
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 700;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .modal-description {
      margin: 14px 0 0;
      color: #4b5563;
      font-size: 14px;
      line-height: 21px;
      font-weight: 600;
      white-space: pre-wrap;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .modal-action {
      min-height: 46px;
      border-radius: 14px;
      background: var(--primary);
      color: #ffffff;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 14px;
    }

    .modal-action.secondary {
      background: var(--surface-muted);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 104px;
      z-index: 160;
      max-width: calc(100% - 32px);
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      pointer-events: none;
      background: #111827;
      color: #ffffff;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 800;
      transition: 0.2s ease;
      text-align: center;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (min-width: 760px) {
      .app-shell {
        padding-bottom: 36px;
      }

      .desktop-grid {
        display: grid;
        grid-template-columns: 1fr;
      }

      .bottom-menu {
        display: none;
      }

      .header {
        padding-top: 18px;
      }

      .header-inner {
        min-height: 70px;
      }

      .search-box {
        max-width: 720px;
      }

      .highlight-card {
        width: 340px;
        height: 220px;
      }

      .recent-card {
        width: 210px;
      }

      .recent-image {
        height: 136px;
      }

      .event-card {
        width: 280px;
      }
    }

    @media (max-width: 680px) {
      .modal-backdrop {
        align-items: flex-end;
        padding: 0;
      }

      .modal {
        grid-template-columns: 1fr;
        border-radius: 24px 24px 0 0;
        max-height: 92vh;
        overflow-y: auto;
      }

      .modal-gallery {
        min-height: 300px;
      }

      .modal-main {
        min-height: 245px;
      }

      .modal-content {
        padding: 20px;
      }

      .modal-title {
        font-size: 25px;
      }

      .brand-title {
        font-size: 18px;
      }

      .header-actions {
        gap: 6px;
      }

      .account-button {
        min-width: 68px;
        padding: 0 10px;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <header class="header">
      <div class="header-inner">
        <a class="brand" href="/">
          <img class="brand-logo" src="/logo.png" alt="Volante App" onerror="this.replaceWith(Object.assign(document.createElement('div'), {className:'brand-fallback', textContent:'V'}));" />
          <div>
            <div class="brand-title">Volante App</div>
            <div class="brand-subtitle">Mais que carros, uma paixão</div>
          </div>
        </a>

        <div class="header-actions">
          <button class="notification-button" type="button" title="Notificações">♡</button>
          <a class="account-button" href="/login.html" id="loginLink">Entrar</a>
        </div>
      </div>
    </header>

    <main>
      <section class="search-box" aria-label="Busca">
        <span class="search-icon">⌕</span>
        <input
          class="search-input"
          id="buscaInput"
          type="search"
          placeholder="Buscar por modelo, cidade, marca..."
          autocomplete="off"
        />
      </section>

      <section id="destaques">
        <div class="section-header">
          <h1 class="section-title">Destaques</h1>
          <a class="see-all" href="#recentes">Ver todos</a>
        </div>

        <div id="destaquesStatus" class="loading-box">
          <span class="loading-spinner"></span>
          <span class="loading-text">Carregando anúncios...</span>
        </div>

        <div class="horizontal-list" id="destaquesList" aria-live="polite"></div>
      </section>

      <section id="recentes" hidden>
        <div class="section-header">
          <h2 class="section-title">Recentes</h2>
        </div>

        <div class="horizontal-list" id="recentesList" aria-live="polite"></div>
      </section>

      <section id="eventos">
        <div class="section-header">
          <h2 class="section-title">Eventos</h2>
          <a class="see-all" href="#eventos">Ver eventos</a>
        </div>

        <div id="eventosStatus" class="loading-box">
          <span class="loading-spinner"></span>
          <span class="loading-text">Carregando eventos...</span>
        </div>

        <div class="horizontal-list" id="eventosList" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <nav class="bottom-menu" aria-label="Menu inferior">
    <a class="bottom-item active" href="/">
      <span class="bottom-icon">⌂</span>
      <span>Início</span>
    </a>
    <a class="bottom-item" href="/login.html">
      <span class="bottom-icon">▣</span>
      <span>Anúncios</span>
    </a>
    <a class="bottom-item" href="#eventos">
      <span class="bottom-icon">□</span>
      <span>Eventos</span>
    </a>
    <a class="bottom-item" href="/login.html">
      <span class="bottom-icon">◌</span>
      <span>Conversas</span>
    </a>
    <a class="bottom-item" href="/login.html">
      <span class="bottom-icon">@</span>
      <span>Conta</span>
    </a>
  </nav>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-gallery">
        <div class="modal-main" id="modalMain"></div>
        <div class="thumbs" id="modalThumbs"></div>
      </div>

      <div class="modal-content">
        <button class="modal-close" id="modalClose" type="button" aria-label="Fechar">×</button>
        <h3 class="modal-title" id="modalTitle"></h3>
        <div class="modal-price" id="modalPrice"></div>
        <div class="modal-meta" id="modalMeta"></div>
        <p class="modal-description" id="modalDescription"></p>

        <div class="modal-actions">
          <button class="modal-action" id="modalShare" type="button">Compartilhar</button>
          <a class="modal-action secondary" href="/login.html">Interagir</a>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      onSnapshot,
      query,
      where,
      limit
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
      authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
      projectId: "clube-da-caminhonete-be770",
      storageBucket: "clube-da-caminhonete-be770.firebasestorage.app",
      messagingSenderId: "559157035885",
      appId: "1:559157035885:web:6fdb9bb64c7b1b6b43b4b5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const $ = (id) => document.getElementById(id);

    const state = {
      usuario: null,
      anuncios: [],
      eventos: [],
      modalItem: null
    };

    const PLACEHOLDER =
      "data:image/svg+xml;charset=UTF-8," +
      encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="800" height="560" viewBox="0 0 800 560">
          <rect width="800" height="560" fill="#F3F4F6"/>
          <circle cx="400" cy="280" r="92" fill="none" stroke="#111111" stroke-width="18" opacity=".22"/>
          <text x="400" y="306" text-anchor="middle" font-family="Arial" font-size="58" font-weight="900" fill="#1E3A8A">V</text>
        </svg>
      `);

    function toast(message) {
      const el = $("toast");
      el.textContent = message;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 2500);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalize(value) {
      return String(value || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    function formatarPreco(valor) {
      if (!valor) return "Preço sob consulta";
      if (typeof valor === "string" && valor.includes("R$")) return valor;

      const numero = Number(valor);
      if (Number.isNaN(numero)) return String(valor);

      return numero.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function dateFrom(value) {
      if (!value) return null;
      if (value?.toDate) return value.toDate();
      if (value?.seconds) return new Date(value.seconds * 1000);
      if (typeof value === "string") {
        const d = new Date(value);
        return Number.isNaN(d.getTime()) ? null : d;
      }
      return null;
    }

    function ordenarPorData(lista) {
      return [...lista].sort((a, b) => {
        const dataA = dateFrom(a.criadoEm || a.createdAt || a.dataCriacao || a.atualizadoEm)?.getTime() || 0;
        const dataB = dateFrom(b.criadoEm || b.createdAt || b.dataCriacao || b.atualizadoEm)?.getTime() || 0;
        return dataB - dataA;
      });
    }

    function tituloItem(item, fallback = "Veículo clássico") {
      return item.titulo || item.nome || item.modelo || fallback;
    }

    function localItem(item) {
      return [item.cidade, item.estado].filter(Boolean).join(" / ");
    }

    function primeiraFoto(item) {
      if (Array.isArray(item.fotos) && item.fotos[0]) return item.fotos[0];
      if (Array.isArray(item.imagens) && item.imagens[0]) return item.imagens[0];
      if (item.imagem) return item.imagem;
      if (item.foto) return item.foto;
      return PLACEHOLDER;
    }

    function todasFotos(item) {
      const fotos = [];
      if (Array.isArray(item.fotos)) fotos.push(...item.fotos.filter(Boolean));
      if (Array.isArray(item.imagens)) fotos.push(...item.imagens.filter(Boolean));
      if (item.imagem) fotos.push(item.imagem);
      if (item.foto) fotos.push(item.foto);
      return [...new Set(fotos.length ? fotos : [PLACEHOLDER])];
    }

    function formatarData(valor) {
      if (!valor) return "Data em breve";
      if (typeof valor === "string" && !valor.includes("T")) return valor;

      const data = dateFrom(valor);
      if (!data) return String(valor);

      return data.toLocaleDateString("pt-BR", {
        day: "2-digit",
        month: "short",
        year: "numeric"
      });
    }

    function filtrarAnuncios() {
      const termo = normalize($("buscaInput").value);

      if (!termo) return state.anuncios;

      return state.anuncios.filter((item) => {
        const texto = normalize([
          item.titulo,
          item.marca,
          item.modelo,
          item.cidade,
          item.estado,
          item.ano
        ].join(" "));

        return texto.includes(termo);
      });
    }

    function renderAnuncios() {
      const filtrados = filtrarAnuncios();
      const destaques = filtrados.slice(0, 4);
      const recentes = filtrados.slice(4, 12);

      const destaquesList = $("destaquesList");
      const recentesList = $("recentesList");
      const destaquesStatus = $("destaquesStatus");
      const recentesSection = $("recentes");

      destaquesList.innerHTML = "";
      recentesList.innerHTML = "";

      if (!destaques.length) {
        destaquesStatus.className = "empty-box";
        destaquesStatus.innerHTML = `
          <p class="empty-title">Nenhum anúncio encontrado</p>
          <p class="empty-text">Assim que novos veículos forem aprovados, eles aparecerão aqui.</p>
        `;
        recentesSection.hidden = true;
        return;
      }

      destaquesStatus.style.display = "none";

      destaques.forEach((item) => {
        const card = document.createElement("button");
        card.className = "highlight-card";
        card.type = "button";
        card.innerHTML = `
          <img class="highlight-image" src="${primeiraFoto(item)}" alt="${escapeHtml(tituloItem(item))}" loading="lazy" decoding="async" />
          <div class="highlight-gradient"></div>
          <div class="highlight-overlay">
            <p class="highlight-title">${escapeHtml(tituloItem(item))}</p>
            <p class="highlight-subtitle">${escapeHtml([item.marca, item.modelo, item.ano].filter(Boolean).join(" • "))}</p>
          </div>
        `;
        card.addEventListener("click", () => abrirModal({ ...item, tipo: "anuncio" }));
        destaquesList.appendChild(card);
      });

      if (!recentes.length) {
        recentesSection.hidden = true;
        return;
      }

      recentesSection.hidden = false;

      recentes.forEach((item) => {
        const card = document.createElement("button");
        card.className = "recent-card";
        card.type = "button";
        card.innerHTML = `
          <img class="recent-image" src="${primeiraFoto(item)}" alt="${escapeHtml(tituloItem(item))}" loading="lazy" decoding="async" />
          <p class="recent-title">${escapeHtml(tituloItem(item))}</p>
          <p class="recent-price">${escapeHtml(formatarPreco(item.preco || item.valor))}</p>
        `;
        card.addEventListener("click", () => abrirModal({ ...item, tipo: "anuncio" }));
        recentesList.appendChild(card);
      });
    }

    function renderEventos() {
      const list = $("eventosList");
      const status = $("eventosStatus");

      list.innerHTML = "";

      if (!state.eventos.length) {
        status.className = "empty-box";
        status.innerHTML = `
          <p class="empty-title">Nenhum evento aprovado ainda</p>
          <p class="empty-text">Em breve os encontros aparecerão por aqui.</p>
        `;
        return;
      }

      status.style.display = "none";

      state.eventos.slice(0, 8).forEach((evento) => {
        const card = document.createElement("button");
        card.className = "event-card";
        card.type = "button";
        card.innerHTML = `
          <img class="event-image" src="${primeiraFoto(evento)}" alt="${escapeHtml(tituloItem(evento, "Evento de antigomobilismo"))}" loading="lazy" decoding="async" />
          <div class="event-info">
            <div class="event-date">${escapeHtml(formatarData(evento.data || evento.dataEvento || evento.inicio))}</div>
            <h3 class="event-title">${escapeHtml(tituloItem(evento, "Evento de antigomobilismo"))}</h3>
            <p class="event-local">${escapeHtml(localItem(evento) || "Cidade - UF")}</p>
            <p class="event-text">${escapeHtml(evento.descricao || "Encontro para veículos antigos e apaixonados por clássicos.")}</p>
            <div class="event-button">Ver detalhes</div>
          </div>
        `;
        card.addEventListener("click", () => abrirModal({ ...evento, tipo: "evento" }));
        list.appendChild(card);
      });
    }

    function abrirModal(item) {
      state.modalItem = item;
      const fotos = todasFotos(item);

      $("modalTitle").textContent = tituloItem(item, item.tipo === "evento" ? "Evento de antigomobilismo" : "Veículo clássico");
      $("modalPrice").textContent = item.tipo === "evento" ? "" : formatarPreco(item.preco || item.valor);
      $("modalMeta").innerHTML = `
        <span>${escapeHtml(item.tipo === "evento" ? formatarData(item.data || item.dataEvento || item.inicio) : [item.marca, item.modelo, item.ano].filter(Boolean).join(" • "))}</span>
        <span>${escapeHtml(localItem(item) || "Brasil")}</span>
      `;
      $("modalDescription").textContent =
        item.descricao || item.descricaoCompleta || item.observacoes ||
        (item.tipo === "evento"
          ? "Encontro para veículos antigos e apaixonados por clássicos."
          : "Sem descrição informada.");

      definirImagemModal(fotos[0]);

      $("modalThumbs").innerHTML = "";
      fotos.forEach((foto, index) => {
        const thumb = document.createElement("button");
        thumb.className = `thumb ${index === 0 ? "active" : ""}`;
        thumb.type = "button";
        thumb.innerHTML = `<img src="${foto}" alt="" loading="lazy" decoding="async" />`;
        thumb.addEventListener("click", () => {
          document.querySelectorAll(".thumb").forEach((el) => el.classList.remove("active"));
          thumb.classList.add("active");
          definirImagemModal(foto);
        });
        $("modalThumbs").appendChild(thumb);
      });

      $("modalBackdrop").classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function definirImagemModal(src) {
      $("modalMain").innerHTML = `<img src="${src}" alt="" />`;
    }

    function fecharModal() {
      $("modalBackdrop").classList.remove("open");
      document.body.style.overflow = "";
      state.modalItem = null;
    }

    function textoCompartilhar(item) {
      const base = location.origin;
      if (item.tipo === "evento") {
        return `Veja este evento no Volante App: ${tituloItem(item, "Evento de antigomobilismo")} - ${base}`;
      }

      return `Veja este anúncio no Volante App: ${tituloItem(item)} - ${formatarPreco(item.preco || item.valor)} - ${base}`;
    }

    async function compartilhar(item) {
      if (!item) return;

      const text = textoCompartilhar(item);

      try {
        if (navigator.share) {
          await navigator.share({
            title: tituloItem(item, "Volante App"),
            text,
            url: location.href
          });
        } else {
          await navigator.clipboard.writeText(text);
          toast("Link copiado.");
        }
      } catch (error) {
        if (error?.name !== "AbortError") {
          toast("Não foi possível compartilhar.");
        }
      }
    }

    function carregarAnuncios() {
      const q = query(
        collection(db, "anuncios"),
        where("status", "==", "ATIVO"),
        limit(12)
      );

      return onSnapshot(
        q,
        (snapshot) => {
          state.anuncios = ordenarPorData(
            snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }))
          );
          renderAnuncios();
        },
        () => {
          $("destaquesStatus").className = "empty-box";
          $("destaquesStatus").innerHTML = `
            <p class="empty-title">Não foi possível carregar os anúncios</p>
            <p class="empty-text">Verifique sua conexão e tente novamente.</p>
          `;
        }
      );
    }

    function carregarEventos() {
      const q = query(
        collection(db, "eventos"),
        where("status", "==", "ATIVO"),
        limit(8)
      );

      return onSnapshot(
        q,
        (snapshot) => {
          state.eventos = ordenarPorData(
            snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }))
          );
          renderEventos();
        },
        () => {
          $("eventosStatus").className = "empty-box";
          $("eventosStatus").innerHTML = `
            <p class="empty-title">Não foi possível carregar os eventos</p>
            <p class="empty-text">Verifique sua conexão e tente novamente.</p>
          `;
        }
      );
    }

    $("buscaInput").addEventListener("input", renderAnuncios);
    $("modalClose").addEventListener("click", fecharModal);
    $("modalBackdrop").addEventListener("click", (event) => {
      if (event.target.id === "modalBackdrop") fecharModal();
    });
    $("modalShare").addEventListener("click", () => compartilhar(state.modalItem));
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") fecharModal();
    });

    onAuthStateChanged(auth, (usuario) => {
      state.usuario = usuario;
      const link = $("loginLink");

      if (usuario) {
        link.textContent = "Sair";
        link.href = "#";
        link.onclick = async (event) => {
          event.preventDefault();
          await signOut(auth);
          toast("Você saiu da conta.");
        };
      } else {
        link.textContent = "Entrar";
        link.href = "/login.html";
        link.onclick = null;
      }
    });

    carregarAnuncios();
    carregarEventos();
  </script>
</body>
</html>
