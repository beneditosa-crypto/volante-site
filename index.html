<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Volante App</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #ffffff;
  color: #111;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 20px;
  border-bottom: 1px solid #eee;
  gap: 12px;
}

.logo-area strong {
  font-size: 20px;
}

.logo-area div {
  font-size: 12px;
  color: #666;
}

#usuarioArea {
  font-size: 13px;
  color: #333;
  text-align: right;
}

#usuarioArea button {
  margin-top: 6px;
  padding: 7px 12px;
  border: none;
  border-radius: 10px;
  background: #111;
  color: #fff;
  cursor: pointer;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 16px;
}

.actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.button {
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.primary {
  background: #111;
  color: #fff;
}

.secondary {
  background: #f3f3f3;
  color: #111;
}

.section {
  margin-top: 30px;
}

.grid {
  display: grid;
  gap: 16px;
}

@media (min-width: 600px) {
  .actions {
    flex-direction: row;
  }

  .button {
    flex: 1;
  }

  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 1024px) {
  .grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.card {
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid #eee;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  background: #f3f3f3;
}

.card-content {
  padding: 12px;
}

.card-title {
  font-weight: 600;
}

.price {
  font-weight: bold;
  margin-top: 5px;
}

.meta {
  color: #666;
  font-size: 13px;
  margin-top: 4px;
}

footer {
  margin-top: 40px;
  padding: 20px;
  text-align: center;
  color: #777;
}

@media (max-width: 480px) {
  header {
    align-items: flex-start;
  }

  #usuarioArea {
    max-width: 160px;
    font-size: 12px;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo-area">
    <strong>Volante 🚗</strong>
    <div>Mais que carros, paixão</div>
  </div>

  <div id="usuarioArea"></div>
</header>

<div class="container">

  <div class="actions">
    <button class="button primary" onclick="irPublicar()">
      Anunciar veículo
    </button>

    <button class="button secondary" onclick="irPublicarEvento()">
      Publicar evento
    </button>

    <button class="button secondary" onclick="window.location.href='/login.html'">
      Entrar / Criar conta
    </button>
  </div>

  <div class="section">
    <h2>🚘 Anúncios recentes</h2>
    <div id="anuncios" class="grid">Carregando...</div>
  </div>

  <div class="section">
    <h2>📍 Próximos eventos</h2>
    <div id="eventos" class="grid">Carregando...</div>
  </div>

</div>

<footer>
  Volante App © 2026
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770",
  storageBucket: "clube-da-caminhonete-be770.firebasestorage.app",
  messagingSenderId: "559157035885",
  appId: "1:559157035885:web:dd265c86d0a3db6a6b9064",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  const area = document.getElementById("usuarioArea");

  if (user) {
    area.innerHTML = `
      <div>${user.email}</div>
      <button onclick="logout()">Sair</button>
    `;
  } else {
    area.innerHTML = `
      <button onclick="window.location.href='/login.html'">Entrar</button>
    `;
  }
});

window.logout = async function () {
  await signOut(auth);
  location.reload();
};

window.irPublicar = function () {
  const user = auth.currentUser;

  if (!user) {
    alert("Faça login para anunciar.");
    window.location.href = "/login.html";
    return;
  }

  alert("Próxima etapa: criar a página publicar.html");
};

window.irPublicarEvento = function () {
  const user = auth.currentUser;

  if (!user) {
    alert("Faça login para publicar um evento.");
    window.location.href = "/login.html";
    return;
  }

  alert("Próxima etapa: criar a página publicar-evento.html");
};

function formatarPreco(valor) {
  if (!valor) return "Preço sob consulta";

  const numero = Number(valor);

  if (Number.isNaN(numero)) {
    return valor;
  }

  return numero.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

async function carregarAnuncios() {
  const lista = document.getElementById("anuncios");

  try {
    const q = query(
      collection(db, "anuncios"),
      where("status", "==", "ATIVO")
    );

    const snapshot = await getDocs(q);

    lista.innerHTML = "";

    if (snapshot.empty) {
      lista.innerHTML = "<p>Nenhum anúncio disponível no momento.</p>";
      return;
    }

    snapshot.forEach((doc) => {
      const data = doc.data();

      const foto =
        data.fotos?.[0] ||
        data.foto ||
        "https://via.placeholder.com/600x400?text=Volante";

      const titulo = data.titulo || "Veículo anunciado";
      const preco = formatarPreco(data.preco);
      const local = [data.cidade, data.estado].filter(Boolean).join(" - ");

      lista.innerHTML += `
        <div class="card">
          <img src="${foto}" alt="${titulo}" />
          <div class="card-content">
            <div class="card-title">${titulo}</div>
            <div class="price">${preco}</div>
            <div class="meta">${local}</div>
          </div>
        </div>
      `;
    });
  } catch (error) {
    console.error(error);
    lista.innerHTML = "<p>Não foi possível carregar os anúncios.</p>";
  }
}

async function carregarEventos() {
  const lista = document.getElementById("eventos");

  try {
    const q = query(
      collection(db, "eventos"),
      where("status", "==", "ATIVO")
    );

    const snapshot = await getDocs(q);

    lista.innerHTML = "";

    if (snapshot.empty) {
      lista.innerHTML = "<p>Nenhum evento disponível no momento.</p>";
      return;
    }

    snapshot.forEach((doc) => {
      const data = doc.data();

      const foto =
        data.imagem ||
        data.foto ||
        data.fotos?.[0] ||
        "https://via.placeholder.com/600x400?text=Evento";

      const titulo = data.titulo || "Evento";
      const local = [data.cidade, data.estado].filter(Boolean).join(" - ");

      lista.innerHTML += `
        <div class="card">
          <img src="${foto}" alt="${titulo}" />
          <div class="card-content">
            <div class="card-title">${titulo}</div>
            <div class="meta">${local}</div>
          </div>
        </div>
      `;
    });
  } catch (error) {
    console.error(error);
    lista.innerHTML = "<p>Não foi possível carregar os eventos.</p>";
  }
}

carregarAnuncios();
carregarEventos();
</script>

</body>
</html>
