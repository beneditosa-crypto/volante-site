<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volante App</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f7f4ee;
      color: #1f2933;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    header {
      padding: 22px 18px 14px;
      background: #f7f4ee;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .topo {
      max-width: 1120px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .marca {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 58px;
      height: 58px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .marca-texto {
      min-width: 0;
    }

    .nome {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #151515;
      line-height: 1;
    }

    .slogan {
      margin-top: 5px;
      font-size: 14px;
      color: #6b6257;
      font-weight: 500;
    }

    .btn-conta {
      border: none;
      background: #151515;
      color: #fff;
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 18px;
    }

    .hero {
      background: #fffaf2;
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.05);
      margin-bottom: 22px;
    }

    .hero h1 {
      font-size: 30px;
      line-height: 1.08;
      letter-spacing: -0.8px;
      color: #111;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 15px;
      color: #6b6257;
      line-height: 1.45;
      max-width: 640px;
    }

    .busca-box {
      margin-top: 18px;
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 18px;
      padding: 12px 14px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      gap: 10px;
    }

    .busca-box span {
      font-size: 18px;
    }

    #busca {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 15px;
      color: #111;
    }

    .secao {
      margin-top: 28px;
    }

    .secao-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 12px;
    }

    .secao h2 {
      font-size: 22px;
      color: #151515;
      letter-spacing: -0.4px;
    }

    .contador {
      font-size: 13px;
      color: #8a8177;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid.destaques,
    .grid.recentes {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid.eventos {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .card {
      background: #fff;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.05);
    }

    .foto {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #e8e1d7;
      display: block;
    }

    .card-body {
      padding: 13px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      border-radius: 999px;
      background: #f1ece3;
      color: #6f5d42;
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .titulo {
      font-size: 15px;
      font-weight: 800;
      color: #151515;
      line-height: 1.25;
      margin-bottom: 6px;
    }

    .meta {
      font-size: 13px;
      color: #6b6257;
      line-height: 1.35;
    }

    .preco {
      margin-top: 9px;
      font-size: 15px;
      font-weight: 900;
      color: #151515;
    }

    .vazio {
      background: #fff;
      border-radius: 20px;
      padding: 18px;
      color: #7b7167;
      font-size: 14px;
      border: 1px dashed rgba(0, 0, 0, 0.14);
    }

    footer {
      max-width: 1120px;
      margin: 34px auto 0;
      padding: 0 18px;
      color: #8a8177;
      font-size: 13px;
    }

    @media (max-width: 760px) {
      header {
        padding: 16px 14px 12px;
      }

      .logo {
        width: 48px;
        height: 48px;
      }

      .nome {
        font-size: 20px;
      }

      .slogan {
        font-size: 12px;
      }

      .btn-conta {
        padding: 10px 14px;
        font-size: 13px;
      }

      main {
        padding: 14px;
      }

      .hero {
        padding: 18px;
        border-radius: 24px;
      }

      .hero h1 {
        font-size: 25px;
      }

      .grid.destaques,
      .grid.recentes {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid.eventos {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .card {
        border-radius: 18px;
      }

      .card-body {
        padding: 10px;
      }

      .titulo {
        font-size: 13px;
      }

      .meta,
      .preco {
        font-size: 12px;
      }

      .tag {
        font-size: 9px;
        padding: 4px 7px;
      }
    }

    @media (max-width: 480px) {
      .grid.destaques,
      .grid.recentes {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid.eventos {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 9px;
      }

      .secao h2 {
        font-size: 19px;
      }

      .contador {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <div class="topo">
        <div class="marca">
          <img src="./logo.png" alt="Volante App" class="logo" />
          <div class="marca-texto">
            <div class="nome">Volante</div>
            <div class="slogan">Mais que carros, paixão</div>
          </div>
        </div>

        <button class="btn-conta" id="btnConta">Entrar / Conta</button>
      </div>
    </header>

    <main>
      <section class="hero">
        <h1>Clássicos, antigos e eventos em um só lugar.</h1>
        <p>
          Encontre veículos especiais, acompanhe novidades e descubra eventos para quem vive a cultura automotiva.
        </p>

        <div class="busca-box">
          <span>⌕</span>
          <input
            id="busca"
            type="search"
            placeholder="Buscar por modelo, cidade, estado..."
          />
        </div>
      </section>

      <section class="secao">
        <div class="secao-header">
          <h2>Destaques</h2>
          <span class="contador" id="contadorDestaques"></span>
        </div>
        <div class="grid destaques" id="gridDestaques"></div>
      </section>

      <section class="secao">
        <div class="secao-header">
          <h2>Recentes</h2>
          <span class="contador" id="contadorRecentes"></span>
        </div>
        <div class="grid recentes" id="gridRecentes"></div>
      </section>

      <section class="secao">
        <div class="secao-header">
          <h2>Eventos</h2>
          <span class="contador" id="contadorEventos"></span>
        </div>
        <div class="grid eventos" id="gridEventos"></div>
      </section>
    </main>

    <footer>
      Volante App © 2026
    </footer>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      query,
      where
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import {
      getAuth,
      onAuthStateChanged,
      signInWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
      authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
      projectId: "clube-da-caminhonete-be770",
      storageBucket: "clube-da-caminhonete-be770.firebasestorage.app",
      messagingSenderId: "559157035885",
      appId: "1:559157035885:web:8d3c4c8d7c7c5f7b3b2a91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const buscaInput = document.getElementById("busca");
    const btnConta = document.getElementById("btnConta");

    const gridDestaques = document.getElementById("gridDestaques");
    const gridRecentes = document.getElementById("gridRecentes");
    const gridEventos = document.getElementById("gridEventos");

    const contadorDestaques = document.getElementById("contadorDestaques");
    const contadorRecentes = document.getElementById("contadorRecentes");
    const contadorEventos = document.getElementById("contadorEventos");

    let anuncios = [];
    let eventos = [];
    let usuarioAtual = null;

    onAuthStateChanged(auth, (user) => {
      usuarioAtual = user;
      btnConta.textContent = user ? "Conta / Sair" : "Entrar / Conta";
    });

    btnConta.addEventListener("click", async () => {
      if (usuarioAtual) {
        await signOut(auth);
        return;
      }

      const email = prompt("Digite seu e-mail:");
      if (!email) return;

      const senha = prompt("Digite sua senha:");
      if (!senha) return;

      try {
        await signInWithEmailAndPassword(auth, email.trim(), senha);
      } catch (error) {
        alert("Não foi possível entrar. Verifique e-mail e senha.");
      }
    });

    buscaInput.addEventListener("input", renderizarTudo);

    function normalizar(valor) {
      return String(valor || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function getImagem(item) {
      if (Array.isArray(item.fotos) && item.fotos.length > 0) return item.fotos[0];
      if (Array.isArray(item.imagens) && item.imagens.length > 0) return item.imagens[0];
      if (item.foto) return item.foto;
      if (item.imagem) return item.imagem;
      if (item.imageUrl) return item.imageUrl;
      return "";
    }

    function getDataMs(item) {
      if (item.data?.seconds) return item.data.seconds * 1000;
      if (item.criadoEm?.seconds) return item.criadoEm.seconds * 1000;
      if (item.createdAt?.seconds) return item.createdAt.seconds * 1000;
      if (item.atualizadoEm?.seconds) return item.atualizadoEm.seconds * 1000;
      return 0;
    }

    function formatarPreco(valor) {
      if (!valor) return "";
      const numero = Number(String(valor).replace(/\D/g, ""));
      if (!numero) return String(valor);
      return numero.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function textoLocal(item) {
      const cidade = item.cidade || "";
      const estado = item.estado || item.uf || "";
      if (cidade && estado) return `${cidade} - ${estado}`;
      return cidade || estado || "";
    }

    function filtrarLista(lista) {
      const termo = normalizar(buscaInput.value);

      if (!termo) return lista;

      return lista.filter((item) => {
        const texto = normalizar([
          item.titulo,
          item.marca,
          item.modelo,
          item.descricao,
          item.cidade,
          item.estado,
          item.uf,
          item.nome
        ].join(" "));

        return texto.includes(termo);
      });
    }

    function criarCardAnuncio(item) {
      const imagem = getImagem(item);
      const titulo = item.titulo || `${item.marca || ""} ${item.modelo || ""}`.trim() || "Anúncio";
      const local = textoLocal(item);
      const ano = item.ano || item.anoFabricacao || "";
      const preco = formatarPreco(item.preco);

      return `
        <article class="card">
          ${
            imagem
              ? `<img class="foto" src="${imagem}" alt="${titulo}" />`
              : `<div class="foto"></div>`
          }
          <div class="card-body">
            <div class="tag">Anúncio</div>
            <div class="titulo">${titulo}</div>
            <div class="meta">${[ano, local].filter(Boolean).join(" • ")}</div>
            ${preco ? `<div class="preco">${preco}</div>` : ""}
          </div>
        </article>
      `;
    }

    function criarCardEvento(item) {
      const imagem = getImagem(item);
      const titulo = item.titulo || item.nome || "Evento";
      const local = textoLocal(item);
      const data = item.dataTexto || item.dataEvento || item.data || "";

      return `
        <article class="card">
          ${
            imagem
              ? `<img class="foto" src="${imagem}" alt="${titulo}" />`
              : `<div class="foto"></div>`
          }
          <div class="card-body">
            <div class="tag">Evento</div>
            <div class="titulo">${titulo}</div>
            <div class="meta">${[data, local].filter(Boolean).join(" • ")}</div>
          </div>
        </article>
      `;
    }

    function renderizarGrid(elemento, lista, criador, vazioTexto) {
      if (!lista.length) {
        elemento.innerHTML = `<div class="vazio">${vazioTexto}</div>`;
        return;
      }

      elemento.innerHTML = lista.map(criador).join("");
    }

    function renderizarTudo() {
      const anunciosFiltrados = filtrarLista(anuncios);
      const eventosFiltrados = filtrarLista(eventos);

      const anunciosOrdenados = [...anunciosFiltrados].sort((a, b) => getDataMs(b) - getDataMs(a));
      const eventosOrdenados = [...eventosFiltrados].sort((a, b) => getDataMs(b) - getDataMs(a));

      const destaques = anunciosOrdenados.slice(0, 4);
      const recentes = anunciosOrdenados.slice(0, 4);
      const eventosTela = eventosOrdenados.slice(0, 9);

      contadorDestaques.textContent = `${destaques.length} exibidos`;
      contadorRecentes.textContent = `${recentes.length} exibidos`;
      contadorEventos.textContent = `${eventosTela.length} exibidos`;

      renderizarGrid(
        gridDestaques,
        destaques,
        criarCardAnuncio,
        "Nenhum destaque ativo encontrado."
      );

      renderizarGrid(
        gridRecentes,
        recentes,
        criarCardAnuncio,
        "Nenhum anúncio recente ativo encontrado."
      );

      renderizarGrid(
        gridEventos,
        eventosTela,
        criarCardEvento,
        "Nenhum evento ativo encontrado."
      );
    }

    async function carregarAnuncios() {
      const q = query(
        collection(db, "anuncios"),
        where("status", "==", "ATIVO")
      );

      const snap = await getDocs(q);

      anuncios = snap.docs.map((doc) => ({
        id: doc.id,
        ...doc.data()
      }));
    }

    async function carregarEventos() {
      const q = query(
        collection(db, "eventos"),
        where("status", "==", "ATIVO")
      );

      const snap = await getDocs(q);

      eventos = snap.docs.map((doc) => ({
        id: doc.id,
        ...doc.data()
      }));
    }

    async function iniciar() {
      try {
        await Promise.all([
          carregarAnuncios(),
          carregarEventos()
        ]);

        renderizarTudo();
      } catch (error) {
        console.error(error);

        gridDestaques.innerHTML = `<div class="vazio">Erro ao carregar anúncios.</div>`;
        gridRecentes.innerHTML = `<div class="vazio">Erro ao carregar recentes.</div>`;
        gridEventos.innerHTML = `<div class="vazio">Erro ao carregar eventos.</div>`;
      }
    }

    iniciar();
  </script>
</body>
</html>
