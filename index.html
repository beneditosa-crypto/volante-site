<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Volante App</title>
  <meta name="description" content="Volante App — anúncios e eventos para apaixonados por carros antigos." />
  <link rel="icon" href="/favicon.png" type="image/png" />

  <style>
    :root {
      --background: #ffffff;
      --surface: #ffffff;
      --surface-soft: #f3f4f6;
      --text: #050505;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #1e3a8a;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.10);
      --radius: 22px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--background);
      color: var(--text);
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .page {
      width: 100%;
      overflow-x: hidden;
    }

    .container {
      width: min(100%, 1480px);
      margin: 0 auto;
      padding: 26px 28px 60px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 22px;
      margin-bottom: 34px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand img {
      width: 62px;
      height: 62px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .brand-title {
      font-size: 25px;
      font-weight: 950;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .brand-subtitle {
      margin-top: 7px;
      font-size: 14px;
      font-weight: 800;
      color: var(--muted);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .icon-button {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: #ffffff;
      color: #0f172a;
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      font-size: 22px;
      font-weight: 900;
    }

    .login-button {
      min-height: 54px;
      padding: 0 26px;
      border-radius: 18px;
      background: var(--primary);
      color: #ffffff;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .user-pill {
      min-height: 54px;
      padding: 0 18px;
      border-radius: 18px;
      background: var(--surface-soft);
      color: var(--primary);
      font-weight: 900;
      border: 1px solid var(--border);
      display: none;
      align-items: center;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .search-wrap {
      max-width: 900px;
      margin-bottom: 34px;
    }

    .search-box {
      width: 100%;
      height: 62px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: var(--surface-soft);
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 0 18px;
    }

    .search-icon {
      color: var(--muted);
      font-size: 22px;
      line-height: 1;
    }

    .search {
      width: 100%;
      height: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 16px;
      font-weight: 750;
    }

    .search::placeholder {
      color: #9ca3af;
      font-weight: 750;
    }

    .section {
      margin-bottom: 40px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .section h2 {
      font-size: 25px;
      font-weight: 950;
      letter-spacing: -0.04em;
    }

    .section-link {
      color: var(--primary);
      font-size: 15px;
      font-weight: 950;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      position: relative;
      min-height: 276px;
      border-radius: var(--radius);
      overflow: hidden;
      background: #eef0f3;
      box-shadow: none;
      border: 1px solid rgba(15, 23, 42, 0.04);
      isolation: isolate;
    }

    .card.clickable {
      cursor: pointer;
    }

    .card-image {
      width: 100%;
      height: 100%;
      min-height: 276px;
      background: linear-gradient(180deg, #f3f4f6, #e5e7eb);
    }

    .card-image img {
      width: 100%;
      height: 100%;
      min-height: 276px;
      object-fit: cover;
      display: block;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.58) 0%,
        rgba(0, 0, 0, 0.28) 34%,
        rgba(0, 0, 0, 0.02) 70%
      );
      z-index: 1;
      pointer-events: none;
    }

    .card-content {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 15px;
      z-index: 2;
      color: #ffffff;
    }

    .card-title {
      font-size: 20px;
      line-height: 1.1;
      font-weight: 950
