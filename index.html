```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Volante App</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #ffffff;
  color: #111;
}

/* HEADER */
header {
  text-align: center;
  padding: 24px 16px;
  border-bottom: 1px solid #eee;
}

h1 {
  margin: 0;
  font-size: 26px;
}

.slogan {
  color: #666;
  font-size: 14px;
}

/* CONTAINER */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 16px;
}

/* BUTTONS */
.actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.button {
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.primary {
  background: #111;
  color: #fff;
}

.secondary {
  background: #f3f3f3;
}

/* SECTION */
.section {
  margin-top: 30px;
}

.section h2 {
  margin-bottom: 10px;
}

/* GRID */
.grid {
  display: grid;
  gap: 16px;
}

/* RESPONSIVO */
@media (min-width: 600px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 1024px) {
  .grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* CARD */
.card {
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid #eee;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

.price {
  font-weight: bold;
  margin-top: 5px;
}

/* FOOTER */
footer {
  margin-top: 40px;
  padding: 20px;
  text-align: center;
  color: #777;
}
</style>
</head>

<body>

<header>
  <h1>Volante App 🚗</h1>
  <div class="slogan">Mais que carros, paixão</div>
</header>

<div class="container">

  <div class="actions">
    <button class="button primary">Anunciar veículo</button>
    <button class="button secondary">Publicar evento</button>
    <button class="button secondary">Entrar / Criar conta</button>
  </div>

  <div class="section">
    <h2>🚘 Anúncios recentes</h2>

    <div class="grid">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70"/>
        <div class="card-content">
          <div>Ford F100 1975</div>
          <div class="price">R$ 85.000</div>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1494976388531-d1058494cdd8"/>
        <div class="card-content">
          <div>Chevrolet C10 1980</div>
          <div class="price">R$ 92.000</div>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c"/>
        <div class="card-content">
          <div>VW Fusca 1972</div>
          <div class="price">R$ 38.000</div>
        </div>
      </div>

    </div>
  </div>

  <div class="section">
    <h2>📍 Próximos eventos</h2>

    <div class="grid">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba"/>
        <div class="card-content">
          <div>Encontro de Antigos - Brasília</div>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1502877338535-766e1452684a"/>
        <div class="card-content">
          <div>Feira de Veículos Clássicos</div>
        </div>
      </div>

    </div>
  </div>

</div>

<footer>
  Volante App © 2026
</footer>

</body>
</html>
```
