<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meus Anúncios - Volante</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #fff;
  color: #111;
}

header {
  padding: 18px 20px;
  border-bottom: 1px solid #eee;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 16px;
}

button {
  padding: 12px 14px;
  border: none;
  border-radius: 12px;
  background: #111;
  color: #fff;
  cursor: pointer;
}

.secondary {
  background: #f3f3f3;
  color: #111;
}

.actions {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  gap: 16px;
}

@media (min-width: 700px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

.card {
  border: 1px solid #eee;
  border-radius: 14px;
  overflow: hidden;
  background: #fff;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  background: #f3f3f3;
}

.card-content {
  padding: 12px;
}

.title {
  font-weight: 700;
}

.price {
  font-weight: 700;
  margin-top: 5px;
}

.meta {
  font-size: 13px;
  color: #666;
  margin-top: 4px;
}

.status {
  display: inline-block;
  margin-top: 10px;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
}

.PENDENTE { background: #fff3cd; color: #856404; }
.ATIVO { background: #d4edda; color: #155724; }
.RECUSADO { background: #f8d7da; color: #721c24; }
.EXCLUIDO { background: #eee; color: #555; }

#usuarioArea {
  font-size: 13px;
  color: #555;
  text-align: right;
}
</style>
</head>

<body>

<header>
  <div>
    <strong>Volante 🚗</strong>
    <div style="font-size:12px;color:#666;">Meus anúncios</div>
  </div>

  <div id="usuarioArea"></div>
</header>

<div class="container">

  <div class="actions">
    <button class="secondary" onclick="window.location.href='/'">Início</button>
    <button onclick="window.location.href='/publicar.html'">Novo anúncio</button>
  </div>

  <h2>Meus anúncios</h2>

  <div id="lista" class="grid">Carregando...</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9-eYhr2Bdadd4OWD17zIRszsz3LrxeBc",
  authDomain: "clube-da-caminhonete-be770.firebaseapp.com",
  projectId: "clube-da-caminhonete-be770",
  storageBucket: "clube-da-caminhonete-be770.firebasestorage.app",
  messagingSenderId: "559157035885",
  appId: "1:559157035885:web:dd265c86d0a3db6a6b9064",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function formatarPreco(valor) {
  if (!valor) return "Preço sob consulta";

  const numero = Number(valor);

  if (Number.isNaN(numero)) return valor;

  return numero.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

onAuthStateChanged(auth, async (user) => {
  const area = document.getElementById("usuarioArea");

  if (!user) {
    alert("Faça login para ver seus anúncios.");
    window.location.href = "/login.html";
    return;
  }

  area.innerHTML = user.email;
  carregarMeusAnuncios(user);
});

async function carregarMeusAnuncios(user) {
  const lista = document.getElementById("lista");

  try {
    const q = query(
      collection(db, "anuncios"),
      where("usuarioId", "==", user.uid)
    );

    const snapshot = await getDocs(q);

    lista.innerHTML = "";

    if (snapshot.empty) {
      lista.innerHTML = "<p>Você ainda não publicou anúncios.</p>";
      return;
    }

    snapshot.forEach((doc) => {
      const d = doc.data();

      if (d.status === "EXCLUIDO") return;

      const foto =
        d.fotos?.[0] ||
        d.foto ||
        "https://via.placeholder.com/600x400?text=Volante";

      const titulo = d.titulo || "Veículo anunciado";
      const preco = formatarPreco(d.preco);
      const local = [d.cidade, d.estado].filter(Boolean).join(" - ");
      const status = d.status || "PENDENTE";

      lista.innerHTML += `
        <div class="card">
          <img src="${foto}" alt="${titulo}" />
          <div class="card-content">
            <div class="title">${titulo}</div>
            <div class="price">${preco}</div>
            <div class="meta">${local}</div>
            <div class="meta">${d.marca || ""} ${d.modelo || ""} ${d.ano || ""}</div>
            <span class="status ${status}">${status}</span>
          </div>
        </div>
      `;
    });

  } catch (error) {
    console.error(error);
    lista.innerHTML = "<p>Erro ao carregar seus anúncios.</p>";
  }
}
</script>

</body>
</html>
